<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>论坛 - 独立版</title>
    <link rel="stylesheet" href="css/core-icons.min.css">
    <link rel="stylesheet" href="css/core-ui.css">
    <script src="js/core/OperaKeyboardFix.js"></script>
    <script src="js/core/SafeArea.js" defer></script>
    <style>
        :root {
            --ink-900: #111111;
            --ink-700: #333333;
            --ink-500: #666666;
            --ink-400: #8e8e93;
            --line-200: #e5e5ea;
            --line-100: #f2f2f7;
            --paper-100: #ffffff;
            --paper-200: #f7f7f9;
            --safe-inset-top: env(safe-area-inset-top, 0px);
            --safe-inset-bottom: env(safe-area-inset-bottom, 0px);
        }
        html, body {
            height: 100%;
        }
        body {
            background-color: var(--paper-200);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: var(--ink-900);
        }
        .phone-container {
            width: 360px;
            height: 640px;
            background-color: var(--paper-200);
            border-radius: 32px;
            box-shadow: 0 0 0 10px #1c1c1e, 0 20px 40px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }
        .embed body {
            display: block;
            min-height: 0;
        }
        .embed .phone-container {
            width: 100%;
            height: 100%;
            border-radius: 0;
            box-shadow: none;
        }
        .forum-app {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }
        
        .forum-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--paper-200);
            height: 100%;
            overflow: hidden;
        }
        
        .forum-navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.96);
            border-bottom: 1px solid var(--line-200);
            padding-top: calc(12px + var(--safe-inset-top, 0px));
            transition: padding-top 0.3s ease;
            position: relative;
            backdrop-filter: blur(14px);
        }

        .app-back-btn {
             background: none;
             border: none;
             color: var(--ink-900);
             font-size: 22px;
             cursor: pointer;
             width: 44px;
             height: 44px;
             display: flex;
             align-items: center;
             justify-content: center;
             padding: 0;
             transition: transform 0.2s, opacity 0.2s;
             -webkit-tap-highlight-color: transparent;
             touch-action: manipulation;
         }

         .app-back-btn:active {
             opacity: 0.6;
             transform: translateX(-2px);
         }
        
        .nav-left,
        .nav-right {
            display: flex;
            align-items: center;
            gap: 4px;
            z-index: 2;
        }

        .nav-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            z-index: 1;
        }
        
        .nav-tabs {
            display: flex;
            background: var(--line-100);
            border-radius: 10px;
            padding: 3px;
            border: 1px solid var(--line-200);
        }

        .nav-right {
            gap: 4px;
        }
        
        .nav-tab {
            padding: 7px 14px;
            border: none;
            background: transparent;
            color: var(--ink-500);
            font-size: 13px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
        }
        
        .nav-tab.active {
            background: #ffffff;
            color: var(--ink-900);
            border: 1px solid var(--line-200);
            box-shadow: none;
        }
        
        .nav-btn {
            width: 44px;
            height: 44px;
            border: none;
            background: transparent;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--ink-900);
            cursor: pointer;
            touch-action: manipulation;
        }

        @keyframes forumRefreshSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .nav-btn.is-refreshing i {
            animation: forumRefreshSpin 0.9s linear infinite;
        }
        
        .forum-content {
            flex: 1;
            padding-bottom: 16px; 
        }

        .forum-app.is-post-detail .forum-content {
            padding-bottom: calc(88px + var(--safe-inset-bottom, env(safe-area-inset-bottom)));
            background: #fff;
        }

        .forum-app.is-post-detail .forum-footer {
            display: none;
        }

        .forum-app.is-post-detail .nav-right {
            display: none;
        }
        
        .forum-content::-webkit-scrollbar {
            display: none;
        }
        
        .tab-content {
            display: none;
            padding: 16px;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .forum-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        
        .header-text-container {
            flex: 1;
            margin-right: 16px;
        }

        .circle-description {
            font-size: 14px;
            color: var(--ink-500);
            margin-top: 4px;
            line-height: 1.5;
        }

        .worldbook-tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        .worldbook-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: #ffffff;
            color: var(--ink-700);
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid var(--line-200);
        }

        .wb-entries-list {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid var(--line-200);
            border-radius: 10px;
            padding: 8px;
            background: #ffffff;
            scrollbar-width: none;
            -ms-overflow-style: none;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
            touch-action: pan-y;
        }
        .wb-entries-list::-webkit-scrollbar {
            display: none;
        }

        .role-entry-list {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid var(--line-200);
            border-radius: 10px;
            padding: 8px;
            background: #ffffff;
            scrollbar-width: none;
            -ms-overflow-style: none;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
            touch-action: pan-y;
        }
        .role-entry-list::-webkit-scrollbar {
            display: none;
        }

        .role-entry-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
        }

        .form-group input.role-entry-checkbox {
            width: 16px;
            height: 16px;
            margin: 0;
            padding: 0;
            flex-shrink: 0;
            border-color: #ddd;
        }

        .wb-category-group {
            margin-bottom: 12px;
        }

        .wb-category-title {
            font-weight: bold;
            font-size: 13px;
            color: #495057;
            margin-bottom: 6px;
            border-bottom: 1px solid #e9ecef;
            padding-bottom: 4px;
        }

        .wb-entry-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
        }

        .form-group input.wb-entry-checkbox {
            width: 16px;
            height: 16px;
            margin: 0;
            padding: 0;
            flex-shrink: 0;
            border-color: #ddd;
        }

        .role-select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--line-200);
            border-radius: 10px;
            font-size: 14px;
            background: #ffffff;
        }
        
        .forum-header h2 {
            margin: 0;
            font-size: 20px;
            color: var(--ink-900);
            letter-spacing: 0.2px;
        }
        
        .new-post-btn {
            background: transparent;
            color: var(--ink-700);
            border: 1px solid var(--line-200);
            padding: 6px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            touch-action: manipulation;
        }

        .new-post-btn.editing {
            color: #ff4d4f;
            border-color: #ff4d4f;
        }
        
        .posts-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .post-item {
            background: #ffffff;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid var(--line-200);
            position: relative;
            cursor: pointer;
            /* iOS 长按防护 */
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            touch-action: pan-y;
        }

        .post-detail-container {
            padding: 0;
            background: var(--paper-200);
            min-height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        #post-detail-content {
            background: #fff;
            padding: 16px;
            margin-bottom: 8px;
            border-bottom: 1px solid var(--line-200);
        }

        .comments-section {
            background: #fff;
            padding: 16px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            flex: 1;
            /* iOS 滚动优化 */
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
            touch-action: pan-y;
        }

        .comments-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--line-200);
        }

        .comments-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--ink-900);
        }

        .comment-refresh-btn {
            width: 36px;
            height: 36px;
            border: 1px solid var(--line-200);
            background: #fff;
            color: var(--ink-700);
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            touch-action: manipulation;
        }

        .comments-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-bottom: 12px;
            flex: 1;
        }

        .comment-input-area {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-top: 1px solid var(--line-200);
            padding: 10px 12px calc(10px + var(--safe-inset-bottom, env(safe-area-inset-bottom)));
            display: none;
            gap: 8px;
            align-items: center;
            backdrop-filter: blur(14px);
            z-index: 1200;
            flex-direction: column;
        }

        .keyboard-spacer {
            flex: 0 0 auto;
            height: 0;
            min-height: 0;
            max-height: 0;
            will-change: auto;
            transition: height 0.3s ease;
        }

        html.ua-android-opera .keyboard-spacer {
            will-change: auto !important;
            transition: none !important;
        }

        .forum-app.is-post-detail .comment-input-area.keyboard-open .keyboard-spacer {
            flex: 0 0 300px;
        }

        .forum-app.is-post-detail .comment-input-area {
            display: flex;
        }

        .comment-input {
            flex: 1;
            border: 1px solid var(--line-200);
            border-radius: 20px;
            padding: 10px 12px;
            font-size: 14px;
            outline: none;
            background: #fff;
        }

        .comment-submit-btn {
            border: none;
            background: #111111;
            color: #fff;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            min-width: 64px;
            touch-action: manipulation;
        }

        .comment-item {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .comment-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .comment-main {
            flex: 1;
        }

        .comment-user {
            font-size: 14px;
            font-weight: 600;
            color: var(--ink-700);
            margin-bottom: 4px;
        }

        .comment-text {
            font-size: 14px;
            color: var(--ink-700);
            line-height: 1.6;
            margin-bottom: 6px;
        }

        .comment-footer {
            font-size: 12px;
            color: var(--ink-400);
            display: flex;
            gap: 12px;
        }

        .comment-likes {
            cursor: pointer;
        }

        .comment-likes.active {
            color: #ff4d4f;
        }

        .delete-post-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 20px;
            height: 20px;
            background: transparent;
            color: #ff4d4f;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            z-index: 10;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .delete-post-btn:hover {
            opacity: 1;
        }

        .edit-mode .delete-post-btn {
            display: flex;
        }
        
        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .user-info {
            flex: 1;
        }
        
        .username {
            font-weight: 600;
            color: var(--ink-900);
            margin-bottom: 2px;
        }
        
        .post-time {
            font-size: 12px;
            color: var(--ink-400);
        }
        
        .post-content h3 {
            margin: 0 0 8px 0;
            font-size: 16px;
            color: var(--ink-900);
        }
        
        .post-content p {
            margin: 0 0 12px 0;
            color: var(--ink-700);
            line-height: 1.6;
        }
        
        .post-images {
            margin-bottom: 12px;
        }
        
        .post-image {
            width: 100%;
            height: 200px;
            border-radius: 12px;
            object-fit: cover;
            background: var(--line-100);
        }
        
        .post-actions {
            display: flex;
            gap: 16px;
            border-top: 1px solid var(--line-200);
            padding-top: 12px;
        }
        
        .action-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            border: none;
            background: transparent;
            color: var(--ink-500);
            font-size: 14px;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 8px;
            transition: all 0.2s;
            touch-action: manipulation;
        }
        
        .action-btn:hover {
            background: var(--line-100);
            color: var(--ink-900);
        }

        .action-btn.active {
            color: #ff4d4f;
            background: rgba(255, 77, 79, 0.05);
        }
        .action-btn.active i {
            color: #ff4d4f;
            animation: heartBeat 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        
        .profile-header {
            padding: 24px 16px;
            background: #ffffff;
            border-radius: 16px;
            margin-bottom: 16px;
            text-align: left;
            border: 1px solid var(--line-200);
        }
        
        .profile-main-info {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .profile-avatar-wrapper {
            flex-shrink: 0;
        }

        .empty-avatar {
            width: 70px;
            height: 70px;
            border: 1.5px solid var(--ink-700);
            border-radius: 50%;
            background: transparent;
        }
        
        .profile-text-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .profile-nickname {
            font-size: 20px;
            font-weight: 700;
            color: var(--ink-900);
        }

        .profile-meta {
            display: flex;
            flex-direction: column;
            gap: 2px;
            font-size: 12px;
            color: var(--ink-400);
        }

        .profile-bio {
            font-size: 14px;
            color: var(--ink-500);
            line-height: 1.6;
            margin-bottom: 24px;
            padding: 0 4px;
        }
        
        .profile-stats {
            display: flex;
            justify-content: flex-start;
            gap: 32px;
            margin: 16px 0;
            padding-left: 4px;
        }

        .post-form { padding: 16px; display: flex; flex-direction: column; gap: 16px; }
        .post-input-title { padding: 12px; border: 1px solid var(--line-200); border-radius: 12px; font-size: 16px; outline: none; background: #fff; }
        .post-input-content { padding: 12px; border: 1px solid var(--line-200); border-radius: 12px; font-size: 16px; min-height: 200px; resize: none; outline: none; font-family: inherit; background: #fff; }
        .post-tools { display: flex; gap: 16px; }
        .tool-btn { background: none; border: none; font-size: 20px; color: var(--ink-500); cursor: pointer; width: 44px; height: 44px; border-radius: 12px; display: inline-flex; align-items: center; justify-content: center; touch-action: manipulation; }
        .submit-post-btn { padding: 12px; background: #111111; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; touch-action: manipulation; }

        .messages-list { 
            display: flex; 
            flex-direction: column; 
            gap: 12px;
            /* iOS 滚动优化 */
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
            touch-action: pan-y;
        }
        
        .user-posts-list {
            /* iOS 滚动优化 */
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
            touch-action: pan-y;
            max-height: 400px;
        }
        .message-item { 
            display: flex; 
            padding: 16px; 
            border: 1px solid var(--line-200); 
            gap: 16px; 
            align-items: flex-start; 
            background: #fff; 
            border-radius: 16px;
            /* iOS 长按防护 */
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            touch-action: pan-y;
        }
        .message-item:last-child { border-bottom: 1px solid var(--line-200); }
        .message-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; flex-shrink: 0; font-size: 18px; background: #111111; }
        .message-icon.system { background: #111111; }
        .message-icon.like { background: #111111; }
        .message-icon.post { background: #111111; }
        .message-icon.comment { background: #111111; }
        .message-content { flex: 1; }
        .message-title { font-weight: 600; color: var(--ink-900); margin-bottom: 4px; font-size: 15px; }
        .message-text { font-size: 14px; color: var(--ink-500); margin-bottom: 4px; line-height: 1.5; }
        .message-time { font-size: 12px; color: var(--ink-400); }

        .nav-title-text { display: none; font-size: 18px; font-weight: 600; color: #2c3e50; }
        
        .stat-item { text-align: center; }
        .stat-number { font-size: 18px; font-weight: 600; color: var(--ink-900); }
        .stat-label { font-size: 12px; color: var(--ink-400); }
        
        .profile-posts { background: #ffffff; border-radius: 16px; padding: 16px; border: 1px solid var(--line-200); }
        
        .forum-footer {
            display: flex;
            justify-content: space-around;
            background: rgba(255, 255, 255, 0.98);
            border-top: 1px solid var(--line-200);
            padding: 8px 0;
            padding-bottom: calc(8px + var(--safe-inset-bottom, env(safe-area-inset-bottom)));
            flex-shrink: 0;
            z-index: 1001;
            backdrop-filter: blur(14px);
        }
        
        .footer-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            border: none;
            background: transparent;
            color: var(--ink-500);
            font-size: 12px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 10px;
            transition: all 0.2s;
            touch-action: manipulation;
        }
        
        .footer-btn.active { color: var(--ink-900); }
        .footer-btn i { font-size: 20px; margin-bottom: 4px; }
        
        @media (max-width: 768px) {
            .forum-navbar {
                padding: 8px 12px;
                padding-top: calc(8px + var(--safe-inset-top, 0px));
            }
            
            .nav-tab {
                padding: 6px 12px;
                font-size: 13px;
            }
            
            .post-item { padding: 12px; }
            
            .footer-btn {
                padding: 6px 8px;
                font-size: 11px;
            }
            
            .footer-btn i { font-size: 18px; }
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: flex-start;
            justify-content: center;
            z-index: 2000;
            padding-top: calc(10vh + env(safe-area-inset-top));
        }

        .modal-content {
            background: #fff;
            width: 85%;
            max-width: 340px;
            height: 80%;
            padding: 24px;
            border-radius: 18px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            animation: modalFadeIn 0.2s ease-out;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
            touch-action: pan-y;
            box-sizing: border-box;
            scrollbar-width: none;
            -ms-overflow-style: none;
            border: 1px solid var(--line-200);
        }

        .modal-content::-webkit-scrollbar { display: none; }
        
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-content h3 {
            margin: 0 0 20px 0;
            font-size: 18px;
            color: var(--ink-900);
            text-align: center;
        }

        .form-group { margin-bottom: 16px; }

    <script>
        try {
            if (window.parent && window.parent !== window) {
                document.documentElement.classList.add('embed');
            }
        } catch (e) {}

        if (window.parent && window.parent.mainApp) {
            window.mainApp = window.parent.mainApp;
        } else if (!window.mainApp) {
            window.mainApp = {
                closeCurrentApp: function() {},
                onAppOpen: function() {},
                onAppClose: function() {}
            };
        }

        (function() {
            const forumApp = document.getElementById('forumAppRoot') || document;
            const closeBtn = forumApp.querySelector('.forum-close');
            const navTabs = forumApp.querySelectorAll('.nav-tab');
            const navTabsContainer = forumApp.querySelector('.nav-tabs');
            const navTitleText = forumApp.querySelector('.nav-title-text');
            const tabContents = forumApp.querySelectorAll('.tab-content');
            const footerBtns = forumApp.querySelectorAll('.footer-btn');

            let lastTab = 'home';
            let currentTab = 'home';
            let currentPostId = null;
            let currentUserProfile = null;

            const switchTab = async (tabName) => {
                if (tabName === 'post-detail') {
                    lastTab = currentTab;
                }
                currentTab = tabName;

                forumApp.classList.toggle('is-post-detail', tabName === 'post-detail');

                const isMainTab = ['home', 'hot', 'favorites'].includes(tabName);
                
                if (isMainTab) {
                    navTabsContainer.style.display = 'flex';
                    navTitleText.style.display = 'none';
                    
                    navTabs.forEach(t => {
                        if (t.getAttribute('data-tab') === tabName) {
                            t.classList.add('active');
                        } else {
                            t.classList.remove('active');
                        }
                    });
                } else {
                    navTabsContainer.style.display = 'none';
                    navTitleText.style.display = 'block';
                    
                    const titles = {
                        'post': '发帖',
                        'messages': '消息',
                        'profile': '个人中心',
                        'post-detail': '详情'
                    };
                    navTitleText.textContent = titles[tabName] || '论坛';
                }

                footerBtns.forEach(btn => {
                    if (btn.getAttribute('data-tab') === tabName) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                });

                tabContents.forEach(content => {
                    if (content.id === tabName + '-tab') {
                        content.classList.add('active');
                    } else {
                        content.classList.remove('active');
                    }
                });

                if (tabName === 'favorites') {
                    const favorites = await ForumDB.getFavorites();
                    window.__favoritesCache = favorites; // 更新缓存
                    const container = forumApp.querySelector('#favorites-posts-container');
                    if (favorites.length === 0) {
                        container.innerHTML = `
                            <div style="text-align: center; padding: 40px; color: #999;">
                                <i class="fas fa-heart" style="font-size: 48px; margin-bottom: 16px; opacity: 0.3;"></i>
                                <p>还没有收藏的帖子</p>
                            </div>
                        `;
                    } else {
                        renderPosts(favorites, container);
                    }
                }

                const contentArea = forumApp.querySelector('.forum-content');
                if (contentArea) contentArea.scrollTop = 0;
            };

            if (closeBtn) {
                closeBtn.addEventListener('click', () => {
                    if (currentTab === 'post-detail') {
                        switchTab(lastTab);
                        return;
                    }
                    try {
                        if (window.parent && window.parent.mainApp && typeof window.parent.mainApp.closeCurrentApp === 'function') {
                            window.parent.mainApp.closeCurrentApp();
                            return;
                        }
                    } catch (e) {}
                    try { history.back(); } catch (e) {}
                });
            }

            navTabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const tabName = tab.getAttribute('data-tab');
                    switchTab(tabName);
                });
            });

            footerBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const tabName = btn.getAttribute('data-tab');
                    if (tabName) {
                        switchTab(tabName);
                    }
                });
            });

            const ForumDB = {
                dbName: 'ForumAppDB',
                version: 5,
                storeName: 'userProfile',
                circlesStoreName: 'forumCircles',
                messagesStoreName: 'forumMessages',
                
                open() {
                    return new Promise((resolve, reject) => {
                        const request = indexedDB.open(this.dbName, this.version);
                        
                        request.onupgradeneeded = (e) => {
                            const db = e.target.result;
                            if (!db.objectStoreNames.contains(this.storeName)) {
                                db.createObjectStore(this.storeName, { keyPath: 'id' });
                            }
                            if (!db.objectStoreNames.contains(this.circlesStoreName)) {
                                db.createObjectStore(this.circlesStoreName, { keyPath: 'id' });
                            }
                            if (!db.objectStoreNames.contains('favorites')) {
                                db.createObjectStore('favorites', { keyPath: 'id', autoIncrement: true });
                            }
                            if (!db.objectStoreNames.contains(this.messagesStoreName)) {
                                db.createObjectStore(this.messagesStoreName, { keyPath: 'id', autoIncrement: true });
                            }
                        };
                        
                        request.onsuccess = (e) => resolve(e.target.result);
                        request.onerror = (e) => reject(e.target.error);
                    });
                },
                
                async getProfile() {
                    try {
                        const db = await this.open();
                        return new Promise((resolve, reject) => {
                            const tx = db.transaction(this.storeName, 'readonly');
                            const store = tx.objectStore(this.storeName);
                            const request = store.get('currentUser');
                            
                            request.onsuccess = () => resolve(request.result);
                            request.onerror = () => reject(request.error);
                        });
                    } catch (err) {
                        return null;
                    }
                },
                
                async updateProfile(updates) {
                    try {

            function showForumToast(message) {
                let toastEl = null;
                let toastText = null;
                try {
                    if (window.parent && window.parent !== window && window.parent.document) {
                        toastEl = window.parent.document.getElementById('toastNotification');
                        toastText = window.parent.document.getElementById('toastText');
                    }
                } catch (e) {}
                if (!toastEl || !toastText) {
                    toastEl = document.getElementById('toastNotification');
                    toastText = document.getElementById('toastText');
                }
                if (!toastEl || !toastText) return;
                toastText.textContent = message;
                const isParentToast = toastEl.ownerDocument !== document;
                if (isParentToast) {
                    try { toastEl.style.display = 'block'; } catch (e) {}
                    setTimeout(() => {
                        try { toastEl.style.display = 'none'; } catch (e) {}
                    }, 2000);
                    return;
                }
                toastEl.classList.add('show');
                setTimeout(() => toastEl.classList.remove('show'), 2000);
            }

            function formatTimeAgo(timestamp) {
                const now = Date.now();
                const ts = Number(timestamp || 0);
                if (!ts || ts > now) return '刚刚';
                const diff = Math.max(0, now - ts);
                const min = Math.floor(diff / 60000);
                if (min < 1) return '刚刚';
                if (min < 60) return `${min}分钟前`;
                const hour = Math.floor(min / 60);
                if (hour < 24) return `${hour}小时前`;
                const day = Math.floor(hour / 24);
                return `${day}天前`;
            }

            async function requestAiResponse(userPrompt, systemPrompt) {
                const profile = getActiveAiProfile();
                if (!profile || !profile.url || !profile.key || !profile.model) {
                    throw new Error('AI未配置，请先在设置里配置 AI 接口');
                }
                const systemText = systemPrompt && String(systemPrompt || '').trim() ? String(systemPrompt || '').trim() : '你是一个内容生成助手。';
                const endpoint = String(profile.url || '').replace(/\/+$/, '');
                let fetchUrl = endpoint;
                if (!endpoint.includes('/chat/completions')) {
                    fetchUrl = endpoint.endsWith('/v1') ? `${endpoint}/chat/completions` : `${endpoint}/v1/chat/completions`;
                }
                let res;
                try {
                    res = await fetch(fetchUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${profile.key}`
                        },
                        body: JSON.stringify({
                            model: profile.model,
                            messages: [
                                { role: 'system', content: systemText },
                                { role: 'user', content: userPrompt }
                            ],
                            temperature: 0.8
                        })
                    });
                } catch (e) {
                    const msg = e && e.message ? String(e.message) : '';
                    const hint = msg.toLowerCase().includes('failed to fetch') ? '（常见原因：跨域 CORS 或接口地址不可达）' : '';
                    throw new Error(`AI网络请求失败${hint}`);
                }
                if (!res.ok) {
                    let detail = '';
                    try {
                        const data = await res.json();
                        detail = data && data.error && data.error.message ? String(data.error.message) : JSON.stringify(data);
                    } catch (e) {
                        try {
                            detail = await res.text();
                        } catch (e2) {
                            detail = '';
                        }
                    }
                    const msg = detail ? `AI请求失败（${res.status}）：${detail}` : `AI请求失败（${res.status}）`;
                    throw new Error(msg);
                }
                const data = await res.json();
                const text = data && data.choices && data.choices[0] && data.choices[0].message ? data.choices[0].message.content : '';
                return String(text || '');
            }

            function safeJsonParseArray(text) {
                try {
                    const s = String(text || '').trim();
                    const jsonStart = s.indexOf('[');
                    const jsonEnd = s.lastIndexOf(']');
                    if (jsonStart >= 0 && jsonEnd >= 0 && jsonEnd > jsonStart) {
                        const maybe = s.slice(jsonStart, jsonEnd + 1);
                        const parsed = JSON.parse(maybe);
                        return Array.isArray(parsed) ? parsed : [];
                    }
                    const parsed = JSON.parse(s);
                    return Array.isArray(parsed) ? parsed : [];
                } catch (e) {
                    return [];
                }
            }

            function flattenWorldBookStructure(struct) {
                if (!struct || typeof struct !== 'object') return [];
                const categories = Array.isArray(struct.__categories__) ? struct.__categories__ : Object.keys(struct).filter(k => k !== '__categories__');
                const items = [];
                categories.forEach(cat => {
                    const list = struct[cat];
                    if (Array.isArray(list)) {
                        list.forEach(it => {
                            items.push({ category: cat, id: it.id, title: it.title || '未命名', content: it.content || '' });

            function hashStringToInt(str, mod) {
                let h = 0;
                for (let i = 0; i < str.length; i++) {
                    h = (h * 31 + str.charCodeAt(i)) >>> 0;
                }
                if (!mod || mod <= 0) return h;
                return h % mod;
            }

            function buildMorandiAvatarSvg(seed) {

                const svg = '<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">'
                    + '<rect width="64" height="64" rx="16" fill="' + color + '"/>'
                    + '<text x="50%" y="50%" dominant-baseline="central" text-anchor="middle" font-size="28" fill="#ffffff">'
                    + icon
                    + '</text></svg>';
                return 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);

                const all = Array.isArray(window.__allPostsCache) ? window.__allPostsCache : [];
                let post = all.find(p => p && String(p.id) === String(postId));
                
                // 如果在当前缓存中没找到，尝试从收藏缓存中找（兜底）
                if (!post && Array.isArray(window.__favoritesCache)) {
                    post = window.__favoritesCache.find(p => p && String(p.id) === String(postId));
                }

                if (!post) return;
                currentPostId = String(postId);
                const detail = forumApp.querySelector('#post-detail-content');
                if (detail) {
                    detail.innerHTML = `
                        <div class="post-header">
                            <img class="user-avatar" src="${escapeHtml(getPostAvatarUrl(post))}" />
                            <div class="user-info">
                                <div class="username">${escapeHtml(post.username || '')}</div>
                                <div class="post-time">${escapeHtml(post.time || '')}</div>
                            </div>
                        </div>
                        <div class="post-content">
                            ${post.title ? `<h3>${escapeHtml(post.title)}</h3>` : ''}
                            <p>${escapeHtml(post.content || '')}</p>
                        </div>
                    `;
                }
                await switchTab('post-detail');
                await refreshPostDetailComments(true);
            };

            async function refreshPostDetailComments(silent) {
                if (!currentPostId) { if (!silent) showForumToast('未找到帖子'); return; }
                const circle = window.__currentCircleCache;
                if (!circle) { if (!silent) showForumToast('未找到圈子'); return; }
                const post = findPostInCircle(circle, currentPostId);
                if (!post) { if (!silent) showForumToast('未找到帖子'); return; }
                const list = forumApp.querySelector('#post-detail-comments-list');
                const countEl = forumApp.querySelector('#post-detail-comment-count');
                if (list) list.innerHTML = '';
                if (countEl) countEl.textContent = '0';
                const userComments = Array.isArray(post.comments) ? post.comments : [];
                const npcComments = await generateAIComments(post, forumSettings.commentCount || 0);
                const merged = [...userComments, ...npcComments];
                if (countEl) countEl.textContent = String(merged.length || 0);
                if (list) {
                    merged.forEach(c => {
                        list.appendChild(createCommentElement(c));
                    });
                }
                if (!silent) showForumToast('评论已刷新');
            }

            async function generateAIComments(post, count) {
                if (!count || count <= 0) return [];
                if (!forumSettings.generateNpcComments) return [];
                let worldText = '';
                try {
                    const circle = window.__currentCircleCache;
                    const ids = circle && Array.isArray(circle.boundWorldBookEntries) ? circle.boundWorldBookEntries.map(String) : [];
                    if (ids.length > 0) worldText = await getWorldBookTextsByIds(ids);
                } catch (e) {}
                const circleName = window.__currentCircleCache ? (window.__currentCircleCache.name || '') : '';
                const circleDesc = window.__currentCircleCache ? (window.__currentCircleCache.description || '') : '';
                const prompt = `圈子名称: ${circleName}\n圈子描述: ${circleDesc}\n世界书内容: ${worldText}\n请为下面这条帖子生成 ${count} 条评论，返回 JSON 数组，每条包含 username、content、time 字段，只返回 JSON：\n\n标题: ${post.title || ''}\n内容: ${post.content || ''}`;
                let raw = '';
                try {
                    raw = await requestAiResponse(prompt, buildForumSystemPrompt());
                } catch (e) {
                    return [];
                }
                const arr = safeJsonParseArray(raw);
                return arr.map((x, idx) => ({
                    username: x.username || `路人${idx + 1}`,
                    content: x.content || '',
                    time: x.time || '',
                    avatar: `https://ui-avatars.com/api/?name=${encodeURIComponent(x.username || `路人${idx + 1}`)}&background=random&color=fff`
                }));
            }

            window.deletePost = async function(e, postId) {
                if (e) e.stopPropagation();
                const circle = window.__currentCircleCache;
                if (!circle || !Array.isArray(circle.posts)) return;
                circle.posts = circle.posts.filter(p => p && String(p.id) !== String(postId));
                await ForumDB.addCircle(circle);
                showForumToast('已删除');
                await switchCircle(circle.id);
            };

            const sidebarOverlay = forumApp.querySelector('#forum-sidebar-overlay');
            const sidebar = forumApp.querySelector('#forum-sidebar');
            const menuBtn = forumApp.querySelector('#forum-menu-btn');

            function openSidebar() {
                if (sidebar) sidebar.classList.add('open');
                if (sidebarOverlay) sidebarOverlay.style.display = 'block';
            }
            function closeSidebar() {
                if (sidebar) sidebar.classList.remove('open');
                if (sidebarOverlay) sidebarOverlay.style.display = 'none';
            }

            if (menuBtn) menuBtn.addEventListener('click', (e) => { e.stopPropagation(); openSidebar(); });
            if (sidebarOverlay) sidebarOverlay.addEventListener('click', closeSidebar);

            const createCircleBtn = forumApp.querySelector('#create-circle-btn');
            const createCircleModal = forumApp.querySelector('#create-circle-modal');
            const cancelCreateCircleBtn = forumApp.querySelector('#cancel-create-circle');
            const confirmCreateCircleBtn = forumApp.querySelector('#confirm-create-circle');
            const deleteCircleBtn = forumApp.querySelector('#delete-circle-btn');
            const circleModalTitle = forumApp.querySelector('#circle-modal-title');
            const newCircleNameInput = forumApp.querySelector('#new-circle-name');
            const newCircleDescInput = forumApp.querySelector('#new-circle-desc');

            let editingCircleId = null;

            async function openCreateCircleModal(circle) {
                editingCircleId = circle ? circle.id : null;
                if (circleModalTitle) circleModalTitle.textContent = editingCircleId ? '编辑圈子' : '创建新圈子';
                if (newCircleNameInput) newCircleNameInput.value = circle ? (circle.name || '') : '';
                if (newCircleDescInput) newCircleDescInput.value = circle ? (circle.description || '') : '';
                const selected = circle && Array.isArray(circle.boundWorldBookEntries) ? circle.boundWorldBookEntries.map(String) : [];
                await renderWorldBookEntryOptions(selected);
                if (deleteCircleBtn) deleteCircleBtn.style.display = editingCircleId ? 'inline-flex' : 'none';
                if (createCircleModal) createCircleModal.style.display = 'flex';
            }

            function closeCreateCircleModal() {
                if (createCircleModal) createCircleModal.style.display = 'none';
            }

            if (createCircleBtn) createCircleBtn.addEventListener('click', async () => {
                await openCreateCircleModal(null);
            });
            if (cancelCreateCircleBtn) cancelCreateCircleBtn.addEventListener('click', closeCreateCircleModal);
            if (createCircleModal) createCircleModal.addEventListener('click', (e) => { if (e.target === createCircleModal) closeCreateCircleModal(); });
            if (deleteCircleBtn) deleteCircleBtn.addEventListener('click', async () => {
                if (!editingCircleId) return;
                if (!confirm('确定删除该圈子吗？')) return;
                const deletingId = editingCircleId;
                closeCreateCircleModal();
                try {
                    await ForumDB.deleteCircle(deletingId);
                } catch (e) {}
                const circles2 = await ForumDB.getCircles();
                if (!circles2 || circles2.length === 0) {
                    await initForum();
                    return;
                }
                try { localStorage.setItem('lastForumCircleId', String(circles2[0].id)); } catch (e) {}
                await initForum();
                await switchCircle(circles2[0].id);
            });

            async function renderCirclesList(circles, activeId) {
                const list = forumApp.querySelector('#circles-list');
                if (!list) return;
                list.innerHTML = '';
                circles.forEach(c => {
                    const item = document.createElement('div');
                    item.className = 'circle-item' + (String(c.id) === String(activeId) ? ' active' : '');
                    item.innerHTML = `
                        <div class="circle-icon"><i class="fas fa-users"></i></div>
                        <div style="flex:1;">${escapeHtml(c.name || '')}</div>
                        <div style="display:flex; gap:10px;">
                            <span class="circle-edit" data-id="${escapeHtml(c.id)}" style="color:#999; cursor:pointer;"><i class="fas fa-edit"></i></span>
                        </div>
                    `;
                    item.addEventListener('click', () => switchCircle(c.id));
                    list.appendChild(item);
                });
                list.querySelectorAll('.circle-edit').forEach(el => {
                    el.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        const id = el.getAttribute('data-id');
                        const circles2 = await ForumDB.getCircles();
                        const circle = circles2.find(x => String(x.id) === String(id));
                        await openCreateCircleModal(circle || null);
                    });
                });
            }

            async function generateAiPostsForCircle(circle, count) {
                if (!count || count <= 0) return [];
                const safeDesc = circle.description || '';
                let worldText = '';
                try {
                    const ids = Array.isArray(circle.boundWorldBookEntries) ? circle.boundWorldBookEntries.map(String) : [];
                    if (ids.length > 0) worldText = await getWorldBookTextsByIds(ids);
                } catch (e) {}
                const userPrompt = `圈子名称: ${circle.name || ''}\n圈子描述: ${safeDesc}\n世界书内容: ${worldText}\n请生成 ${count} 条帖子，返回 JSON 数组，每条包含 username、title、content 三个字段，只返回 JSON，不要添加其他文本。`;
                const raw = await requestAiResponse(userPrompt, buildForumSystemPrompt());
                const arr = safeJsonParseArray(raw);
                return arr.map((x, idx) => {
                    const item = x && typeof x === 'object' ? x : {};
                    const username = item.username || `路人${idx + 1}`;
                    return {
                    id: `${Date.now()}_${Math.random().toString(16).slice(2)}_${idx}`,
                    username,
                    title: item.title || '',
                    content: item.content || '',
                    time: '刚刚',
                    avatar: `https://ui-avatars.com/api/?name=${encodeURIComponent(username)}&background=random&color=fff`
                    };
                }).filter(p => p && p.id);
            }

            async function switchCircle(circleId) {
                const circles = await ForumDB.getCircles();
                const circle = circles.find(c => String(c.id) === String(circleId));
                if (!circle) return;
                window.__currentCircleCache = circle;
                const title = forumApp.querySelector('#home-title');
                const desc = forumApp.querySelector('#home-description');
                const tag = forumApp.querySelector('#home-worldbook-tag');
                if (title) title.textContent = circle.name || '最新动态';
                if (desc) {
                    const d = circle.description || '';
                    desc.textContent = d;
                    desc.style.display = d ? 'block' : 'none';
                }
                if (tag) {
                    const ids = Array.isArray(circle.boundWorldBookEntries) ? circle.boundWorldBookEntries : [];
                    if (ids.length > 0) {
                        tag.style.display = 'inline-flex';
                        const span = tag.querySelector('span');
                        if (span) span.textContent = `已绑定 ${ids.length} 条世界书`;
                    } else {
                        tag.style.display = 'none';
                    }
                }
                const posts = Array.isArray(circle.posts) ? circle.posts : [];
                const npc = Array.isArray(circle.npcPosts) ? circle.npcPosts : [];
                
                // 加载收藏缓存，确保后续状态正确
                try {
                    window.__favoritesCache = await ForumDB.getFavorites();
                } catch (e) {
                    window.__favoritesCache = [];
                }

                // 合并帖子：NPC帖子 + 用户帖子 + 收藏的帖子
                // 使用 Map 去重，收藏的帖子即使在刷新后不在 NPC 列表中，也会被保留在首页
                const mergedMap = new Map();
                if (forumSettings.generateNpcPosts) {
                    npc.forEach(p => { if (p && p.id) mergedMap.set(String(p.id), p); });
                }
                posts.forEach(p => { if (p && p.id) mergedMap.set(String(p.id), p); });
                
                // 将收藏的帖子也加入首页展示（如果不在当前列表中则追加）
                if (Array.isArray(window.__favoritesCache)) {
                    window.__favoritesCache.forEach(p => {
                        if (p && p.id) mergedMap.set(String(p.id), p);
                    });
                }

                const merged = Array.from(mergedMap.values()).filter(p => p && typeof p === 'object' && p.id !== null && p.id !== undefined);
                window.__allPostsCache = merged;
                
                const ownName = (currentUserProfile && currentUserProfile.nickname) ? currentUserProfile.nickname : '湫丘';
                const userPosts = posts.filter(p => p && p.username === ownName);
                renderUserPosts(userPosts);
                try { localStorage.setItem('lastForumCircleId', String(circle.id)); } catch (e) {}

                const home = forumApp.querySelector('#home-posts-container');
                const hot = forumApp.querySelector('#hot-posts-container');
                renderPosts(merged, home);
                renderPosts(merged.slice().reverse(), hot);

                await renderCirclesList(circles, circle.id);
                closeSidebar();
            }

            const refreshBtn = forumApp.querySelector('#forum-refresh-btn');
            if (refreshBtn) {
                refreshBtn.addEventListener('click', async () => {
                    const circle = window.__currentCircleCache;
                    if (!circle) return;
                    if (window.__forumRefreshTask) {
                        showForumToast('正在生成帖子…');
                        return;
                    }
                    if ((forumSettings.postCount || 0) <= 0) {
                        showForumToast('帖子数量为 0，无需刷新');
                        return;
                    }
                    const profile = getActiveAiProfile();
                    if (!profile || !profile.url || !profile.key || !profile.model) {
                        showForumToast('AI未配置，请先在设置里配置');
                        try { openSettingsModal(); } catch (e) {}
                        return;
                    }
                    refreshBtn.disabled = true;
                    refreshBtn.classList.add('is-refreshing');
                    showForumToast('正在生成帖子…');
                    try {
                        window.__forumRefreshTask = (async () => {
                            const posts = await generateAiPostsForCircle(circle, forumSettings.postCount || 0);
                            circle.npcPosts = posts;
                            await ForumDB.addCircle(circle);
                            await switchCircle(circle.id);
                        })();
                        await window.__forumRefreshTask;
                        showForumToast('论坛帖子已刷新');
                    } catch (e) {
                        showForumToast(`刷新失败：${(e && e.message) ? e.message : '未知错误'}`);
                    } finally {
                        window.__forumRefreshTask = null;
                        refreshBtn.classList.remove('is-refreshing');
                        refreshBtn.disabled = false;
                    }
                });
            }

            const settingsBtn = forumApp.querySelector('#forum-settings-btn');
            const settingsModal = forumApp.querySelector('#forum-settings-modal');
            const closeSettingsBtn = forumApp.querySelector('#close-forum-settings');
            const postCountRange = forumApp.querySelector('#post-count-range');
            const postCountValue = forumApp.querySelector('#post-count-value');
            const commentCountRange = forumApp.querySelector('#comment-count-range');
            const commentCountValue = forumApp.querySelector('#comment-count-value');
            const npcPostToggle = forumApp.querySelector('#npc-post-toggle');
            const npcCommentToggle = forumApp.querySelector('#npc-comment-toggle');
            const aiPromptInput = forumApp.querySelector('#ai-prompt-input');

            function openSettingsModal() {
                if (!settingsModal) return;
                if (postCountRange) postCountRange.value = String(forumSettings.postCount || 0);
                if (postCountValue) postCountValue.textContent = String(forumSettings.postCount || 0);
                if (commentCountRange) commentCountRange.value = String(forumSettings.commentCount || 0);
                if (commentCountValue) commentCountValue.textContent = String(forumSettings.commentCount || 0);
                if (npcPostToggle) npcPostToggle.checked = !!forumSettings.generateNpcPosts;
                if (npcCommentToggle) npcCommentToggle.checked = !!forumSettings.generateNpcComments;
                if (aiPromptInput) aiPromptInput.value = String(forumSettings.promptText || '');
                settingsModal.style.display = 'flex';
                populateAiProfiles();
            }

            function closeSettingsModal() {
                if (!settingsModal) return;
                settingsModal.style.display = 'none';
                saveForumSettings();
            }

            if (settingsBtn) settingsBtn.addEventListener('click', openSettingsModal);
            if (closeSettingsBtn) closeSettingsBtn.addEventListener('click', closeSettingsModal);
            if (settingsModal) settingsModal.addEventListener('click', (e) => { if (e.target === settingsModal) closeSettingsModal(); });
            if (postCountRange) postCountRange.addEventListener('input', () => { forumSettings.postCount = parseInt(postCountRange.value, 10) || 0; if (postCountValue) postCountValue.textContent = String(forumSettings.postCount); });
            if (commentCountRange) commentCountRange.addEventListener('input', () => { forumSettings.commentCount = parseInt(commentCountRange.value, 10) || 0; if (commentCountValue) commentCountValue.textContent = String(forumSettings.commentCount); });
            if (npcPostToggle) npcPostToggle.addEventListener('change', () => { forumSettings.generateNpcPosts = !!npcPostToggle.checked; saveForumSettings(); });
            if (npcCommentToggle) npcCommentToggle.addEventListener('change', () => { forumSettings.generateNpcComments = !!npcCommentToggle.checked; saveForumSettings(); });
            if (aiPromptInput) aiPromptInput.addEventListener('input', () => { forumSettings.promptText = String(aiPromptInput.value || ''); saveForumSettings(); });

            const aiProfileSelect = forumApp.querySelector('#ai-profile-select');
            const aiProfileDetail = forumApp.querySelector('#ai-profile-detail');

            function populateAiProfiles() {
                if (!aiProfileSelect) return;
                aiProfileSelect.innerHTML = '';
                const cfg = getAiServiceConfig();
                const profiles = cfg && Array.isArray(cfg.profiles) ? cfg.profiles : [];
                if (profiles.length === 0) {
                    const opt = document.createElement('option');
                    opt.value = '';
                    opt.textContent = '未配置';
                    aiProfileSelect.appendChild(opt);
                    if (aiProfileDetail) aiProfileDetail.textContent = '';
                    aiProfileSelect.onchange = null;
                    return;
                }
                profiles.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.id;
                    opt.textContent = p.name || p.id;
                    aiProfileSelect.appendChild(opt);
                });
                const active = cfg && cfg.activeId ? cfg.activeId : profiles[0].id;
                aiProfileSelect.value = active;
                updateAiProfileDetail();
                aiProfileSelect.onchange = () => {
                    try {
                        const raw = localStorage.getItem('ai_service_config');
                        const obj = raw ? JSON.parse(raw) : {};
                        obj.activeId = aiProfileSelect.value;
                        localStorage.setItem('ai_service_config', JSON.stringify(obj));
                    } catch (e) {}
                    updateAiProfileDetail();
                };
            }

            function updateAiProfileDetail() {
                if (!aiProfileSelect || !aiProfileDetail) return;
                const cfg = getAiServiceConfig();
                const profiles = cfg && Array.isArray(cfg.profiles) ? cfg.profiles : [];
                const p = profiles.find(x => x && x.id === aiProfileSelect.value);
                if (!p) { aiProfileDetail.textContent = ''; return; }
                aiProfileDetail.textContent = `URL: ${p.url || ''}\nModel: ${p.model || ''}`;
            }

            if (confirmCreateCircleBtn) {
                confirmCreateCircleBtn.addEventListener('click', async () => {
                    const name = newCircleNameInput ? String(newCircleNameInput.value || '').trim() : '';
                    if (!name) { showForumToast('请输入圈子名称'); return; }
                    const descText = newCircleDescInput ? String(newCircleDescInput.value || '').trim() : '';
                    const circles = await ForumDB.getCircles();
                    const boundWorldBookEntries = getSelectedWorldBookIds();
                    const circleData = editingCircleId ? (circles.find(c => String(c.id) === String(editingCircleId)) || {}) : {};
                    const id = editingCircleId || (`circle_${Date.now()}_${Math.random().toString(16).slice(2)}`);
                    const out = {
                        ...circleData,
                        id,
                        name,
                        description: descText,
                        boundWorldBookEntries,
                        posts: Array.isArray(circleData.posts) ? circleData.posts : [],
                        npcPosts: Array.isArray(circleData.npcPosts) ? circleData.npcPosts : []
                    };
                    await ForumDB.addCircle(out);
                    closeCreateCircleModal();
                    await initForum();
                    await switchCircle(id);
                });
            }

            const editPostsBtn = forumApp.querySelector('#edit-posts-btn');
            let isEditMode = false;
            if (editPostsBtn) {
                editPostsBtn.addEventListener('click', () => {
                    isEditMode = !isEditMode;
                    const home = forumApp.querySelector('#home-posts-container');
                    if (home) home.classList.toggle('edit-mode', isEditMode);
                    editPostsBtn.classList.toggle('editing', isEditMode);
                });
            }

            const submitPostBtn = forumApp.querySelector('.submit-post-btn');
            const postTitleInput = forumApp.querySelector('.post-input-title');
            const postContentInput = forumApp.querySelector('.post-input-content');
            if (submitPostBtn) {
                submitPostBtn.addEventListener('click', async () => {
                    const title = postTitleInput ? String(postTitleInput.value || '').trim() : '';
                    const content = postContentInput ? String(postContentInput.value || '').trim() : '';
                    if (!content && !title) { showForumToast('写点内容再发布'); return; }
                    const circle = window.__currentCircleCache;
                    if (!circle) { showForumToast('未找到圈子'); return; }
                    const profile = getUserProfileSnapshot();
                    const newPost = {
                        id: `post_${Date.now()}_${Math.random().toString(16).slice(2)}`,
                        username: profile.nickname,
                        avatar: profile.avatar,
                        title,
                        content,
                        time: '刚刚',
                        comments: []
                    };
                    circle.posts = Array.isArray(circle.posts) ? circle.posts : [];
                    circle.posts.unshift(newPost);
                    await ForumDB.addCircle(circle);
                    if (postTitleInput) postTitleInput.value = '';
                    if (postContentInput) postContentInput.value = '';
                    showForumToast('发布成功');
                    await switchCircle(circle.id);
                    await switchTab('home');
                    await ForumDB.addMessage({
                        type: 'post',
                        title: '发帖成功',
                        text: title ? `你发布了《${title}》` : '你发布了一条新帖子'
                    });
                    await refreshMessages();
                });
            }

            const commentInput = forumApp.querySelector('#post-detail-comment-input');
            const commentSubmit = forumApp.querySelector('#post-detail-comment-submit');
            const commentRefreshBtn = forumApp.querySelector('#post-detail-refresh-comments');
            if (commentSubmit) {
                commentSubmit.addEventListener('click', async () => {
                    const text = commentInput ? String(commentInput.value || '').trim() : '';
                    if (!text) { showForumToast('请输入评论内容'); return; }
                    if (!currentPostId) { showForumToast('未找到帖子'); return; }
                    const circle = window.__currentCircleCache;
                    if (!circle) { showForumToast('未找到圈子'); return; }
                    const post = findPostInCircle(circle, currentPostId);
                    if (!post) { showForumToast('未找到帖子'); return; }
                    const profile = getUserProfileSnapshot();
                    const newComment = {
                        id: `comment_${Date.now()}_${Math.random().toString(16).slice(2)}`,
                        username: profile.nickname,
                        content: text,
                        avatar: profile.avatar,
                        createdAt: Date.now()
                    };
                    post.comments = Array.isArray(post.comments) ? post.comments : [];
                    post.comments.unshift(newComment);
                    await ForumDB.addCircle(circle);
                    if (commentInput) commentInput.value = '';
                    const list = forumApp.querySelector('#post-detail-comments-list');
                    if (list) list.prepend(createCommentElement(newComment));
                    const countEl = forumApp.querySelector('#post-detail-comment-count');
                    if (countEl && list) countEl.textContent = String(list.children.length || 0);
                    showForumToast('评论已发布');
                    await ForumDB.addMessage({
                        type: 'comment',
                        title: '评论成功',
                        text: post.title ? `你评论了《${post.title}》` : '你评论了一条帖子'
                    });
                    await refreshMessages();
                });

            if (commentRefreshBtn) {
                commentRefreshBtn.addEventListener('click', async () => {
                    await refreshPostDetailComments(false);
                });
            }

            const profileNickname = forumApp.querySelector('.profile-nickname');
            const profileBio = forumApp.querySelector('.profile-bio');
            const profileForumId = forumApp.querySelector('.profile-meta span:nth-child(1)');
            const profileIpLocation = forumApp.querySelector('.profile-meta span:nth-child(2)');
            const emptyAvatar = forumApp.querySelector('.empty-avatar');
            const avatarUpload = forumApp.querySelector('#avatar-upload');

            async function initForum() {
                const profile = await ForumDB.getProfile();
                currentUserProfile = profile || { nickname: '湫丘', avatar: '' };
                if (profile) {
                    if (profileNickname) profileNickname.textContent = profile.nickname || '';
                    if (profileBio) profileBio.textContent = profile.bio || '';
                    if (profileForumId) profileForumId.textContent = `论坛号: ${profile.forumId || ''}`;
                    if (profileIpLocation) profileIpLocation.textContent = `IP属地: ${profile.ipLocation || ''}`;
                    if (emptyAvatar && profile.avatar) {
                        emptyAvatar.style.backgroundImage = `url(${profile.avatar})`;
                        emptyAvatar.style.backgroundSize = 'cover';
                        emptyAvatar.style.backgroundPosition = 'center';
                    }
                }

                let circles = await ForumDB.getCircles();
                if (!circles || circles.length === 0) {
                    const defaultCircle = {
                        id: `circle_${Date.now()}`,
                        name: '默认圈子',
                        description: '欢迎来到论坛圈子',
                        boundWorldBookEntries: [],
                        posts: [],
                        npcPosts: []
                    };
                    await ForumDB.addCircle(defaultCircle);
                    circles = [defaultCircle];
                }
                const last = (() => { try { return localStorage.getItem('lastForumCircleId'); } catch (e) { return null; } })();
                const active = last && circles.some(c => String(c.id) === String(last)) ? last : circles[0].id;
                await renderCirclesList(circles, active);
                await switchCircle(active);
                await refreshMessages();
            }

            initForum().then(() => {
                try {
                    window.parent.postMessage({ type: 'app_ready', appId: 'forum' }, '*');
                } catch (e) {
                    console.error('Failed to send app_ready message:', e);
                }
            }).catch(() => {
                try {
                    window.parent.postMessage({ type: 'app_ready', appId: 'forum' }, '*');
                } catch (e) {
                    console.error('Failed to send app_ready message:', e);
                }
            });

            if (emptyAvatar && avatarUpload) {
                emptyAvatar.addEventListener('click', () => avatarUpload.click());
                avatarUpload.addEventListener('change', async (e) => {
                    const file = e.target && e.target.files ? e.target.files[0] : null;
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = async () => {
                        const dataUrl = reader.result;
                        if (emptyAvatar) {
                            emptyAvatar.style.backgroundImage = `url(${dataUrl})`;
                            emptyAvatar.style.backgroundSize = 'cover';
                            emptyAvatar.style.backgroundPosition = 'center';
                        }
                        if (!currentUserProfile) currentUserProfile = { nickname: '湫丘', avatar: '' };
                        currentUserProfile.avatar = dataUrl;
                        await ForumDB.updateProfile({ avatar: dataUrl });
                    };
                    reader.readAsDataURL(file);
                });
            }

            const editProfileModal = forumApp.querySelector('#edit-profile-modal');
            const cancelEditBtn = forumApp.querySelector('#cancel-edit-btn');
            const saveEditBtn = forumApp.querySelector('#save-edit-btn');
            const editNickname = forumApp.querySelector('#edit-nickname');
            const editBio = forumApp.querySelector('#edit-bio');
            const editForumId = forumApp.querySelector('#edit-forum-id');
            const editIpLocation = forumApp.querySelector('#edit-ip-location');

            function openEditProfileModal() {
                if (!editProfileModal) return;
                editProfileModal.style.display = 'flex';
                if (editNickname && profileNickname) editNickname.value = profileNickname.textContent || '';
                if (editBio && profileBio) editBio.value = profileBio.textContent || '';
                if (editForumId && profileForumId) editForumId.value = String(profileForumId.textContent || '').replace('论坛号: ', '');
                if (editIpLocation && profileIpLocation) editIpLocation.value = String(profileIpLocation.textContent || '').replace('IP属地: ', '');
            }

            if (profileNickname) profileNickname.addEventListener('click', openEditProfileModal);
            if (profileBio) profileBio.addEventListener('click', openEditProfileModal);
            if (profileForumId) profileForumId.addEventListener('click', openEditProfileModal);
            if (profileIpLocation) profileIpLocation.addEventListener('click', openEditProfileModal);
            if (cancelEditBtn && editProfileModal) cancelEditBtn.addEventListener('click', () => { editProfileModal.style.display = 'none'; });
            if (saveEditBtn && editProfileModal) {
                saveEditBtn.addEventListener('click', async () => {
                    const newData = {
                        nickname: editNickname ? editNickname.value.trim() : '',
                        bio: editBio ? editBio.value.trim() : '',
                        forumId: editForumId ? editForumId.value.trim() : '',
                        ipLocation: editIpLocation ? editIpLocation.value.trim() : ''
                    };
                    if (profileNickname && newData.nickname) profileNickname.textContent = newData.nickname;
                    if (profileBio && newData.bio) profileBio.textContent = newData.bio;
                    if (profileForumId && newData.forumId) profileForumId.textContent = `论坛号: ${newData.forumId}`;
                    if (profileIpLocation && newData.ipLocation) profileIpLocation.textContent = `IP属地: ${newData.ipLocation}`;
                    if (!currentUserProfile) currentUserProfile = { nickname: '湫丘', avatar: '' };
                    currentUserProfile = { ...currentUserProfile, ...newData };
                    ForumDB.updateProfile(newData);
                    editProfileModal.style.display = 'none';
                });
            }

            if (editProfileModal) {
                editProfileModal.addEventListener('click', (e) => {
                    if (e.target === editProfileModal) {
                        editProfileModal.style.display = 'none';
                    }
                });
            }
        })();
    </script>
</body>
</html>
