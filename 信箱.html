<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#fdf2f8">  
    <!-- PWA 配置 -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="icon" href="icons/icon-192.png" type="image/png" sizes="192x192">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png" sizes="180x180">
    <!-- iOS PWA 兼容 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="湫丘捕梦机">
    <title>信箱</title>
    <link rel="stylesheet" href="css/core-icons.min.css">
    <link rel="stylesheet" href="css/core-ui.css">
    <script src="js/core/OperaKeyboardFix.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            height: 100%;
        }
        
        :root {
            --primary-color: #f8e1e7;
            --secondary-color: #d8a1c4;
            --accent-color: #b86b9a;
            --dark-color: #8a4b6f;
            --light-color: #fff8fb;
            --text-color: #5a3a4c;
            --shadow-color: rgba(138, 75, 111, 0.15);
            --envelope-color: #f9e9ef;
            --paper-color: #fffcf9;
            --mailbox-font-family: 'Noto Serif SC', serif;
            --theme-font-family: 'Noto Serif SC', serif;
            --paper-font-family: 'Noto Serif SC', serif;
            --paper-font-size: 0.95rem;
            --paper-font-color: var(--text-color);
            --envelope-text-font-family: 'Noto Serif SC', serif;
            --envelope-text-size: 0.85rem;
            --envelope-text-color: var(--accent-color);
            --mailbox-home-bg: linear-gradient(135deg, #fdf2f8 0%, #fce7f3 100%);
            --mailbox-topbar-bg: rgba(255, 255, 255, 0.92);
            --mailbox-paper-bg: none;
            --mailbox-paper-bg-image: none;
        }
        
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: var(--theme-font-family, var(--mailbox-font-family));
            background: var(--mailbox-home-bg);
            color: var(--text-color);
            /* 移除 position: fixed，改用 overflow: hidden 锁定根容器 */
            overflow: hidden;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        body.is-scroll-locked {
            overflow: hidden;
            /* iOS Safari: 仅在需要锁定时使用，避免影响子元素滚动 */
            /* touch-action: none 会阻止所有触摸，改用 overflow 控制 */
        }

        button,
        input,
        textarea {
            font: inherit;
            color: inherit;
        }

        button {
            touch-action: manipulation;
        }

        :focus-visible {
            outline: 3px solid rgba(184, 107, 154, 0.45);
            outline-offset: 2px;
        }
        
        .app-container {
            max-width: 100%;
            height: var(--app-height, 100svh);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        /* 顶部标题栏 */
        .app-header {
            background: var(--mailbox-topbar-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: calc(20px + var(--safe-inset-top, env(safe-area-inset-top))) calc(20px + env(safe-area-inset-right)) 20px calc(20px + env(safe-area-inset-left));
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 10px var(--shadow-color);
            z-index: 100;
            position: relative;
        }
        
        .app-title {
            font-size: 1.8rem;
            color: var(--dark-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .app-title i {
            font-size: 2rem;
        }
        
        .add-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--accent-color);
            color: white;
            border: none;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .add-btn:active {
            transform: scale(0.95);
        }

        .fab-compose {
            position: fixed;
            right: calc(22px + env(safe-area-inset-right));
            bottom: calc(86px + env(safe-area-inset-bottom));
            width: 56px;
            height: 56px;
            border-radius: 18px;
            background: var(--accent-color);
            color: #fff;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.45rem;
            box-shadow: 0 14px 40px rgba(138, 75, 111, 0.28);
            z-index: 120;
            cursor: pointer;
            touch-action: manipulation;
            transition: transform 0.2s ease;
        }

        .fab-compose:active {
            transform: scale(0.96);
        }

        .is-icon-image {
            background-repeat: no-repeat;
            background-position: center;
            background-size: 100% 100% !important;
            border: none !important;
        }

        .is-icon-image i {
            opacity: 0;
        }
        
        /* 信件列表区域 - iOS滚动优化 */
        .letters-container {
            flex: 1;
            padding: 20px;
            padding-bottom: 80px;
            min-height: 0;
            /* iOS Safari 滚动必需属性 */
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
            touch-action: pan-y;
        }
        
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60vh;
            color: var(--accent-color);
            text-align: center;
        }
        
        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .empty-state p {
            font-size: 1.2rem;
            max-width: 80%;
            line-height: 1.5;
        }
        
        /* 信封样式 */
        .envelope-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .envelope-item {
            background: var(--envelope-color);
            border-radius: 8px;
            padding: 15px;
            position: relative;
            border: 1px solid rgba(216, 161, 196, 0.5);
            cursor: pointer;
            transition: transform 0.3s ease;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* iOS 长按防护（已存在，确保完整） */
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            touch-action: pan-y;
        }
        
        .envelope-item:active {
            transform: scale(0.98);
        }
        
        /* 对角线交叉的半透明实线 */
        .diagonal-line {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }
        
        .diagonal-line::before,
        .diagonal-line::after {
            content: '';
            position: absolute;
            background: rgba(184, 107, 154, 0.2);
            width: 1px;
            height: 140%;
            top: -20%;
            left: 50%;
        }
        
        .diagonal-line::before {
            transform: translateX(-50%) rotate(45deg);
        }
        
        .diagonal-line::after {
            transform: translateX(-50%) rotate(-45deg);
        }
        
        /* 圆形白底爱心图标 */
        .envelope-heart {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 36px;
            height: 36px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(138, 75, 111, 0.2);
            z-index: 2;
        }
        
        .envelope-heart i {
            color: var(--accent-color);
            font-size: 1.2rem;
        }
        
        /* 日期显示在爱心图标上方 */
        .envelope-date {
            position: absolute;
            top: 15px;
            left: 0;
            width: 100%;
            font-size: var(--envelope-text-size);
            color: var(--envelope-text-color);
            font-family: var(--envelope-text-font-family);
            text-align: center;
            font-style: italic;
            opacity: 0.8;
            z-index: 2;
        }
        
        /* 信件内容全屏视图 */
        .letter-fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            height: 100svh;
            background: var(--paper-color);
            z-index: 1000;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }
        
        .letter-header {
            padding: calc(20px + var(--safe-inset-top, env(safe-area-inset-top))) calc(20px + env(safe-area-inset-right)) 20px calc(20px + env(safe-area-inset-left));
            background: var(--mailbox-topbar-bg);
            border-bottom: 1px solid rgba(216, 161, 196, 0.3);
            display: flex;
            align-items: center;
            box-shadow: 0 2px 8px var(--shadow-color);
        }
        
        .back-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: transparent;
            border: none;
            font-size: 1.5rem;
            color: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-right: 15px;
        }
        
        .letter-header-title {
            font-size: 1.2rem;
            color: var(--dark-color);
        }

        .letter-actions {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .letter-action-btn {
            background: transparent;
            border: none;
            color: var(--accent-color);
            font-size: 1.05rem;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .letter-delete-btn {
            color: #c0392b;
        }
        
        .letter-content-wrapper {
            flex: 1;
            padding: 25px 20px;
            position: relative;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        
        /* 信件内容虚线框 */
        .letter-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            border: 1px dashed rgba(184, 107, 154, 0.4);
            border-radius: 12px;
            padding: 20px;
            background-image: linear-gradient(rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0.82)), var(--mailbox-paper-bg-image, none);
            background-size: cover, cover;
            background-position: center, center;
            background-repeat: no-repeat, no-repeat;
            position: relative;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            touch-action: pan-y;
        }
        
        /* 信件内部字体缩小1/3 */
        .recipient-line {
            font-size: 1.1rem; /* 原1.4rem缩小1/3 */
            margin-bottom: 20px; /* 相应缩小间距 */
            color: var(--dark-color);
        }
        
        .letter-body {
            flex: 1;
            min-height: 200px;
            font-family: var(--paper-font-family);
            font-size: var(--paper-font-size);
            line-height: 1.6; /* 原1.8缩小1/3 */
            color: var(--paper-font-color);
            white-space: pre-wrap;
            word-wrap: break-word;
            margin-bottom: 15px; /* 相应缩小间距 */
        }

        .letter-edit-body {
            flex: 1;
            min-height: 200px;
            outline: none;
            border: none;
            font-family: var(--paper-font-family);
            font-size: var(--paper-font-size);
            line-height: 1.6;
            color: var(--paper-font-color);
            background: transparent;
            resize: none;
            margin-bottom: 15px;
        }
        
        .sender-info {
            align-self: flex-end;
            text-align: right;
            margin-top: 15px; /* 相应缩小间距 */
        }
        
        .sender-name {
            font-size: 1.05rem; /* 原1.3rem缩小1/3 */
            color: var(--dark-color);
            margin-bottom: 6px; /* 相应缩小间距 */
        }
        
        .letter-date-full {
            font-size: 0.85rem; /* 原1rem缩小1/3 */
            color: var(--accent-color);
        }
        
        /* 写新信浮窗 */
        .new-letter-modal {
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: var(--z-overlay, 2000);
            display: none;
            align-items: flex-start;
            justify-content: center;
            animation: fadeIn 0.3s ease;
            padding: calc(10vh + env(safe-area-inset-top)) calc(16px + env(safe-area-inset-right)) calc(16px + env(safe-area-inset-bottom)) calc(16px + env(safe-area-inset-left));
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .modal-content {
            background: white;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(138, 75, 111, 0.3);
            animation: scaleIn 0.3s ease;
            max-height: calc(100dvh - 32px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
            overflow: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: none;
            touch-action: pan-y;
            display: flex;
            flex-direction: column;
        }

        .keyboard-spacer {
            flex: 0 0 auto;
            height: 0;
            min-height: 0;
            max-height: 0;
            will-change: auto;
            transition: height 0.3s ease;
        }

        html.ua-android-opera .keyboard-spacer {
            will-change: auto !important;
            transition: none !important;
        }

        .modal-content.keyboard-open .keyboard-spacer {
            flex: 0 0 300px;
        }
        
        @keyframes scaleIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        .modal-title {
            font-size: 1.5rem;
            color: var(--dark-color);
            margin-bottom: 25px;
            text-align: center;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--primary-color);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--accent-color);
            font-weight: 500;
        }
        
        .form-input {
            width: 100%;
            padding: 15px;
            border: 1px solid rgba(216, 161, 196, 0.5);
            border-radius: 12px;
            font-family: 'Noto Serif SC', serif;
            font-size: 1rem;
            background-color: rgba(255, 255, 255, 0.8);
            color: var(--text-color);
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(184, 107, 154, 0.2);
        }
        
        .modal-actions {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }
        
        .btn {
            padding: 14px 28px;
            border-radius: 50px;
            font-family: 'Noto Serif SC', serif;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }
        
        .btn-primary {
            background: var(--accent-color);
            color: white;
        }
        
        .btn-primary:active {
            transform: translateY(2px);
        }
        
        .btn-secondary {
            background: transparent;
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
        }
        
        .btn-secondary:active {
            background: rgba(216, 161, 196, 0.1);
        }
        
        /* 全屏写信页面 */
        .compose-fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            height: 100svh;
            background: var(--paper-color);
            z-index: 1500;
            display: none;
            flex-direction: column;
        }
        
        .compose-header {
            padding: calc(20px + var(--safe-inset-top, env(safe-area-inset-top))) calc(20px + env(safe-area-inset-right)) 20px calc(20px + env(safe-area-inset-left));
            background: var(--mailbox-topbar-bg);
            border-bottom: 1px solid rgba(216, 161, 196, 0.3);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px var(--shadow-color);
        }

        .config-fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            height: 100svh;
            background: var(--paper-color);
            z-index: 1800;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }

        .config-header {
            padding: calc(20px + var(--safe-inset-top, env(safe-area-inset-top))) calc(20px + env(safe-area-inset-right)) 20px calc(20px + env(safe-area-inset-left));
            background: var(--mailbox-topbar-bg);
            border-bottom: 1px solid rgba(216, 161, 196, 0.3);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px var(--shadow-color);
        }

        .config-title {
            font-size: 1.25rem;
            color: var(--dark-color);
        }

        .config-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .config-btn {
            background: transparent;
            border: 1px solid rgba(184, 107, 154, 0.35);
            color: var(--accent-color);
            border-radius: 999px;
            padding: 8px 12px;
            font-size: 0.95rem;
            cursor: pointer;
            touch-action: manipulation;
        }

        .config-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            min-height: 0;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            touch-action: pan-y;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .config-content::-webkit-scrollbar {
            display: none;
        }

        .config-card {
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(216, 161, 196, 0.45);
            border-radius: 16px;
            padding: 14px;
            box-shadow: 0 10px 30px rgba(138, 75, 111, 0.12);
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            touch-action: pan-y;
        }

        .config-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .config-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .config-row label {
            font-size: 0.95rem;
            color: rgba(90, 58, 76, 0.9);
        }

        .config-input,
        .config-select {
            width: 100%;
            padding: 12px 12px;
            border-radius: 12px;
            border: 1px solid rgba(216, 161, 196, 0.55);
            background: rgba(255, 255, 255, 0.9);
        }

        .config-inline {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .config-inline > * {
            flex: 1;
        }

        .config-small-btn {
            flex: 0 0 auto;
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid rgba(184, 107, 154, 0.35);
            background: transparent;
            color: var(--accent-color);
            cursor: pointer;
            touch-action: manipulation;
        }

        .asset-line {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .asset-preview {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            border: 1px solid rgba(216, 161, 196, 0.55);
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 8px 20px rgba(138, 75, 111, 0.12);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;
            touch-action: manipulation;
        }

        .asset-preview.is-cover {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .asset-preview.is-cover i {
            opacity: 0;
        }

        .bg-preview {
            width: 128px;
            height: 72px;
            border-radius: 18px;
            border: 1px solid rgba(216, 161, 196, 0.55);
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 26px rgba(138, 75, 111, 0.14);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;
            touch-action: manipulation;
        }

        .bg-line {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .bg-line .config-input {
            flex: 1;
        }

        .bg-preview.is-cover {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .bg-preview i {
            color: var(--accent-color);
            font-size: 1.2rem;
        }

        .bg-preview.is-cover i {
            opacity: 0;
        }

        .crop-modal {
            position: fixed;
            inset: 0;
            z-index: 3000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: calc(18px + env(safe-area-inset-top)) calc(16px + env(safe-area-inset-right)) calc(18px + env(safe-area-inset-bottom)) calc(16px + env(safe-area-inset-left));
            background: rgba(24, 16, 22, 0.55);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .crop-modal.show {
            display: flex;
        }

        .crop-content {
            width: min(420px, 100%);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(216, 161, 196, 0.45);
            box-shadow: 0 18px 56px rgba(0, 0, 0, 0.25);
            overflow: hidden;
        }

        .crop-header {
            padding: 12px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(216, 161, 196, 0.25);
        }

        .crop-header-title {
            font-size: 1rem;
            color: var(--dark-color);
        }

        .crop-wrapper {
            position: relative;
            width: 100%;
            height: 320px;
            background: rgba(255, 255, 255, 0.7);
            touch-action: none;

        .compose-btn {

            position: relative;
            display: flex;
            flex-direction: column;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
            touch-action: pan-y;
        }
        
        /* 写信时的虚线框 */
        .compose-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            border: 1px dashed rgba(184, 107, 154, 0.4);

            -webkit-user-select: none;

            touch-action: pan-y;
        }
        
        /* 写信页字体也缩小1/3 */

        .compose-body {

        .compose-body::placeholder {

        textarea.text-card {

        .compose-sender-info {

        .compose-sender-name {

        .compose-date {
            font-size: 0.85rem; /* 原1rem缩小1/3 */
            color: var(--accent-color);
        }
        
        /* 确认投递提示 */
        .confirm-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 2500;
            display: none;
            align-items: center;
            justify-content: center;
        }
        
        .confirm-content {
            background: white;
            border-radius: 20px;
            width: 85%;
            max-width: 350px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(138, 75, 111, 0.3);
            text-align: center;
            max-height: calc(100dvh - 32px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
            overflow: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            touch-action: pan-y;
        }
        
        .confirm-icon {
            font-size: 3rem;
            color: var(--accent-color);
            margin-bottom: 20px;
        }
        
        .confirm-text {
            font-size: 1.2rem;
            margin-bottom: 25px;
            color: var(--text-color);
            line-height: 1.5;
        }

        .confirm-detail {
            margin-top: 8px;
            font-size: 0.9rem;
            color: rgba(90, 58, 76, 0.75);
            line-height: 1.5;
            word-break: break-word;
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: calc(18px + env(safe-area-inset-bottom));
            transform: translateX(-50%);
            max-width: calc(100% - 32px);
            padding: 12px 14px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 10px 30px rgba(138, 75, 111, 0.22);
            border: 1px solid rgba(216, 161, 196, 0.55);
            color: var(--text-color);
            z-index: 3000;
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .toast.is-visible {
            opacity: 1;
            transform: translateX(-50%) translateY(-4px);
            visibility: visible;
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }
        
        .confirm-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        
        .font-input-group {
            display: flex;
            gap: 6px;
            align-items: center;
            flex: 1;
        }
        
        .font-input-group .config-input {
            flex: 1;
            min-width: 0;
        }
        
        .font-upload-btn {
            flex-shrink: 0;
            padding: 6px 10px;
        }
        
        .font-upload-btn i {
            font-size: 0.85rem;
        }
        
        /* 响应式调整 */
        @media (min-width: 768px) {
            .app-container {
                max-width: 500px;
                margin: 0 auto;
                height: var(--app-height, 100svh);
                box-shadow: 0 0 30px rgba(138, 75, 111, 0.1);
            }
            
            .app-header {
                border-radius: 0;
            }
            
            .letters-container {
                padding-bottom: 30px;
            }
            
            .letter-content-wrapper,
            .compose-content {
                padding: 25px;
            }
        }

        body.is-typing .app-header,
        body.is-typing .letter-header,
        body.is-typing .compose-header,
        body.is-typing .config-header {
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
        }

        :root[data-surface-style="glass"] .letter-container,
        :root[data-surface-style="glass"] .compose-container,
        :root[data-surface-style="glass"] .config-card,
        :root[data-surface-style="glass"] .new-letter-content,
        :root[data-surface-style="glass"] .confirm-content {
            background-color: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(216, 161, 196, 0.38);
        }

        @supports ((-webkit-backdrop-filter: blur(1px)) or (backdrop-filter: blur(1px))) {
            :root[data-surface-style="glass"] .letter-container,
            :root[data-surface-style="glass"] .compose-container,
            :root[data-surface-style="glass"] .config-card,
            :root[data-surface-style="glass"] .new-letter-content,
            :root[data-surface-style="glass"] .confirm-content {
                -webkit-backdrop-filter: blur(12px);
                backdrop-filter: blur(12px);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }
    </style>
</head>
<body>
    <!-- 主应用界面 -->
    <div class="app-container">
        <header class="app-header">
            <div style="display: flex; align-items: center;">
                <button class="back-btn" id="main-back-btn" style="margin-right: 10px;" aria-label="返回" type="button">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <div class="app-title">
                    <i class="fas fa-inbox"></i>
                    <span>信箱</span>
                </div>
            </div>
            <button class="add-btn" id="open-config-btn" aria-label="设置" type="button">
                <i class="fas fa-ellipsis-v"></i>
            </button>
        </header>
        
        <div class="letters-container scroll-y-hidebar flex-scroll" id="letters-container">
            <!-- 信件列表将在这里动态生成 -->
            <div class="empty-state" id="empty-state">
                <i class="fas fa-envelope-open-text"></i>
                <p>信箱空空如也<br>点击右下角写一封信</p>
            </div>
            
            <!-- 信封列表 -->
            <div class="envelope-list" id="envelope-list" style="display: none;">
                <!-- 信封项将动态生成 -->
            </div>
        </div>
    </div>

    <button class="fab-compose" id="fab-compose-btn" aria-label="写一封信" type="button">
        <i class="fas fa-feather-alt"></i>
    </button>
    
    <!-- 信件内容全屏视图 -->
    <div class="letter-fullscreen" id="letter-fullscreen">
        <div class="letter-header">
            <button class="back-btn" id="back-from-letter" aria-label="返回" type="button">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="letter-header-title">信件内容</div>
            <div class="letter-actions">
                <button class="letter-action-btn" id="edit-letter-btn" type="button">
                    <i class="fas fa-pen"></i> 编辑
                </button>
                <button class="letter-action-btn" id="save-letter-btn" style="display: none;" type="button">
                    <i class="fas fa-check"></i> 保存
                </button>
                <button class="letter-action-btn letter-delete-btn" id="delete-letter-btn" style="display: none;" type="button">
                    <i class="fas fa-trash"></i> 删除
                </button>
            </div>
        </div>
        <div class="letter-content-wrapper scroll-y-hidebar flex-scroll">
            <div class="letter-container" id="letter-container">
                <!-- 信件内容将动态填充 -->
            </div>
        </div>
    </div>
    
    <!-- 写新信浮窗（第一步：填写发件人/收件人） -->
    <div class="new-letter-modal" id="new-letter-modal">
        <div class="modal-content" role="dialog" aria-modal="true" aria-label="写一封信">
            <div class="keyboard-spacer"></div>
            <h2 class="modal-title">写一封信</h2>
            <form id="sender-recipient-form">
                <div class="form-group">
                    <label class="form-label" for="sender-name">寄件人</label>
                    <input type="text" id="sender-name" class="form-input" placeholder="您的名字" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="recipient-name">收件人</label>
                    <input type="text" id="recipient-name" class="form-input" placeholder="收信人的名字" required>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="cancel-first-step">取消</button>
                    <button type="submit" class="btn btn-primary">下一步</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- 全屏写信页面（第二步：写信内容） -->
    <div class="compose-fullscreen" id="compose-fullscreen">
        <div class="compose-header">
            <button class="back-btn" id="back-from-compose" aria-label="返回" type="button">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="compose-title">写信</div>
            <div class="compose-actions">
                <button class="compose-btn" id="complete-letter" type="button">
                    <i class="fas fa-check"></i> 完成
                </button>
            </div>
        </div>
        <div class="compose-content">
            <div class="compose-container">
                <div class="compose-recipient-line" id="compose-recipient-line">致：</div>
                <textarea class="compose-body" id="compose-body" placeholder="写下您想说的话..."></textarea>
                <div class="compose-sender-info">
                    <div class="compose-sender-name" id="compose-sender-name"></div>
                    <div class="compose-date" id="compose-date"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 确认投递提示 -->
    <div class="confirm-modal" id="confirm-modal">
        <div class="confirm-content" role="dialog" aria-modal="true" aria-label="确认操作">
            <div class="confirm-icon">
                <i class="fas fa-paper-plane"></i>
            </div>
            <div class="confirm-text" id="confirm-text">确定要投递这封信吗？</div>
            <div class="confirm-detail" id="confirm-detail" style="display: none;"></div>
            <div class="confirm-actions">
                <button class="btn btn-secondary" id="cancel-send" type="button">取消</button>
                <button class="btn btn-primary" id="confirm-send" type="button">确定投递</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <div class="config-fullscreen" id="config-fullscreen">

        function getBlobUrlService() {
            if (window.Core && window.Core.BlobUrlService) return window.Core.BlobUrlService;
            if (window.parent && window.parent.Core && window.parent.Core.BlobUrlService) return window.parent.Core.BlobUrlService;
            return null;
        }

        function _getPostTargetOrigin() {
            const origin = window.location.origin;
            return origin && origin !== 'null' ? origin : '*';
        }

        function _isAllowedMessageOrigin(origin) {
            const expected = window.location.origin;
            if (!expected || expected === 'null') return true;
            return origin === expected;
        }

        window.addEventListener('message', (event) => {
            if (!_isAllowedMessageOrigin(event.origin)) return;
            if (event.data && event.data.type === 'surfaceStyle') {
                const payload = (event.data && event.data.payload) ? event.data.payload : {};
                const mode = String((payload && payload.mode) || '').trim();
                if (mode === 'glass') {
                    document.documentElement.setAttribute('data-surface-style', 'glass');
                } else {
                    document.documentElement.removeAttribute('data-surface-style');
                }
                return;
            }
        });

        (function () {
            if (!isIframe) return;
            try {
                if (window.parent && window.parent !== window) {
                    window.parent.postMessage({ type: 'requestSurfaceStyle' }, _getPostTargetOrigin());
                }
            } catch (e) {}
        })();

        (function () {
            let typingTimer = null;

            const isTypingTarget = (el) => {
                if (!el) return false;
                const tag = String(el.tagName || '').toLowerCase();
                if (tag === 'textarea') return true;
                if (tag === 'input') {
                    const type = String(el.getAttribute('type') || 'text').toLowerCase();
                    return !['checkbox', 'radio', 'button', 'submit', 'reset', 'range', 'file', 'color', 'hidden'].includes(type);
                }
                return false;
            };

            const refresh = () => {
                if (typingTimer) {
                    clearTimeout(typingTimer);
                    typingTimer = null;
                }
                typingTimer = setTimeout(() => {
                    typingTimer = null;
                    const active = document.activeElement;
                    if (isTypingTarget(active)) document.body.classList.add('is-typing');
                    else document.body.classList.remove('is-typing');
                }, 30);
            };

            document.addEventListener('focusin', (e) => {
                if (isTypingTarget(e && e.target)) document.body.classList.add('is-typing');
            }, true);

            document.addEventListener('focusout', refresh, true);
        })();

        window.MailboxStorageDB = {
            dbName: 'MailboxDB',
            version: 1,
            _db: null,
            _initPromise: null,

            _req(request) {
                return new Promise((resolve, reject) => {
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            },

            _txDone(tx) {
                return new Promise((resolve, reject) => {
                    tx.oncomplete = () => resolve();
                    tx.onabort = () => reject(tx.error || new Error('Transaction aborted'));
                    tx.onerror = () => reject(tx.error || new Error('Transaction failed'));
                });
            },

            _getCoreStorageService() {
                try {
                    const parent = window.parent;
                    const core = parent && parent !== window ? parent.Core : null;
                    return core && core.StorageService ? core.StorageService : null;
                } catch (e) {
                    return null;
                }
            },

            async init() {
                if (this._initPromise) return this._initPromise;

                this._initPromise = (async () => {
                    const storageService = this._getCoreStorageService();
                    if (storageService) {
                        await storageService.openDB(this.dbName, this.version, (db) => {
                            if (!db.objectStoreNames.contains('letters')) {
                                db.createObjectStore('letters', { keyPath: 'id' });
                            }
                        });
                        return;
                    }

                    await new Promise((resolve, reject) => {
                        const request = indexedDB.open(this.dbName, this.version);
                        request.onupgradeneeded = () => {
                            const db = request.result;
                            if (!db.objectStoreNames.contains('letters')) {
                                db.createObjectStore('letters', { keyPath: 'id' });
                            }
                        };
                        request.onsuccess = () => {
                            this._db = request.result;
                            resolve();
                        };
                        request.onerror = () => reject(request.error);
                    });
                })();

                return this._initPromise;
            },

            async getAllLetters() {
                await this.init();
                const storageService = this._getCoreStorageService();
                if (storageService) {
                    return storageService.transaction(this.dbName, ['letters'], async (tx) => {
                        const store = tx.objectStore('letters');
                        return await this._req(store.getAll());
                    });
                }

                if (!this._db) return [];
                const tx = this._db.transaction(['letters'], 'readonly');
                const store = tx.objectStore('letters');
                const result = await this._req(store.getAll());
                await this._txDone(tx);
                return result;
            },

            async saveLetter(letter) {
                await this.init();
                const storageService = this._getCoreStorageService();
                if (storageService) {
                    return storageService.transaction(this.dbName, ['letters'], async (tx) => {
                        const store = tx.objectStore('letters');
                        await this._req(store.put(letter));
                    });
                }

                if (!this._db) return;
                const tx = this._db.transaction(['letters'], 'readwrite');
                const store = tx.objectStore('letters');
                await this._req(store.put(letter));
                await this._txDone(tx);
            },

            async putLetters(letterList) {
                await this.init();
                const list = Array.isArray(letterList) ? letterList : [];

                const storageService = this._getCoreStorageService();
                if (storageService) {
                    return storageService.transaction(this.dbName, ['letters'], async (tx) => {
                        const store = tx.objectStore('letters');
                        for (const letter of list) {
                            await this._req(store.put(letter));
                        }
                    });
                }

                if (!this._db) return;
                const tx = this._db.transaction(['letters'], 'readwrite');
                const store = tx.objectStore('letters');
                for (const letter of list) {
                    await this._req(store.put(letter));
                }
                await this._txDone(tx);
            },

            async deleteLetter(id) {
                await this.init();
                const storageService = this._getCoreStorageService();
                if (storageService) {
                    return storageService.transaction(this.dbName, ['letters'], async (tx) => {
                        const store = tx.objectStore('letters');
                        await this._req(store.delete(id));
                    });
                }

                if (!this._db) return;
                const tx = this._db.transaction(['letters'], 'readwrite');
                const store = tx.objectStore('letters');
                await this._req(store.delete(id));
                await this._txDone(tx);
            }
        };

        async function loadLetters() {
            try {
                // 1. Try to load from IndexedDB
                const dbLetters = await window.MailboxStorageDB.getAllLetters();
                if (dbLetters && dbLetters.length > 0) {
                    letters = dbLetters;
                    try { localStorage.removeItem('mobile-letters'); } catch (e) {}
                } else {
                    // 2. Fallback to localStorage and migrate
                    const lsData = localStorage.getItem('mobile-letters');
                    if (lsData) {
                        try {
                            const lsLetters = JSON.parse(lsData);
                            if (Array.isArray(lsLetters)) {
                                letters = lsLetters;
                                for (const letter of letters) {
                                    if (!letter.id) letter.id = Date.now() + Math.random();
                                    await window.MailboxStorageDB.saveLetter(letter);
                                }
                                try { localStorage.removeItem('mobile-letters'); } catch (e) {}
                            }
                        } catch (e) {
                            console.error('Failed to parse localStorage letters', e);
                        }
                    }
                }
            } catch (e) {
                console.error('Failed to load letters', e);
                const lsData = localStorage.getItem('mobile-letters');
                if (lsData) {
                    try {
                        const parsed = JSON.parse(lsData);
                        letters = Array.isArray(parsed) ? parsed : [];
                        if (typeof showToast === 'function') showToast('已从本地备份加载信件');
                    } catch (err) {
                        letters = [];
                    }
                }
            }
            initLetters();

        let scrollLockOffset = 0;

        let _localCropInited = false;
        function ensureLocalCropModal() {
            if (_localCropInited) return;
            const cropModal = document.getElementById('cropModal');
            const cropCanvas = document.getElementById('cropCanvas');
            const cropWrapper = document.getElementById('cropWrapper');
            const cropOverlay = document.getElementById('cropOverlay');
            const cancelBtn = document.getElementById('cropCancelBtn');
            const cancelBtn2 = document.getElementById('cropCancelBtn2');
            const confirmBtn = document.getElementById('cropConfirmBtn');
            if (!cropModal || !cropCanvas || !cropWrapper || !cropOverlay || !confirmBtn) return;

            const ctx = cropCanvas.getContext('2d');
            if (!ctx) return;

            _localCropInited = true;

            let cropImage = null;
            let cropScale = 1;
            let cropTranslateX = 0;
            let cropTranslateY = 0;
            let cropStartDistance = 0;
            let cropStartScale = 1;
            let cropStartX = 0;
            let cropStartY = 0;
            let cropIsDragging = false;
            let currentCropOptions = {};
            let currentCropCallback = null;

            const drawCropImage = () => {
                if (!cropImage) return;
                const w = cropWrapper.clientWidth;
                const h = cropWrapper.clientHeight;
                cropCanvas.width = w;
                cropCanvas.height = h;
                const cx = w / 2;
                const cy = h / 2;
                ctx.clearRect(0, 0, w, h);
                ctx.save();
                ctx.translate(cx + cropTranslateX, cy + cropTranslateY);
                ctx.scale(cropScale, cropScale);
                ctx.drawImage(cropImage, -cropImage.width / 2, -cropImage.height / 2);
                ctx.restore();
            };

            cropWrapper.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    cropIsDragging = true;
                    cropStartX = e.touches[0].clientX - cropTranslateX;
                    cropStartY = e.touches[0].clientY - cropTranslateY;
                } else if (e.touches.length === 2) {
                    cropIsDragging = false;
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    cropStartDistance = Math.sqrt(dx * dx + dy * dy);
                    cropStartScale = cropScale;
                }
            }, { passive: false });

            cropWrapper.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (e.touches.length === 1 && cropIsDragging) {
                    cropTranslateX = e.touches[0].clientX - cropStartX;
                    cropTranslateY = e.touches[0].clientY - cropStartY;
                    drawCropImage();
                } else if (e.touches.length === 2) {
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (cropStartDistance > 0) {
                        const newScale = cropStartScale * (distance / cropStartDistance);
                        cropScale = Math.max(0.1, Math.min(10, newScale));
                        drawCropImage();
                    }
                }
            }, { passive: false });

            cropWrapper.addEventListener('touchend', () => {
                cropIsDragging = false;
            });

            cropWrapper.addEventListener('mousedown', (e) => {
                cropIsDragging = true;
                cropStartX = e.clientX - cropTranslateX;
                cropStartY = e.clientY - cropTranslateY;
            });

            cropWrapper.addEventListener('mousemove', (e) => {
                if (cropIsDragging) {
                    cropTranslateX = e.clientX - cropStartX;
                    cropTranslateY = e.clientY - cropStartY;
                    drawCropImage();
                }
            });

            cropWrapper.addEventListener('mouseup', () => {
                cropIsDragging = false;
            });

            cropWrapper.addEventListener('wheel', (e) => {
                e.preventDefault();
                const delta = e.deltaY > 0 ? 0.9 : 1.1;
                cropScale = Math.max(0.1, Math.min(10, cropScale * delta));
                drawCropImage();
            }, { passive: false });

            const close = () => {
                cropModal.classList.remove('show');
                const inputs = document.querySelectorAll('input[type="file"]');
                inputs.forEach(input => input.value = '');
                unlockPageScroll();
                popFocus();
                backHistoryLayer();
            };

            closeCropModalInternal = (opts) => {
                cropModal.classList.remove('show');
                const inputs = document.querySelectorAll('input[type="file"]');
                inputs.forEach(input => input.value = '');
                unlockPageScroll();
                popFocus();
                if (!(opts && opts.fromPopstate)) backHistoryLayer();
            };

            if (cancelBtn) cancelBtn.addEventListener('click', close);
            if (cancelBtn2) cancelBtn2.addEventListener('click', close);

            confirmBtn.addEventListener('click', () => {
                if (!currentCropCallback) return;

                let maxOutputSize = 1024;
                if (currentCropOptions.shape === 'circle') {
                    maxOutputSize = 512;
                } else if (currentCropOptions.aspectRatio === 1) {
                    maxOutputSize = 512;
                }

                const overlayRect = cropOverlay.getBoundingClientRect();
                const wrapperRect = cropWrapper.getBoundingClientRect();
                
                // 使用相对坐标，避免 getBoundingClientRect 在某些移动端浏览器下的绝对坐标偏移问题
                const overlayCenterX = overlayRect.width / 2;
                const overlayCenterY = overlayRect.height / 2;
                const wrapperCenterX = wrapperRect.width / 2;
                const wrapperCenterY = wrapperRect.height / 2;
                
                // 计算 overlay 相对于 wrapper 中心的偏移
                // 注意：这里需要的是渲染时的真实偏移，getBoundingClientRect 包含了滚动和缩放的影响
                const overlayRelativeLeft = overlayRect.left - wrapperRect.left;
                const overlayRelativeTop = overlayRect.top - wrapperRect.top;
                const offsetX = (overlayRelativeLeft + overlayRect.width / 2) - wrapperCenterX;
                const offsetY = (overlayRelativeTop + overlayRect.height / 2) - wrapperCenterY;

                const overlayWidth = overlayRect.width;
                const overlayHeight = overlayRect.height;
                let outputWidth = overlayWidth;
                let outputHeight = overlayHeight;
                const ratio = overlayWidth / overlayHeight;
                
                if (outputWidth > outputHeight) {
                    if (outputWidth > maxOutputSize) {
                        outputWidth = maxOutputSize;
                        outputHeight = maxOutputSize / ratio;
                    }
                } else {
                    if (outputHeight > maxOutputSize) {
                        outputHeight = maxOutputSize;
                        outputWidth = maxOutputSize * ratio;
                    }
                }

                const outputCanvas = document.createElement('canvas');
                outputCanvas.width = outputWidth;
                outputCanvas.height = outputHeight;
                const outCtx = outputCanvas.getContext('2d');
                if (!outCtx || !cropImage) return;

                outCtx.clearRect(0, 0, outputWidth, outputHeight);
                outCtx.save();
                outCtx.translate(outputWidth / 2, outputHeight / 2);
                const scaleFactor = outputWidth / overlayWidth;
                outCtx.scale(scaleFactor, scaleFactor);
                // 修正偏移：我们需要的是 imageCenter 相对于 overlayCenter 的偏移
                // imageCenter = wrapperCenter + cropTranslate
                // imageCenter - overlayCenter = (wrapperCenter + cropTranslate) - overlayCenter
                //                            = cropTranslate - (overlayCenter - wrapperCenter)
                outCtx.translate(cropTranslateX - offsetX, cropTranslateY - offsetY);
                outCtx.scale(cropScale, cropScale);
                outCtx.drawImage(cropImage, -cropImage.width / 2, -cropImage.height / 2);
                outCtx.restore();

                const quality = 0.95;
                const dataUrl = outputCanvas.toDataURL('image/png'); // 改用 PNG 确保不失真，后续存储会自动处理数据大小
                currentCropCallback(dataUrl);

                cropModal.classList.remove('show');
                const inputs = document.querySelectorAll('input[type="file"]');
                inputs.forEach(input => input.value = '');
                unlockPageScroll();
                popFocus();
                backHistoryLayer();
            });

            window.openCropModal = (imgSrc, options, callback) => {
                currentCropOptions = Object.assign({ aspectRatio: null, shape: 'rect' }, options);
                currentCropCallback = callback;
                lockPageScroll();
                pushFocus();
                pushHistoryLayer('crop');

                cropImage = new Image();
                cropImage.onload = () => {
                    cropScale = 1;
                    cropTranslateX = 0;
                    cropTranslateY = 0;

                    cropOverlay.className = 'crop-overlay ' + (currentCropOptions.shape === 'circle' ? 'circle' : 'rect');
                    const baseSize = 280;
                    if (currentCropOptions.aspectRatio) {
                        if (currentCropOptions.aspectRatio >= 1) {
                            cropOverlay.style.width = baseSize + 'px';
                            cropOverlay.style.height = (baseSize / currentCropOptions.aspectRatio) + 'px';
                        } else {
                            cropOverlay.style.height = baseSize + 'px';
                            cropOverlay.style.width = (baseSize * currentCropOptions.aspectRatio) + 'px';
                        }
                    } else {
                        cropOverlay.style.width = baseSize + 'px';
                        cropOverlay.style.height = baseSize + 'px';
                    }

                    const minDim = Math.min(cropImage.width, cropImage.height);
                    const wrapperDim = Math.min(cropWrapper.clientWidth, cropWrapper.clientHeight);
                    if (minDim > 0) {
                        cropScale = (wrapperDim * 0.8) / minDim;
                    }

                    drawCropImage();
                    cropModal.classList.add('show');
                };
                cropImage.src = imgSrc;
            };
        }

        function getViewportAspectRatio() {
            const w = Number(document.documentElement && document.documentElement.clientWidth) || Number(window.innerWidth) || 0;
            const h = Number(window.innerHeight) || Number(document.documentElement && document.documentElement.clientHeight) || 0;
            const r = w > 0 && h > 0 ? (w / h) : (9 / 16);
            if (!Number.isFinite(r) || r <= 0) return 9 / 16;
            return Math.max(0.35, Math.min(2.2, r));
        }

        if (cfgEnvelopeTextFontUrl) cfgEnvelopeTextFontUrl.addEventListener('change', () => updateEnvelopeText({ url: cfgEnvelopeTextFontUrl.value }));
        if (cfgEnvelopeTextColor) cfgEnvelopeTextColor.addEventListener('input', () => updateEnvelopeText({ color: cfgEnvelopeTextColor.value }));
        if (cfgEnvelopeTextSize) cfgEnvelopeTextSize.addEventListener('input', () => updateEnvelopeText({ size: Number(cfgEnvelopeTextSize.value) }));

        function handleFontFileUpload(file, targetUrlInput, updateFn) {
            if (!file || !file.name.match(/\.(woff2|woff|ttf|otf)$/i)) {
                showToast('请上传有效的字体文件（woff2/woff/ttf/otf）');
                return;
            }
            const blobUrlService = getBlobUrlService();
            if (!blobUrlService) throw new Error('BlobUrlService不可用');
            const fontUrl = blobUrlService.createObjectUrl(file, { groupId: GROUP_ID + '-font' });
            if (targetUrlInput) targetUrlInput.value = fontUrl;
            updateFn({ url: fontUrl });
            showToast('字体文件已加载');
        }

        const cfgThemeFontUploadBtn = document.getElementById('cfg-theme-font-upload');
        const cfgThemeFontFileInput = document.getElementById('cfg-theme-font-file');
        if (cfgThemeFontUploadBtn && cfgThemeFontFileInput) {
            cfgThemeFontUploadBtn.addEventListener('click', () => cfgThemeFontFileInput.click());
            cfgThemeFontFileInput.addEventListener('change', () => {
                const file = cfgThemeFontFileInput.files[0];
                if (file) handleFontFileUpload(file, cfgThemeFontUrl, updateThemeFont);
            });
        }

        const cfgPaperFontUploadBtn = document.getElementById('cfg-paper-font-upload');
        const cfgPaperFontFileInput = document.getElementById('cfg-paper-font-file');
        if (cfgPaperFontUploadBtn && cfgPaperFontFileInput) {
            cfgPaperFontUploadBtn.addEventListener('click', () => cfgPaperFontFileInput.click());
            cfgPaperFontFileInput.addEventListener('change', () => {
                const file = cfgPaperFontFileInput.files[0];
                if (file) handleFontFileUpload(file, cfgPaperFontUrl, updatePaperFont);
            });
        }

        const cfgEnvelopeTextFontUploadBtn = document.getElementById('cfg-envelope-text-font-upload');
        const cfgEnvelopeTextFontFileInput = document.getElementById('cfg-envelope-text-font-file');
        if (cfgEnvelopeTextFontUploadBtn && cfgEnvelopeTextFontFileInput) {
            cfgEnvelopeTextFontUploadBtn.addEventListener('click', () => cfgEnvelopeTextFontFileInput.click());
            cfgEnvelopeTextFontFileInput.addEventListener('change', () => {
                const file = cfgEnvelopeTextFontFileInput.files[0];
                if (file) handleFontFileUpload(file, cfgEnvelopeTextFontUrl, updateEnvelopeText);
            });
        }

        if (cfgEnvelopeStyle) {
            cfgEnvelopeStyle.addEventListener('change', () => {
                const v = String(cfgEnvelopeStyle.value || '').trim();
                if (v.indexOf('preset:') === 0) {
                    applyEnvelopePreset(v.slice(7));
                    return;
                }
                updateEnvelopeStyle({
                    mode: v === 'plain' ? 'plain' : v === 'custom' ? 'custom' : 'diagonal',
                    activePresetId: ''
                });
                syncEnvelopeStyleOptions();
            });
        }
        if (cfgEnvelopeCss) cfgEnvelopeCss.addEventListener('input', () => updateEnvelopeStyle({ css: cfgEnvelopeCss.value }));
        if (saveEnvelopePresetBtn) saveEnvelopePresetBtn.addEventListener('click', saveEnvelopePreset);
        if (deleteEnvelopePresetBtn) deleteEnvelopePresetBtn.addEventListener('click', deleteEnvelopePreset);

        bindPreviewFileClick(homeBgPreviewBtn, cfgHomeBgFile);
        bindPreviewFileClick(topbarBgPreviewBtn, cfgTopbarBgFile);
        bindPreviewFileClick(paperBgPreviewBtn, cfgPaperBgFile);

        bindPreviewFileClick(previewIconComposeBtn, cfgIconCompose);
        bindPreviewFileClick(previewIconConfigBtn, cfgIconConfig);
        bindPreviewFileClick(previewIconBackBtn, cfgIconBack);
        bindPreviewFileClick(previewIconDoneBtn, cfgIconDone);
        bindPreviewFileClick(previewIconEditBtn, cfgIconEdit);
        bindPreviewFileClick(previewIconDeleteBtn, cfgIconDelete);

        if (cfgHomeBg) cfgHomeBg.addEventListener('change', () => updateConfig({ homeBg: normalizeBgValue(cfgHomeBg.value), preset: 'custom' }));
        if (clearHomeBgBtn) {
            clearHomeBgBtn.addEventListener('click', () => {
                if (cfgHomeBg) cfgHomeBg.value = '';
                updateConfig({ homeBg: '', preset: 'custom' });
            });
        }
        if (cfgHomeBgFile) {
            cfgHomeBgFile.addEventListener('change', () => {
                const file = cfgHomeBgFile.files && cfgHomeBgFile.files[0];
                if (!file) return;
                cfgHomeBgFile.value = '';
                const reader = new FileReader();
                reader.onload = (e) => {
                    const raw = e && e.target ? e.target.result : '';
                    const imgSrc = String(raw || '');
                    openSharedCrop(imgSrc, { aspectRatio: getViewportAspectRatio(), shape: 'rect' }, (dataUrl) => {
                        const bgValue = `url("${dataUrl}") center / cover no-repeat`;
                        if (cfgHomeBg) cfgHomeBg.value = bgValue;
                        updateConfig({ homeBg: bgValue, preset: 'custom' });
                    });
                };
                reader.onerror = () => {
                    showToast('图片读取失败');
                };
                reader.readAsDataURL(file);
            });
        }

        if (cfgTopbarBg) cfgTopbarBg.addEventListener('change', () => updateConfig({ topbarBg: normalizeBgValue(cfgTopbarBg.value), preset: 'custom' }));
        if (clearTopbarBgBtn) {
            clearTopbarBgBtn.addEventListener('click', () => {
                if (cfgTopbarBg) cfgTopbarBg.value = '';
                updateConfig({ topbarBg: '', preset: 'custom' });
            });
        }
        if (cfgTopbarBgFile) {
            cfgTopbarBgFile.addEventListener('change', () => {
                const file = cfgTopbarBgFile.files && cfgTopbarBgFile.files[0];
                if (!file) return;
                cfgTopbarBgFile.value = '';
                const reader = new FileReader();
                reader.onload = (e) => {
                    const raw = e && e.target ? e.target.result : '';
                    const imgSrc = String(raw || '');
                    openSharedCrop(imgSrc, { aspectRatio: 4, shape: 'rect' }, (dataUrl) => {
                        const bgValue = `url("${dataUrl}") center / cover no-repeat`;
                        if (cfgTopbarBg) cfgTopbarBg.value = bgValue;
                        updateConfig({ topbarBg: bgValue, preset: 'custom' });
                    });
                };
                reader.onerror = () => {
                    showToast('图片读取失败');
                };
                reader.readAsDataURL(file);
            });
        }

        if (cfgPaperBg) cfgPaperBg.addEventListener('change', () => updateConfig({ paperBg: normalizeBgValue(cfgPaperBg.value), preset: 'custom' }));
        if (clearPaperBgBtn) {
            clearPaperBgBtn.addEventListener('click', () => {
                if (cfgPaperBg) cfgPaperBg.value = '';
                updateConfig({ paperBg: '', preset: 'custom' });
            });
        }
        if (cfgPaperBgFile) {
            cfgPaperBgFile.addEventListener('change', () => {
                const file = cfgPaperBgFile.files && cfgPaperBgFile.files[0];
                if (!file) return;
                cfgPaperBgFile.value = '';
                const reader = new FileReader();
                reader.onload = (e) => {
                    const raw = e && e.target ? e.target.result : '';
                    const imgSrc = String(raw || '');
                    openSharedCrop(imgSrc, { aspectRatio: getViewportAspectRatio(), shape: 'rect' }, (dataUrl) => {
                        const bgValue = `url("${dataUrl}")`;
                        if (cfgPaperBg) cfgPaperBg.value = bgValue;
                        updateConfig({ paperBg: bgValue, preset: 'custom' });
                    });
                };
                reader.onerror = () => {
                    showToast('图片读取失败');
                };
                reader.readAsDataURL(file);
            });
        }

        async function bindIconPicker(inputEl, key) {
            if (!inputEl) return;
            inputEl.addEventListener('change', () => {
                const file = inputEl.files && inputEl.files[0];
                if (!file) return;
                inputEl.value = '';
                const reader = new FileReader();
                reader.onload = (e) => {
                    const raw = e && e.target ? e.target.result : '';
                    const imgSrc = String(raw || '');
                    openSharedCrop(imgSrc, { aspectRatio: 1, shape: 'rect' }, (dataUrl) => {
                        setIconValue(key, dataUrl);
                    });
                };
                reader.onerror = () => {
                    showToast('图片读取失败');
                };
                reader.readAsDataURL(file);
            });
        }

        bindIconPicker(cfgIconCompose, 'compose');
        bindIconPicker(cfgIconConfig, 'config');
        bindIconPicker(cfgIconBack, 'back');
        bindIconPicker(cfgIconDone, 'done');
        bindIconPicker(cfgIconEdit, 'edit');
        bindIconPicker(cfgIconDelete, 'delete');

        if (configFullscreen) {
            configFullscreen.addEventListener('click', (e) => {
                const target = e.target;
                const clearKey = target && target.dataset ? target.dataset.iconClear : '';
                if (!clearKey) return;
                setIconValue(clearKey, null);
            });
        }

        cancelFirstStepBtn.addEventListener('click', closeNewLetterModal);
        backFromLetterBtn.addEventListener('click', closeLetterView);
        backFromComposeBtn.addEventListener('click', closeComposeScreen);
        cancelSendBtn.addEventListener('click', closeConfirmModal);
        editLetterBtn.addEventListener('click', enterOpenLetterEditMode);
        saveLetterBtn.addEventListener('click', saveOpenLetterEdits);
        deleteLetterBtn.addEventListener('click', deleteOpenLetter);
        
        // 第一步表单提交
        senderRecipientForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const sender = document.getElementById('sender-name').value.trim();
            const recipient = document.getElementById('recipient-name').value.trim();
            
            if (!sender || !recipient) {
                showToast('请填写寄件人和收件人');
                return;
            }
            
            currentLetter.sender = sender;
            currentLetter.recipient = recipient;
            
            closeNewLetterModal();
            setTimeout(() => {
                openComposeScreen();
            }, 300);
        });
        
        // 完成写信按钮
        completeLetterBtn.addEventListener('click', function() {
            const content = composeBody.value.trim();

            if (!content) {
                showToast('请输入信件内容');
                return;
            }

            currentLetter.content = content;
            openConfirmModal(
                '确定要投递这封信吗？',
                `寄: ${currentLetter.sender}  致: ${currentLetter.recipient}`,
                saveLetter
            );
        });
        
        confirmSendBtn.addEventListener('click', function() {
            const action = confirmAction;
            closeConfirmModal({ skipHistory: true });
            if (typeof action !== 'function') return;
            Promise.resolve()
                .then(() => action())
                .catch(() => {
                    showToast('操作失败，请重试');
                });
        });
        
        // 点击模态窗口外部关闭
        window.addEventListener('click', function(e) {
            if (e.target === newLetterModal) {
                closeNewLetterModal();
            }
            if (e.target === confirmModal) {
                closeConfirmModal();
            }
        });

        window.addEventListener('keydown', (e) => {
            if (e.key !== 'Escape') return;
            if (configFullscreen && configFullscreen.style.display === 'flex') {
                closeConfigScreen();
                return;
            }
            if (confirmModal.style.display === 'flex') {
                closeConfirmModal();
                return;
            }
            if (newLetterModal.style.display === 'flex') {
                closeNewLetterModal();
                return;
            }
            if (composeFullscreen.style.display === 'flex') {
                closeComposeScreen();
                return;
            }
            if (letterFullscreen.style.display === 'flex') {
                closeLetterView();
            }
        });
        
        // 初始化应用
        async function initApp() {
            try {
                await window.MailboxStorageDB.init();
            } catch (e) {
                showToast('存储初始化失败，将使用本地备份');
            }

            applyUiConfig(uiConfig);

            if (isIframe) {
                document.addEventListener('click', () => {
                    try {
                        const parent = window.parent;
                        if (parent && parent !== window) {
                            parent.postMessage({ type: 'iframe_click' }, _getPostTargetOrigin());
                        }
                    } catch (e) {}
                }, true);
            }

            await loadLetters();
            removePresetLetters();

            if (isIframe) {
                try {
                    window.parent.postMessage({ type: 'app_ready', appId: 'xinxiang' }, _getPostTargetOrigin());
                } catch (e) {
                    console.error('Failed to send app_ready message:', e);
                }
            }
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
