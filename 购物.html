<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="icon" href="icons/icon-192.png" type="image/png" sizes="192x192">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png" sizes="180x180">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="湫丘捕梦机">
    <title>购物</title>
    <link rel="stylesheet" href="css/core-icons.min.css">
    <link rel="stylesheet" href="css/core-ui.css">
    <link rel="stylesheet" href="css/local-icons.css">
    <style>
        :root {
            color-scheme: light dark;
            --bg: #ffffff;
            --surface: #ffffff;
            --text: rgba(0, 0, 0, 0.92);
            --muted: rgba(0, 0, 0, 0.58);
            --hair: rgba(0, 0, 0, 0.12);
            --hair-strong: rgba(0, 0, 0, 0.24);
            --focus: rgba(0, 0, 0, 0.4);
            --safe-inset-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
            --tab-h: 62px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --surface: #0b0b0c;
                --text: rgba(255, 255, 255, 0.92);
                --muted: rgba(255, 255, 255, 0.62);
                --hair: rgba(255, 255, 255, 0.14);
                --hair-strong: rgba(255, 255, 255, 0.28);
                --focus: rgba(255, 255, 255, 0.46);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
        }

        body {
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        .app-root {
            height: 100svh;
            display: flex;
            flex-direction: column;
        }

        .app-header {
            min-height: 56px;
            padding: 10px 12px;
            padding-top: calc(10px + var(--safe-inset-top, env(safe-area-inset-top)));
            background: var(--bg);
            color: var(--text);
            border-bottom: 1px solid var(--hair);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .app-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            border: 1px solid var(--hair);
            background: transparent;
            color: var(--text);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:active {
            background: rgba(0, 0, 0, 0.06);
        }

        @media (prefers-color-scheme: dark) {
            .icon-btn:active {
                background: rgba(255, 255, 255, 0.08);
            }
        }

        .title {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 0.2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .app-main {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .app-scroll {
            height: 100%;
            padding: 12px 12px calc(var(--tab-h) + 16px + var(--safe-bottom));
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--hair);
            border-radius: 18px;
            padding: 12px;
        }

        .card + .card {
            margin-top: 12px;
        }

        .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .muted {
            color: var(--muted);
        }

        .divider {
            height: 1px;
            background: var(--hair);
            margin: 10px 0;
        }

        .field {
            width: 100%;
            height: 44px;
            border-radius: 14px;
            border: 1px solid var(--hair);
            background: transparent;
            color: var(--text);
            padding: 0 12px;
            font-size: 16px;
            outline: none;
        }

        .field:focus {
            border-color: var(--hair-strong);
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.06);
        }

        @media (prefers-color-scheme: dark) {
            .field:focus {
                box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.08);
            }
        }

        .btn {
            height: 44px;
            padding: 0 14px;
            border-radius: 14px;
            border: 1px solid var(--hair);
            background: transparent;
            color: var(--text);
            font-weight: 800;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            white-space: nowrap;
        }

        .btn.primary {
            background: var(--text);
            color: var(--bg);
            border-color: transparent;
        }

        .btn:active {
            transform: translateY(0.5px);
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 999px;
            border: 1px solid var(--hair);
            background: transparent;
            color: var(--text);
            max-width: 100%;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
            padding-top: 10px;
        }

        .cat-btn {
            width: 100%;
            min-height: 72px;
            border-radius: 18px;
            border: 1px solid var(--hair);
            background: transparent;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 8px;
        }

        .cat-name {
            font-weight: 800;
            font-size: 12px;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            padding-top: 10px;
        }

        .p-card {
            border-radius: 18px;
            border: 1px solid var(--hair);
            background: transparent;
            color: var(--text);
            text-align: left;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 140px;
        }

        .p-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .p-name {
            font-weight: 900;
            font-size: 14px;
            line-height: 1.2;
            word-break: break-word;
        }

        .p-brief {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.25;
            word-break: break-word;
            flex: 1;
        }

        .p-meta {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 10px;
        }

        .price {
            font-weight: 900;
            letter-spacing: 0.2px;
        }

        .tag {
            border: 1px solid var(--hair);
            border-radius: 999px;
            padding: 4px 8px;
            font-size: 12px;
            color: var(--muted);
            max-width: 60%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .li {
            border: 1px solid var(--hair);
            border-radius: 18px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .li-left {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
            flex: 1;
        }

        .li-main {
            min-width: 0;
            flex: 1;
        }

        .li-title {
            font-weight: 900;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .li-sub {
            font-size: 12px;
            color: var(--muted);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .qty {
            display: inline-flex;
            align-items: center;
            border: 1px solid var(--hair);
            border-radius: 14px;
            overflow: hidden;
        }

        .qty button {
            width: 44px;
            height: 44px;
            border: 0;
            background: transparent;
            color: var(--text);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .qty span {
            min-width: 38px;
            text-align: center;
            font-weight: 900;
        }

        .tabbar {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            height: var(--tab-h);
            padding: 8px 10px;
            padding-bottom: calc(8px + var(--safe-bottom));
            background: var(--bg) !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
            border-top: 1px solid var(--hair);
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 8px;
            z-index: 100;
        }

        @media (prefers-color-scheme: dark) {
            .tabbar {
                background: var(--bg) !important;
            }
        }

        .tab {
            border: 1px solid transparent;
            background: transparent;
            color: var(--muted);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 900;
            min-height: 44px;
        }

        .tab.is-active {
            border-color: var(--hair);
            color: var(--text);
        }

        .badge {
            min-width: 18px;
            height: 18px;
            padding: 0 6px;
            border-radius: 999px;
            border: 1px solid var(--hair-strong);
            color: var(--text);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 900;
            line-height: 1;
        }

        .i {
            width: 22px;
            height: 22px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex: 0 0 auto;
        }

        .i-lg {
            width: 42px;
            height: 42px;
        }

        .empty {
            padding: 14px;
            color: var(--muted);
            text-align: center;
        }

        .two {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .note {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.35;
        }

        @media (max-width: 360px) {
            .grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="app-root" id="mallRoot">
        <div class="app-header">
            <div class="app-header-left">
                <button class="icon-btn" id="gouWuBackBtn" type="button" aria-label="返回">
                    <svg class="i" viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
                <div class="title" id="mallTitle">购物</div>
            </div>
            <div class="row" id="mallHeaderRight"></div>
        </div>

        <div class="app-main">
            <div class="app-scroll scroll-y flex-scroll" id="mallView" role="region" aria-label="商城内容"></div>
        </div>

        <nav class="tabbar" aria-label="底部导航">
            <button class="tab is-active" type="button" data-act="goTab" data-tab="home" aria-label="首页">
                <svg class="i" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
                <span>首页</span>
            </button>
            <button class="tab" type="button" data-act="goTab" data-tab="categories" aria-label="分类">
                <svg class="i" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16"/><path d="M4 12h16"/><path d="M4 18h16"/></svg>
                <span>分类</span>
            </button>
            <button class="tab" type="button" data-act="goTab" data-tab="cart" aria-label="购物车">
                <svg class="i" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6h15l-1.5 8h-12z"/><path d="M6 6l-1-2H2"/><path d="M9 20a1 1 0 1 0 0-2 1 1 0 0 0 0 2z"/><path d="M17 20a1 1 0 1 0 0-2 1 1 0 0 0 0 2z"/></svg>
                <span>购物车</span>
                <span class="badge" id="cartBadge" aria-label="购物车数量">0</span>
            </button>
            <button class="tab" type="button" data-act="goTab" data-tab="me" aria-label="个人主页">
                <svg class="i" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 21a8 8 0 1 0-16 0"/><path d="M12 13a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/></svg>
                <span>我的</span>
            </button>
        </nav>
    </div>

    <script src="js/core/StorageService.js"></script>
    <script src="js/core/SafeArea.js"></script>
    <script src="js/apps/shopping/extension.js"></script>
    <script>
        (function () {
            const storageKeyMall = 'gouWuMallData_v1';
            const storageKeyChecklist = 'gouWuAppData_v1';

            const safeNumber = (value, fallback) => {
                const n = Number(value);
                return Number.isFinite(n) ? n : fallback;
            };

            const clampInt = (n, min, max) => {
                const v = Math.floor(safeNumber(n, min));
                return Math.max(min, Math.min(max, v));
            };

            const escapeText = (text) => {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            };

            const formatMoney = (n) => {
                const v = safeNumber(n, 0);
                return `¥${v.toFixed(2)}`;
            };

            const uid = () => `${Date.now().toString(36)}${Math.random().toString(36).slice(2, 8)}`;

            const _getPostTargetOrigin = () => {
                const origin = window.location.origin;
                return origin && origin !== 'null' ? origin : '*';
            };

            const closeToHome = () => {
                try {
                    if (window.parent && window.parent !== window) {
                        if (window.parent.mainApp && typeof window.parent.mainApp.closeCurrentApp === 'function') {
                            window.parent.mainApp.closeCurrentApp();
                            return;
                        }
                        window.parent.postMessage({ type: 'closeApp', appId: 'gouWu' }, _getPostTargetOrigin());
                        return;
                    }
                } catch (e) {}
                window.location.href = 'index.html';
            };

            const CATEGORIES = [
                { id: 'beauty', name: '美妆', icon: 'beauty' },
                { id: 'wear', name: '穿搭', icon: 'wear' },
                { id: 'home', name: '生活', icon: 'home' },
                { id: 'snack', name: '零食', icon: 'snack' },
                { id: 'book', name: '书与纸', icon: 'book' },
                { id: 'digital', name: '数码', icon: 'digital' },
                { id: 'gift', name: '礼物', icon: 'gift' },
                { id: 'flower', name: '花与香', icon: 'flower' }
            ];

            const PRODUCTS = [
                { id: 'p01', name: '雾面口红', brief: '低饱和雾感，上唇不张扬。', price: 79.0, categoryId: 'beauty' },
                { id: 'p02', name: '细描眼线笔', brief: '线条干净，耐汗耐泪。', price: 49.0, categoryId: 'beauty' },
                { id: 'p03', name: '轻羽发夹', brief: '把散乱和情绪一起别住。', price: 19.9, categoryId: 'wear' },
                { id: 'p04', name: '黑白帆布包', brief: '极简线条，装得下日常。', price: 59.0, categoryId: 'wear' },
                { id: 'p05', name: '香氛蜡烛', brief: '点亮一小段安静的光。', price: 99.0, categoryId: 'home' },
                { id: 'p06', name: '玻璃杯', brief: '清澈，像把水装进心里。', price: 29.0, categoryId: 'home' },
                { id: 'p07', name: '黑巧脆片', brief: '微苦不腻，适合夜晚。', price: 22.0, categoryId: 'snack' },
                { id: 'p08', name: '海盐饼干', brief: '轻咸，咬下去很干净。', price: 18.0, categoryId: 'snack' },
                { id: 'p09', name: '线装笔记本', brief: '让想法有个落脚处。', price: 25.0, categoryId: 'book' },
                { id: 'p10', name: '黑墨签字笔', brief: '写下的每一笔都很认真。', price: 9.9, categoryId: 'book' },
                { id: 'p11', name: '随身充电线', brief: '短短一条，稳稳续航。', price: 16.0, categoryId: 'digital' },
                { id: 'p12', name: '折叠支架', brief: '把视线抬高一点点。', price: 28.0, categoryId: 'digital' },
                { id: 'p13', name: '极简礼盒', brief: '留白的包装更显心意。', price: 12.0, categoryId: 'gift' },
                { id: 'p14', name: '手写卡片', brief: '小小一张，情绪很大。', price: 6.0, categoryId: 'gift' },
                { id: 'p15', name: '香袋', brief: '轻轻挂着，像一段余韵。', price: 15.0, categoryId: 'flower' },
                { id: 'p16', name: '干花束', brief: '不急着盛开，也很美。', price: 39.0, categoryId: 'flower' }
            ];

            const getCategoryById = (id) => CATEGORIES.find(c => c.id === id) || null;
            const getProductById = (id) => PRODUCTS.find(p => p.id === id) || null;

            const iconSvg = (key, cls) => {
                const c = cls ? String(cls) : 'i';
                if (key === 'beauty') return `<svg class="${c}" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 3l10 10"/><path d="M7 3l-2 2 10 10 2-2z"/><path d="M5 5l-2 2 6 6 2-2z"/><path d="M10 12l-5 5 2 2 5-5"/></svg>`;
                if (key === 'wear') return `<svg class="${c}" viewBox="0 0 24 24" aria-hidden="true"><path d="M9 4l3 3 3-3"/><path d="M7 7l-3 3 4 3v7h8v-7l4-3-3-3"/></svg>`;
                if (key === 'home') return `<svg class="${c}" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M10 20v-6h4v6"/></svg>`;
                if (key === 'snack') return `<svg class="${c}" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 4h10l-1 16H8z"/><path d="M9 8h6"/><path d="M9 12h6"/></svg>`;
                if (key === 'book') return `<svg class="${c}" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h10a3 3 0 0 1 3 3v13H7a3 3 0 0 0-3 3z"/><path d="M17 5h3v16h-3"/></svg>`;
                if (key === 'digital') return `<svg class="${c}" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 4h10v16H7z"/><path d="M10 7h4"/><path d="M11 18h2"/></svg>`;
                if (key === 'gift') return `<svg class="${c}" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 12h16v9H4z"/><path d="M4 12V8h16v4"/><path d="M12 8v13"/><path d="M8 8c0-2 1-3 2-3s2 1 2 3"/><path d="M16 8c0-2-1-3-2-3s-2 1-2 3"/></svg>`;
                if (key === 'flower') return `<svg class="${c}" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21v-7"/><path d="M9 7c0 2 3 3 3 3s3-1 3-3-3-3-3-3-3 1-3 3z"/><path d="M8 14c2 0 4 2 4 2s-2 2-4 2-3-2-3-2 1-2 3-2z"/><path d="M16 14c-2 0-4 2-4 2s2 2 4 2 3-2 3-2-1-2-3-2z"/></svg>`;
                return `<svg class="${c}" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14"/><path d="M12 5v14"/></svg>`;
            };

            const defaultsMall = () => ({
                cart: { items: [] },
                orders: [],
                favorites: [],
                addresses: [],
                profile: { nickname: '' },
                lastOrderNo: 0
            });

            const mall = defaultsMall();
            const checklist = { items: [] };
            const ui = { search: '', catQuery: '', checkoutRemark: '', lastViewKey: '' };
            const nav = { tab: 'home', stack: [{ view: 'home', params: {} }] };

            const loadMall = () => {
                try {
                    const raw = localStorage.getItem(storageKeyMall);
                    if (!raw) return;
                    const parsed = JSON.parse(raw);
                    if (!parsed || typeof parsed !== 'object') return;
                    if (parsed.cart && Array.isArray(parsed.cart.items)) mall.cart.items = parsed.cart.items;
                    if (Array.isArray(parsed.orders)) mall.orders = parsed.orders;
                    if (Array.isArray(parsed.favorites)) mall.favorites = parsed.favorites;
                    if (Array.isArray(parsed.addresses)) mall.addresses = parsed.addresses;
                    if (parsed.profile && typeof parsed.profile === 'object') mall.profile = Object.assign({ nickname: '' }, parsed.profile);
                    mall.lastOrderNo = clampInt(parsed.lastOrderNo, 0, 99999999);
                } catch (e) {}
            };

            const saveMall = () => {
                try {
                    localStorage.setItem(storageKeyMall, JSON.stringify(mall));
                } catch (e) {}
            };

            const normalizeOrders = () => {
                try {
                    const list = Array.isArray(mall.orders) ? mall.orders : [];
                    const nowTs = Date.now();
                    let changed = false;
                    list.forEach(o => {
                        if (!o || typeof o !== 'object') return;
                        const createdAt = safeNumber(o.createdAt, nowTs);
                        if (o.createdAt !== createdAt) {
                            o.createdAt = createdAt;
                            changed = true;
                        }
                        const status = String(o.status || '').trim();
                        const payStatus = String(o.payStatus || '').trim();
                        let nextPayStatus = payStatus;
                        if (!nextPayStatus) {
                            if (status === '待发货' || status === '已付款') nextPayStatus = 'paid';
                            else if (status === '超时已取消') nextPayStatus = 'expired';
                            else nextPayStatus = 'pending';
                        }
                        const expireRaw = Number(o.payExpireAt || 0);
                        const expireAt = Number.isFinite(expireRaw) && expireRaw > 0 ? expireRaw : (createdAt + PAY_EXPIRE_MS);
                        if (expireAt !== expireRaw) {
                            o.payExpireAt = expireAt;
                            changed = true;
                        }
                        if (nextPayStatus === 'pending') {
                            if (Number.isFinite(expireAt) && nowTs > expireAt) {
                                nextPayStatus = 'expired';
                                if (o.status !== '超时已取消') {
                                    o.status = '超时已取消';
                                    changed = true;
                                }
                            } else if (o.status !== '待付款') {
                                o.status = '待付款';
                                changed = true;
                            }
                        } else if (nextPayStatus === 'paid') {
                            if (o.status !== '已付款') {
                                o.status = '已付款';
                                changed = true;
                            }
                        } else if (nextPayStatus === 'expired') {
                            if (o.status !== '超时已取消') {
                                o.status = '超时已取消';
                                changed = true;
                            }
                        }
                        if (nextPayStatus !== payStatus) {
                            o.payStatus = nextPayStatus;
                            changed = true;
                        }
                    });
                    if (changed) saveMall();
                } catch (e) {}
            };

            const loadChecklist = () => {
                try {
                    const raw = localStorage.getItem(storageKeyChecklist);
                    if (!raw) return;
                    const parsed = JSON.parse(raw);
                    if (!parsed || typeof parsed !== 'object') return;
                    if (!Array.isArray(parsed.items)) return;
                    checklist.items = parsed.items
                        .filter(it => it && typeof it === 'object')
                        .map(it => {
                            const qty = Math.max(1, Math.floor(safeNumber(it.qty, 1)));
                            const price = Math.max(0, safeNumber(it.price, 0));
                            return {
                                id: String(it.id || uid()).replace(/\s+/g, ''),
                                name: String(it.name || '').slice(0, 40),
                                qty,
                                price,
                                checked: !!it.checked,
                                createdAt: safeNumber(it.createdAt, Date.now())
                            };
                        });
                } catch (e) {}
            };

            const saveChecklist = () => {
                try {
                    localStorage.setItem(storageKeyChecklist, JSON.stringify({ items: checklist.items }));
                } catch (e) {}
            };

            const ensureDefaultAddress = () => {
                const list = Array.isArray(mall.addresses) ? mall.addresses : [];
                const hasDefault = list.some(a => a && a.isDefault);
                if (list.length && !hasDefault) list[0].isDefault = true;
                if (!list.length) {
                    list.push({ id: uid(), name: '收货人', phone: '', region: '', detail: '', isDefault: true, createdAt: Date.now() });
                }
                mall.addresses = list;
                saveMall();
            };

            const getDefaultAddress = () => {
                const list = Array.isArray(mall.addresses) ? mall.addresses : [];
                return list.find(a => a && a.isDefault) || list[0] || null;
            };

            const cartCount = () => {
                return (mall.cart.items || []).reduce((sum, it) => sum + clampInt(it && it.qty, 0, 999), 0);
            };

            const getCartItem = (productId) => {
                const idx = (mall.cart.items || []).findIndex(it => it && it.productId === productId);
                if (idx < 0) return null;
                return { idx, item: mall.cart.items[idx] };
            };

            const addToCart = (productId, qty) => {
                const p = getProductById(productId);
                if (!p) return;
                const q = clampInt(qty, 1, 99);
                const found = getCartItem(productId);
                if (found) found.item.qty = clampInt(found.item.qty + q, 1, 99);
                else mall.cart.items.unshift({ productId, qty: q, addedAt: Date.now() });
                saveMall();
                render();
            };

            const changeCartQty = (productId, delta) => {
                const found = getCartItem(productId);
                if (!found) return;
                found.item.qty = clampInt(found.item.qty + delta, 1, 99);
                saveMall();
                render();
            };

            const removeFromCart = (productId) => {
                const found = getCartItem(productId);
                if (!found) return;
                mall.cart.items.splice(found.idx, 1);
                saveMall();
                render();
            };

            const toggleFavorite = (productId) => {
                const idx = mall.favorites.indexOf(productId);
                if (idx >= 0) mall.favorites.splice(idx, 1);
                else mall.favorites.unshift(productId);
                saveMall();
                render();
            };

            const PAY_EXPIRE_MS = 2 * 60 * 60 * 1000;

            const nextOrderId = () => {
                mall.lastOrderNo = clampInt(mall.lastOrderNo + 1, 1, 99999999);
                saveMall();
                return `OD${String(mall.lastOrderNo).padStart(6, '0')}`;
            };

            const placeOrder = (items) => {
                const list = (items || []).filter(it => it && getProductById(it.productId));
                if (!list.length) return null;
                const addr = getDefaultAddress();
                const snapshot = list.map(it => {
                    const p = getProductById(it.productId);
                    const qty = clampInt(it.qty, 1, 99);
                    return {
                        productId: p.id,
                        name: p.name,
                        categoryId: p.categoryId,
                        price: safeNumber(p.price, 0),
                        qty
                    };
                });
                const total = snapshot.reduce((sum, it) => sum + it.price * it.qty, 0);
                const order = {
                    id: nextOrderId(),
                    createdAt: Date.now(),
                    status: '待付款',
                    payStatus: 'pending',
                    payExpireAt: Date.now() + PAY_EXPIRE_MS,
                    items: snapshot,
                    total,
                    address: addr ? { name: addr.name, phone: addr.phone, region: addr.region, detail: addr.detail } : null,
                    remark: String(ui.checkoutRemark || '').slice(0, 120)
                };
                mall.orders.unshift(order);
                saveMall();
                return order;
            };

            const push = (view, params) => {
                nav.stack.push({ view, params: params || {} });
                render();
            };

            const pop = () => {
                if (nav.stack.length > 1) {
                    nav.stack.pop();
                    render();
                    return;
                }
                closeToHome();
            };

            const goTab = (tab) => {
                const t = String(tab || 'home');
                nav.tab = t;
                nav.stack = [{ view: t, params: {} }];
                render();
            };

            const current = () => nav.stack[nav.stack.length - 1] || { view: 'home', params: {} };

            const setTitle = (text) => {
                const el = document.getElementById('mallTitle');
                if (el) el.textContent = String(text || '购物');
            };

            const setHeaderRight = (html) => {
                const el = document.getElementById('mallHeaderRight');
                if (el) el.innerHTML = html || '';
            };

            const setActiveTab = () => {
                const tabs = document.querySelectorAll('.tabbar .tab');
                for (let i = 0; i < tabs.length; i++) {
                    const b = tabs[i];
                    const t = b.getAttribute('data-tab');
                    const active = t === nav.tab;
                    if (active) b.classList.add('is-active');
                    else b.classList.remove('is-active');
                }
                const badge = document.getElementById('cartBadge');
                if (badge) badge.textContent = String(cartCount());
            };

            const renderHome = () => {
                const q = String(ui.search || '').trim().toLowerCase();
                const list = PRODUCTS
                    .filter(p => {
                        if (!q) return true;
                        return String(p.name || '').toLowerCase().includes(q) || String(p.brief || '').toLowerCase().includes(q);
                    })
                    .slice(0, 10);

                const cats = CATEGORIES.slice(0, 8).map(c => {
                    return `
                        <button class="cat-btn" type="button" data-act="openCategory" data-id="${c.id}">
                            ${iconSvg(c.icon, 'i i-lg')}
                            <div class="cat-name">${escapeText(c.name)}</div>
                        </button>
                    `;
                }).join('');

                const ps = list.map(p => {
                    const cat = getCategoryById(p.categoryId);
                    return `
                        <button class="p-card" type="button" data-act="openProduct" data-id="${p.id}">
                            <div class="p-top">
                                ${iconSvg((cat && cat.icon) || 'plus', 'i i-lg')}
                                <div class="tag">${escapeText(cat ? cat.name : '商品')}</div>
                            </div>
                            <div class="p-name">${escapeText(p.name)}</div>
                            <div class="p-brief">${escapeText(p.brief || '')}</div>
                            <div class="p-meta">
                                <div class="price">${formatMoney(p.price)}</div>
                                <div class="muted">查看</div>
                            </div>
                        </button>
                    `;
                }).join('');

                return `
                    <div class="card">
                        <div class="row">
                            <div style="flex:1; min-width:0;">
                                <input class="field" data-role="search" placeholder="搜一搜" value="${escapeText(ui.search)}" />
                            </div>
                            <button class="btn" type="button" data-act="clearSearch">清空</button>
                        </div>
                        <div class="divider"></div>
                        <div class="row">
                            <div>
                                <div style="font-weight:900;">今日推荐</div>
                                <div class="note">黑白线条的日常物件，轻轻落在你的生活里。</div>
                            </div>
                            <button class="btn" type="button" data-act="goTab" data-tab="cart">去结算</button>
                        </div>
                    </div>
                    <div class="card">
                        <div class="row">
                            <div style="font-weight:900;">分类</div>
                            <button class="btn" type="button" data-act="goTab" data-tab="categories">更多</button>
                        </div>
                        <div class="grid">${cats}</div>
                    </div>
                    <div class="card">
                        <div class="row">
                            <div style="font-weight:900;">好物</div>
                            <div class="muted">共 ${PRODUCTS.length} 件</div>
                        </div>
                        <div class="products">${ps}</div>
                    </div>
                `;
            };

            const renderCategories = () => {
                const q = String(ui.catQuery || '').trim().toLowerCase();
                const cats = CATEGORIES
                    .filter(c => !q || String(c.name || '').toLowerCase().includes(q))
                    .map(c => {
                        const count = PRODUCTS.filter(p => p.categoryId === c.id).length;
                        return `
                            <div class="li">
                                <div class="li-left">
                                    ${iconSvg(c.icon, 'i')}
                                    <div class="li-main">
                                        <div class="li-title">${escapeText(c.name)}</div>
                                        <div class="li-sub">${count} 件</div>
                                    </div>
                                </div>
                                <button class="btn" type="button" data-act="openCategory" data-id="${c.id}">进入</button>
                            </div>
                        `;
                    }).join('');

                return `
                    <div class="card">
                        <div class="row">
                            <input class="field" data-role="catSearch" placeholder="搜索分类" value="${escapeText(ui.catQuery)}" />
                            <button class="btn" type="button" data-act="clearCatSearch">清空</button>
                        </div>
                    </div>
                    <div class="card">
                        <div class="list">${cats || '<div class="empty">没有匹配的分类</div>'}</div>
                    </div>
                `;
            };

            const renderCategoryDetail = (categoryId) => {
                const c = getCategoryById(categoryId);
                const list = PRODUCTS.filter(p => p.categoryId === categoryId);
                const ps = list.map(p => {
                    return `
                        <button class="p-card" type="button" data-act="openProduct" data-id="${p.id}">
                            <div class="p-top">
                                ${iconSvg((c && c.icon) || 'plus', 'i i-lg')}
                                <div class="tag">${escapeText(c ? c.name : '分类')}</div>
                            </div>
                            <div class="p-name">${escapeText(p.name)}</div>
                            <div class="p-brief">${escapeText(p.brief || '')}</div>
                            <div class="p-meta">
                                <div class="price">${formatMoney(p.price)}</div>
                                <div class="muted">查看</div>
                            </div>
                        </button>
                    `;
                }).join('');

                return `
                    <div class="card">
                        <div class="row">
                            <div>
                                <div style="font-weight:900; display:flex; align-items:center; gap:10px;">${iconSvg((c && c.icon) || 'plus', 'i')}${escapeText(c ? c.name : '分类')}</div>
                                <div class="note">一共 ${list.length} 件商品。</div>
                            </div>
                            <button class="btn" type="button" data-act="goTab" data-tab="cart">购物车</button>
                        </div>
                    </div>
                    <div class="card">
                        <div class="products">${ps || '<div class="empty">这个分类还在上新</div>'}</div>
                    </div>
                `;
            };

            const renderProduct = (productId) => {
                const p = getProductById(productId);
                if (!p) return `<div class="card"><div class="empty">商品不存在</div></div>`;
                const c = getCategoryById(p.categoryId);
                const fav = mall.favorites.indexOf(p.id) >= 0;
                const inCart = getCartItem(p.id);
                const addr = getDefaultAddress();

                return `
                    <div class="card">
                        <div class="row">
                            <div style="display:flex; gap:10px; align-items:center; min-width:0;">
                                ${iconSvg((c && c.icon) || 'plus', 'i i-lg')}
                                <div style="min-width:0;">
                                    <div style="font-weight:900; font-size:16px;">${escapeText(p.name)}</div>
                                    <div class="note">${escapeText(c ? c.name : '商品')} · ${escapeText(p.brief || '')}</div>
                                </div>
                            </div>
                            <button class="icon-btn" type="button" data-act="toggleFav" data-id="${p.id}" aria-label="收藏">
                                <svg class="i" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 17l-5 3 1.5-5.5L4 10.5l5.7-.4L12 5l2.3 5.1 5.7.4-4.5 4 1.5 5.5z" ${fav ? 'style="fill:currentColor;"' : ''}/></svg>
                            </button>
                        </div>
                        <div class="divider"></div>
                        <div class="row">
                            <div>
                                <div class="price" style="font-size:22px;">${formatMoney(p.price)}</div>
                                <div class="note">线条感的图标就是商品本身的“影子”。</div>
                            </div>
                            <div style="display:flex; gap:10px;">
                                <button class="btn" type="button" data-act="shareProduct" data-id="${p.id}" style="border-color:#FF9F43;color:#FF9F43">转发</button>
                                <button class="btn" type="button" data-act="addToCart" data-id="${p.id}">加入车</button>
                                <button class="btn primary" type="button" data-act="buyNow" data-id="${p.id}">立即买</button>
                            </div>
                        </div>
                        <div class="divider"></div>
                        <div class="row">
                            <div class="muted">${inCart ? `已在购物车 · 数量 ${clampInt(inCart.item.qty, 1, 99)}` : '还没加入购物车'}</div>
                            <button class="btn" type="button" data-act="goTab" data-tab="cart">打开购物车</button>
                        </div>
                    </div>
                    <div class="card">
                        <div style="font-weight:900;">收货信息</div>
                        <div class="note" style="margin-top:6px;">${addr ? `${escapeText(addr.name)} · ${escapeText(addr.phone || '')} · ${escapeText((addr.region || '') + ' ' + (addr.detail || ''))}` : '暂无地址'}</div>
                        <div style="margin-top:10px;">
                            <button class="btn" type="button" data-act="openAddresses">管理地址</button>
                        </div>
                    </div>
                `;
            };

            const renderCart = () => {
                const items = (mall.cart.items || []).filter(it => it && getProductById(it.productId));
                const rows = items.map(it => {
                    const p = getProductById(it.productId);
                    const c = getCategoryById(p.categoryId);
                    const qty = clampInt(it.qty, 1, 99);
                    return `
                        <div class="li">
                            <div class="li-left">
                                ${iconSvg((c && c.icon) || 'plus', 'i')}
                                <div class="li-main">
                                    <div class="li-title">${escapeText(p.name)}</div>
                                    <div class="li-sub">${escapeText(c ? c.name : '')} · ${formatMoney(p.price)}</div>
                                </div>
                            </div>
                            <div style="display:flex; align-items:center; gap:10px;">
                                <div class="qty" aria-label="数量">
                                    <button type="button" data-act="cartDec" data-id="${p.id}" aria-label="减少">-</button>
                                    <span>${qty}</span>
                                    <button type="button" data-act="cartInc" data-id="${p.id}" aria-label="增加">+</button>
                                </div>
                                <button class="icon-btn" type="button" data-act="cartRemove" data-id="${p.id}" aria-label="移除">
                                    <svg class="i" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16"/><path d="M9 7V5h6v2"/><path d="M8 7l1 14h6l1-14"/></svg>
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');

                const total = items.reduce((sum, it) => {
                    const p = getProductById(it.productId);
                    return sum + safeNumber(p.price, 0) * clampInt(it.qty, 1, 99);
                }, 0);

                return `
                    <div class="card">
                        <div class="row">
                            <div>
                                <div style="font-weight:900;">购物车</div>
                                <div class="note">你挑的东西，都在这里等你。</div>
                            </div>
                            <div class="muted">共 ${items.length} 种</div>
                        </div>
                        <div class="divider"></div>
                        <div class="row">
                            <div>
                                <div class="muted">合计</div>
                                <div class="price" style="font-size:22px;">${formatMoney(total)}</div>
                            </div>
                            <button class="btn primary" type="button" data-act="checkout">下单</button>
                        </div>
                        <div class="note" style="margin-top:8px;">下单会生成本地订单记录，不会联网。</div>
                    </div>
                    <div class="card">
                        <div class="list">${rows || '<div class="empty">购物车空空的，去首页逛逛吧</div>'}</div>
                    </div>
                    <div class="card">
                        <div class="form">
                            <div style="font-weight:900;">备注</div>
                            <input class="field" data-role="remark" placeholder="比如：不要太甜 / 尽量晚上送" value="${escapeText(ui.checkoutRemark)}" />
                        </div>
                    </div>
                `;
            };

            const renderMe = () => {
                const nick = String(mall.profile.nickname || '').trim() || '我';
                const ordersCount = Array.isArray(mall.orders) ? mall.orders.length : 0;
                const favCount = Array.isArray(mall.favorites) ? mall.favorites.length : 0;
                return `
                    <div class="card">
                        <div class="row">
                            <div>
                                <div style="font-weight:900; font-size:16px;">${escapeText(nick)}</div>
                                <div class="note">这里是你的角落：订单、收藏、地址、清单。</div>
                            </div>
                            <button class="btn" type="button" data-act="editProfile">改昵称</button>
                        </div>
                    </div>
                    <div class="card">
                        <div class="list">
                            <div class="li">
                                <div class="li-left">
                                    <svg class="i" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 7h10"/><path d="M7 12h10"/><path d="M7 17h10"/><path d="M5 4h14v16H5z"/></svg>
                                    <div class="li-main">
                                        <div class="li-title">我的订单</div>
                                        <div class="li-sub">${ordersCount} 条</div>
                                    </div>
                                </div>
                                <button class="btn" type="button" data-act="openOrders">查看</button>
                            </div>
                            <div class="li">
                                <div class="li-left">
                                    <svg class="i" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21s7-4 7-10a7 7 0 0 0-14 0c0 6 7 10 7 10z"/><path d="M12 11a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"/></svg>
                                    <div class="li-main">
                                        <div class="li-title">收货地址</div>
                                        <div class="li-sub">${(mall.addresses || []).length} 条</div>
                                    </div>
                                </div>
                                <button class="btn" type="button" data-act="openAddresses">管理</button>
                            </div>
                            <div class="li">
                                <div class="li-left">
                                    <svg class="i" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 17l-5 3 1.5-5.5L4 10.5l5.7-.4L12 5l2.3 5.1 5.7.4-4.5 4 1.5 5.5z"/></svg>
                                    <div class="li-main">
                                        <div class="li-title">收藏</div>
                                        <div class="li-sub">${favCount} 件</div>
                                    </div>
                                </div>
                                <button class="btn" type="button" data-act="openFav">打开</button>
                            </div>
                            <div class="li">
                                <div class="li-left">
                                    <svg class="i" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16"/><path d="M4 12h10"/><path d="M4 18h12"/></svg>
                                    <div class="li-main">
                                        <div class="li-title">购物清单</div>
                                        <div class="li-sub">随手记要买的东西</div>
                                    </div>
                                </div>
                                <button class="btn" type="button" data-act="openChecklist">打开</button>
                            </div>
                        </div>
                    </div>
                `;
            };

            const renderOrders = () => {
                const list = Array.isArray(mall.orders) ? mall.orders : [];
                if (!list.length) return `<div class="card"><div class="empty">还没有订单，去购物车下单吧</div></div>`;
                const rows = list.map(o => {
                    const items = Array.isArray(o.items) ? o.items : [];
                    const count = items.reduce((sum, it) => sum + clampInt(it && it.qty, 0, 99), 0);
                    const nowTs = Date.now();
                    const expireAt = Number(o.payExpireAt || 0);
                    const statusCalc = (() => {
                        const ps = String(o.payStatus || '').trim();
                        if (ps === 'paid') {
                            return o.payByName ? `${escapeText(o.payByName)} 已代付` : '已付款';
                        }
                        if (ps === 'expired') return '超时已取消';
                        if (Number.isFinite(expireAt) && expireAt > 0 && nowTs > expireAt) return '超时已取消';
                        return '待付款';
                    })();
                    return `
                        <div class="li">
                            <div class="li-left">
                                <svg class="i" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 7h12"/><path d="M6 12h12"/><path d="M6 17h12"/><path d="M4 4h16v16H4z"/></svg>
                                <div class="li-main">
                                    <div class="li-title">${escapeText(o.id || '')}</div>
                                    <div class="li-sub">${statusCalc} · ${count} 件 · ${formatMoney(o.total)}</div>
                                </div>
                            </div>
                            <button class="btn" type="button" data-act="openOrder" data-id="${escapeText(o.id || '')}">详情</button>
                        </div>
                    `;
                }).join('');
                return `
                    <div class="card">
                        <div class="row">
                            <div>
                                <div style="font-weight:900;">我的订单</div>
                                <div class="note">每一笔，都像一段被你选择的日常。</div>
                            </div>
                            <div class="muted">${list.length} 条</div>
                        </div>
                    </div>
                    <div class="card"><div class="list">${rows}</div></div>
                `;
            };

            const renderOrderDetail = (orderId) => {
                const o = (mall.orders || []).find(x => x && x.id === orderId);
                if (!o) return `<div class="card"><div class="empty">订单不存在</div></div>`;
                const items = Array.isArray(o.items) ? o.items : [];
                const rows = items.map(it => {
                    const c = getCategoryById(it.categoryId);
                    return `
                        <div class="li">
                            <div class="li-left">
                                ${iconSvg((c && c.icon) || 'plus', 'i')}
                                <div class="li-main">
                                    <div class="li-title">${escapeText(it.name || '')}</div>
                                    <div class="li-sub">${formatMoney(it.price)} · 数量 ${clampInt(it.qty, 1, 99)}</div>
                                </div>
                            </div>
                            <div class="price">${formatMoney(safeNumber(it.price, 0) * clampInt(it.qty, 1, 99))}</div>
                        </div>
                    `;
                }).join('');
                const addr = o.address;
                const addrText = addr ? `${escapeText(addr.name || '')} · ${escapeText(addr.phone || '')} · ${escapeText((addr.region || '') + ' ' + (addr.detail || ''))}` : '无';
                const nowTs = Date.now();
                const expireAt = Number(o.payExpireAt || 0);
                const statusCalc = (() => {
                    const ps = String(o.payStatus || '').trim();
                    if (ps === 'paid') return '已付款';
                    if (ps === 'expired') return '超时已取消';
                    if (Number.isFinite(expireAt) && expireAt > 0 && nowTs > expireAt) return '超时已取消';
                    return '待付款';
                })();
                const paidByText = (String(o.payStatus || '') === 'paid' && o.payByName) ? ` · 由 ${escapeText(o.payByName)} 代付` : '';
                return `
                    <div class="card">
                        <div class="row">
                            <div>
                                <div style="font-weight:900;">${escapeText(o.id || '')}</div>
                                <div class="note">${statusCalc}${paidByText} · ${new Date(safeNumber(o.createdAt, Date.now())).toLocaleString()}</div>
                            </div>
                            <div class="price">${formatMoney(o.total)}</div>
                            ${statusCalc === '待付款' ? `<button class="btn" type="button" data-act="payRequest" data-id="${o.id}" style="margin-left:10px;border-color:#FF9F43;color:#FF9F43">找人代付</button>` : ''}
                        </div>
                        <div class="divider"></div>
                        <div class="note">收货：${addrText}</div>
                        ${o.remark ? `<div class="note" style="margin-top:6px;">备注：${escapeText(o.remark)}</div>` : ''}
                    </div>
                    <div class="card">
                        <div style="font-weight:900;">商品明细</div>
                        <div class="divider"></div>
                        <div class="list">${rows}</div>
                    </div>
                `;
            };

            const renderAddresses = () => {
                const list = Array.isArray(mall.addresses) ? mall.addresses : [];
                const rows = list.map(a => {
                    const t = `${escapeText(a.region || '')} ${escapeText(a.detail || '')}`.trim();
                    return `
                        <div class="li">
                            <div class="li-left">
                                <svg class="i" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21s7-4 7-10a7 7 0 0 0-14 0c0 6 7 10 7 10z"/><path d="M12 11a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"/></svg>
                                <div class="li-main">
                                    <div class="li-title">${escapeText(a.name || '')}${a.isDefault ? ' · 默认' : ''}</div>
                                    <div class="li-sub">${escapeText(a.phone || '')} · ${t || '未填写'}</div>
                                </div>
                            </div>
                            <div style="display:flex; gap:10px;">
                                <button class="btn" type="button" data-act="setDefaultAddr" data-id="${escapeText(a.id || '')}">设默认</button>
                                <button class="btn" type="button" data-act="editAddr" data-id="${escapeText(a.id || '')}">编辑</button>
                            </div>
                        </div>
                    `;
                }).join('');
                return `
                    <div class="card">
                        <div class="row">
                            <div>
                                <div style="font-weight:900;">收货地址</div>
                                <div class="note">用于本地订单的收货信息。</div>
                            </div>
                            <button class="btn primary" type="button" data-act="addAddr">新增</button>
                        </div>
                    </div>
                    <div class="card"><div class="list">${rows}</div></div>
                `;
            };

            const renderAddressEdit = (addrId) => {
                const list = Array.isArray(mall.addresses) ? mall.addresses : [];
                const a = list.find(x => x && x.id === addrId) || { id: '', name: '', phone: '', region: '', detail: '', isDefault: false };
                const isNew = !a.id;
                return `
                    <div class="card">
                        <div class="row">
                            <div>
                                <div style="font-weight:900;">${isNew ? '新增地址' : '编辑地址'}</div>
                                <div class="note">尽量简短，方便自己辨认。</div>
                            </div>
                            <button class="btn primary" type="button" data-act="saveAddr" data-id="${escapeText(a.id || '')}">保存</button>
                        </div>
                        <div class="divider"></div>
                        <div class="form">
                            <input class="field" data-role="addrName" placeholder="收货人" value="${escapeText(a.name || '')}" />
                            <input class="field" data-role="addrPhone" placeholder="手机（可选）" inputmode="tel" value="${escapeText(a.phone || '')}" />
                            <input class="field" data-role="addrRegion" placeholder="地区（可选）" value="${escapeText(a.region || '')}" />
                            <input class="field" data-role="addrDetail" placeholder="详细地址（可选）" value="${escapeText(a.detail || '')}" />
                            <div class="note">保存后可在列表里设为默认地址。</div>
                        </div>
                    </div>
                `;
            };

            const renderFavorites = () => {
                const list = (mall.favorites || []).map(id => getProductById(id)).filter(Boolean);
                if (!list.length) return `<div class="card"><div class="empty">还没有收藏，去商品页点一下星星</div></div>`;
                const rows = list.map(p => {
                    const c = getCategoryById(p.categoryId);
                    return `
                        <div class="li">
                            <div class="li-left">
                                ${iconSvg((c && c.icon) || 'plus', 'i')}
                                <div class="li-main">
                                    <div class="li-title">${escapeText(p.name)}</div>
                                    <div class="li-sub">${escapeText(c ? c.name : '')} · ${formatMoney(p.price)}</div>
                                </div>
                            </div>
                            <div style="display:flex; gap:10px;">
                                <button class="btn" type="button" data-act="openProduct" data-id="${p.id}">查看</button>
                                <button class="btn" type="button" data-act="toggleFav" data-id="${p.id}">取消</button>
                            </div>
                        </div>
                    `;
                }).join('');
                return `
                    <div class="card">
                        <div class="row">
                            <div>
                                <div style="font-weight:900;">收藏</div>
                                <div class="note">你喜欢的线条，都被你留住了。</div>
                            </div>
                            <div class="muted">${list.length} 件</div>
                        </div>
                    </div>
                    <div class="card"><div class="list">${rows}</div></div>
                `;
            };

            const renderProfileEdit = () => {
                const nick = String(mall.profile.nickname || '').trim();
                return `
                    <div class="card">
                        <div class="row">
                            <div>
                                <div style="font-weight:900;">编辑昵称</div>
                                <div class="note">它会出现在“我的”页面。</div>
                            </div>
                            <button class="btn primary" type="button" data-act="saveProfile">保存</button>
                        </div>
                        <div class="divider"></div>
                        <input class="field" data-role="nickname" maxlength="12" placeholder="输入昵称" value="${escapeText(nick)}" />
                    </div>
                `;
            };

            const renderChecklist = () => {
                const items = Array.isArray(checklist.items) ? checklist.items : [];
                const checkedItems = items.filter(it => it && it.checked);
                const checkedCount = checkedItems.length;
                const totalCount = items.length;
                const totalPrice = checkedItems.reduce((sum, it) => sum + safeNumber(it.price, 0) * safeNumber(it.qty, 1), 0);

                const rows = items.map(it => {
                    const qty = Math.max(1, Math.floor(safeNumber(it.qty, 1)));
                    const price = Math.max(0, safeNumber(it.price, 0));
                    const subtotal = price * qty;
                    return `
                        <div class="li" style="align-items:flex-start;">
                            <div class="li-left" style="align-items:flex-start;">
                                <input type="checkbox" data-role="ckCheck" data-id="${escapeText(it.id)}" ${it.checked ? 'checked' : ''} style="width:22px; height:22px; margin-top:2px;" />
                                <div class="li-main">
                                    <div class="li-title">${escapeText(it.name || '')}</div>
                                    <div class="li-sub">${formatMoney(price)} / 件 · 小计 ${formatMoney(subtotal)}</div>
                                </div>
                            </div>
                            <div style="display:flex; flex-direction:column; align-items:flex-end; gap:10px;">
                                <div class="qty" aria-label="数量">
                                    <button type="button" data-act="ckDec" data-id="${escapeText(it.id)}" aria-label="减少">-</button>
                                    <span>${qty}</span>
                                    <button type="button" data-act="ckInc" data-id="${escapeText(it.id)}" aria-label="增加">+</button>
                                </div>
                                <button class="btn" type="button" data-act="ckDel" data-id="${escapeText(it.id)}">删除</button>
                            </div>
                        </div>
                    `;
                }).join('');

                return `
                    <div class="card">
                        <div style="font-weight:900;">购物清单</div>
                        <div class="note" style="margin-top:6px;">把要买的东西先放进这里，等心情合适再去下单。</div>
                        <div class="divider"></div>
                        <form class="form" id="ckForm">
                            <input class="field" id="ckName" maxlength="40" placeholder="要买什么" />
                            <div class="two">
                                <input class="field" id="ckPrice" type="number" min="0" step="0.01" inputmode="decimal" placeholder="单价" />
                                <input class="field" id="ckQty" type="number" min="1" step="1" inputmode="numeric" placeholder="数量" value="1" />
                            </div>
                            <div class="row">
                                <button class="btn primary" type="submit">加入清单</button>
                                <button class="btn" type="button" data-act="ckClearChecked">清空已勾选</button>
                            </div>
                        </form>
                    </div>
                    <div class="card">
                        <div class="row">
                            <div class="muted">已勾选 <span style="font-weight:900;">${checkedCount}</span> / 共 <span style="font-weight:900;">${totalCount}</span></div>
                            <div class="muted">合计 <span style="font-weight:900;">${formatMoney(totalPrice)}</span></div>
                        </div>
                        <div class="divider"></div>
                        <div class="list">${rows || '<div class="empty">还没有清单，先加一件吧</div>'}</div>
                    </div>
                `;
            };

            const render = () => {
                ensureDefaultAddress();
                normalizeOrders();
                const viewEl = document.getElementById('mallView');
                if (!viewEl) return;

                const now = current();
                const view = String(now.view || 'home');
                const params = now.params || {};

                let title = '购物';
                let headerRight = '';
                let html = '';

                if (view === 'home') {
                    title = '购物';
                    html = renderHome();
                } else if (view === 'categories') {
                    title = '分类';
                    html = renderCategories();
                } else if (view === 'cart') {
                    title = '购物车';
                    html = renderCart();
                } else if (view === 'me') {
                    title = '个人主页';
                    html = renderMe();
                } else if (view === 'categoryDetail') {
                    const c = getCategoryById(params.id);
                    title = c ? c.name : '分类';
                    html = renderCategoryDetail(params.id);
                } else if (view === 'product') {
                    const p = getProductById(params.id);
                    title = p ? p.name : '商品';
                    html = renderProduct(params.id);
                } else if (view === 'orders') {
                    title = '订单';
                    html = renderOrders();
                } else if (view === 'orderDetail') {
                    title = '订单详情';
                    html = renderOrderDetail(params.id);
                } else if (view === 'addresses') {
                    title = '地址';
                    html = renderAddresses();
                } else if (view === 'addrEdit') {
                    title = '编辑地址';
                    html = renderAddressEdit(params.id || '');
                } else if (view === 'favorites') {
                    title = '收藏';
                    html = renderFavorites();
                } else if (view === 'profileEdit') {
                    title = '编辑';
                    html = renderProfileEdit();
                } else if (view === 'checklist') {
                    title = '清单';
                    html = renderChecklist();
                } else {
                    title = '购物';
                    html = renderHome();
                }

                setTitle(title);
                setHeaderRight(headerRight);
                setActiveTab();

                const viewKey = `${view}:${JSON.stringify(params || {})}`;
                const shouldResetScroll = ui.lastViewKey !== viewKey;
                ui.lastViewKey = viewKey;
                viewEl.innerHTML = html;
                if (shouldResetScroll) {
                    try {
                        viewEl.scrollTop = 0;
                    } catch (e) {}
                }
            };

            const openCategory = (id) => push('categoryDetail', { id: String(id || '') });
            const openProduct = (id) => push('product', { id: String(id || '') });

            const openOrders = () => push('orders', {});
            const openOrder = (id) => push('orderDetail', { id: String(id || '') });
            const openAddresses = () => push('addresses', {});
            const openFavorites = () => push('favorites', {});
            const openChecklist = () => push('checklist', {});
            const editProfile = () => push('profileEdit', {});

            const setDefaultAddr = (addrId) => {
                const id = String(addrId || '');
                const list = Array.isArray(mall.addresses) ? mall.addresses : [];
                for (let i = 0; i < list.length; i++) {
                    const a = list[i];
                    if (!a) continue;
                    a.isDefault = a.id === id;
                }
                mall.addresses = list;
                saveMall();
                render();
            };

            const saveAddrFromView = (addrId) => {
                const nameEl = document.querySelector('[data-role="addrName"]');
                const phoneEl = document.querySelector('[data-role="addrPhone"]');
                const regionEl = document.querySelector('[data-role="addrRegion"]');
                const detailEl = document.querySelector('[data-role="addrDetail"]');
                const name = String(nameEl && nameEl.value ? nameEl.value : '').trim().slice(0, 20);
                const phone = String(phoneEl && phoneEl.value ? phoneEl.value : '').trim().slice(0, 20);
                const region = String(regionEl && regionEl.value ? regionEl.value : '').trim().slice(0, 30);
                const detail = String(detailEl && detailEl.value ? detailEl.value : '').trim().slice(0, 60);

                if (!name) return;
                const list = Array.isArray(mall.addresses) ? mall.addresses : [];
                const id = String(addrId || '');
                let target = list.find(a => a && a.id === id) || null;
                if (!target) {
                    const nid = uid();
                    target = { id: nid, name: '', phone: '', region: '', detail: '', isDefault: !list.length, createdAt: Date.now() };
                    list.unshift(target);
                }
                target.name = name;
                target.phone = phone;
                target.region = region;
                target.detail = detail;
                mall.addresses = list;
                saveMall();
                nav.stack.pop();
                render();
            };

            const saveProfileFromView = () => {
                const el = document.querySelector('[data-role="nickname"]');
                const nick = String(el && el.value ? el.value : '').trim().slice(0, 12);
                mall.profile.nickname = nick;
                saveMall();
                nav.stack.pop();
                render();
            };

            const checkout = () => {
                const items = (mall.cart.items || []).filter(it => it && getProductById(it.productId));
                const order = placeOrder(items);
                if (!order) return;
                mall.cart.items = [];
                ui.checkoutRemark = '';
                saveMall();
                push('orderDetail', { id: order.id });
            };

            const buyNow = (productId) => {
                const p = getProductById(productId);
                if (!p) return;
                const order = placeOrder([{ productId: p.id, qty: 1 }]);
                if (!order) return;
                push('orderDetail', { id: order.id });
            };

            const ckFind = (id) => {
                const idx = (checklist.items || []).findIndex(it => it && it.id === id);
                if (idx < 0) return null;
                return { idx, item: checklist.items[idx] };
            };

            const ckAddFromForm = () => {
                const nameEl = document.getElementById('ckName');
                const priceEl = document.getElementById('ckPrice');
                const qtyEl = document.getElementById('ckQty');
                const name = String(nameEl && nameEl.value ? nameEl.value : '').trim();
                if (!name) return;
                const price = Math.max(0, safeNumber(priceEl && priceEl.value, 0));
                const qty = Math.max(1, Math.floor(safeNumber(qtyEl && qtyEl.value, 1)));
                checklist.items.unshift({ id: uid(), name: name.slice(0, 40), qty, price, checked: false, createdAt: Date.now() });
                saveChecklist();
                render();
                try {
                    if (nameEl) nameEl.value = '';
                    if (priceEl) priceEl.value = '';
                    if (qtyEl) qtyEl.value = String(qty);
                    if (nameEl) nameEl.focus({ preventScroll: true });
                } catch (e) {}
            };

            const ckToggle = (id, checked) => {
                const found = ckFind(id);
                if (!found) return;
                found.item.checked = !!checked;
                saveChecklist();
                render();
            };

            const ckChangeQty = (id, delta) => {
                const found = ckFind(id);
                if (!found) return;
                found.item.qty = Math.max(1, Math.floor(safeNumber(found.item.qty, 1)) + delta);
                saveChecklist();
                render();
            };

            const ckDelete = (id) => {
                const found = ckFind(id);
                if (!found) return;
                checklist.items.splice(found.idx, 1);
                saveChecklist();
                render();
            };

            const ckClearChecked = () => {
                const before = checklist.items.length;
                checklist.items = (checklist.items || []).filter(it => !it.checked);
                if (checklist.items.length === before) return;
                saveChecklist();
                render();
            };

            document.addEventListener('click', (e) => {
                const btn = e.target && e.target.closest ? e.target.closest('[data-act]') : null;
                if (!btn) return;
                const act = btn.getAttribute('data-act');
                const id = btn.getAttribute('data-id');
                const tab = btn.getAttribute('data-tab');
                if (act === 'goTab') goTab(tab);
                if (act === 'openCategory') openCategory(id);
                if (act === 'openProduct') openProduct(id);
                if (act === 'shareProduct') {
                    const p = getProductById(id);
                    if (p && window.ShoppingExtension) {
                        window.ShoppingExtension.showSelector(c => window.ShoppingExtension.sendShare(c, p));
                    }
                }
                if (act === 'payRequest') {
                    const o = (mall.orders || []).find(x => x && x.id === id);
                    if (o && window.ShoppingExtension) {
                        window.ShoppingExtension.showSelector(c => window.ShoppingExtension.sendPayRequest(c, o));
                    }
                }
                if (act === 'clearSearch') {
                    ui.search = '';
                    render();
                }
                if (act === 'clearCatSearch') {
                    ui.catQuery = '';
                    render();
                }
                if (act === 'cartDec') changeCartQty(id, -1);
                if (act === 'cartInc') changeCartQty(id, 1);
                if (act === 'cartRemove') removeFromCart(id);
                if (act === 'checkout') checkout();
                if (act === 'addToCart') addToCart(id, 1);
                if (act === 'buyNow') buyNow(id);
                if (act === 'toggleFav') toggleFavorite(id);
                if (act === 'openOrders') openOrders();
                if (act === 'openOrder') openOrder(id);
                if (act === 'openAddresses') openAddresses();
                if (act === 'addAddr') push('addrEdit', { id: '' });
                if (act === 'editAddr') push('addrEdit', { id: String(id || '') });
                if (act === 'saveAddr') saveAddrFromView(id);
                if (act === 'setDefaultAddr') setDefaultAddr(id);
                if (act === 'openFav') openFavorites();
                if (act === 'openChecklist') openChecklist();
                if (act === 'editProfile') editProfile();
                if (act === 'saveProfile') saveProfileFromView();
                if (act === 'ckDec') ckChangeQty(id, -1);
                if (act === 'ckInc') ckChangeQty(id, 1);
                if (act === 'ckDel') ckDelete(id);
                if (act === 'ckClearChecked') ckClearChecked();
            }, { passive: true });

            document.addEventListener('change', (e) => {
                const t = e.target;
                if (!t) return;
                const role = t.getAttribute ? t.getAttribute('data-role') : '';
                if (role === 'search') {
                    ui.search = String(t.value || '').slice(0, 30);
                    render();
                }
                if (role === 'catSearch') {
                    ui.catQuery = String(t.value || '').slice(0, 20);
                    render();
                }
                if (role === 'remark') {
                    ui.checkoutRemark = String(t.value || '').slice(0, 120);
                    saveMall();
                }
                if (role === 'ckCheck') {
                    const id = t.getAttribute('data-id');
                    if (!id) return;
                    ckToggle(id, !!t.checked);
                }
            }, { passive: true });

            document.addEventListener('submit', (e) => {
                const form = e.target;
                if (!form) return;
                if (form.id === 'ckForm') {
                    e.preventDefault();
                    ckAddFromForm();
                }
            });

            const backBtn = document.getElementById('gouWuBackBtn');
            if (backBtn) backBtn.addEventListener('click', pop);

            try {
                const appBus = new BroadcastChannel('phone_app_bus');
                appBus.onmessage = (event) => {
                    const data = event && event.data ? event.data : null;
                    if (!data || data.type !== 'pay_success') return;
                    const payload = data.payload && typeof data.payload === 'object' ? data.payload : {};
                    const orderId = payload.orderId != null ? String(payload.orderId) : '';
                    if (!orderId) return;
                    const order = (mall.orders || []).find(o => o && String(o.id) === orderId);
                    if (!order) return;
                    order.status = '已付款';
                    order.payStatus = 'paid';
                    order.payByName = String(payload.contactName || '').trim();
                    order.paidAt = Date.now();
                    saveMall();
                    render();
                };
            } catch (e) {}

            loadMall();
            loadChecklist();
            render();

            try {
                window.parent.postMessage({ type: 'app_ready', appId: 'gouwu' }, '*');
            } catch (e) {
                console.error('Failed to send app_ready message:', e);
            }
        })();
    </script>
</body>
</html>
