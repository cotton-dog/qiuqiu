                    return null;

                return storage.transaction(this.dbName, ['images'], async (tx) => {

                    await this._req(store.delete(id));
                });
            },

            async set(id, blob, type) {

                return true;

                return true;

        function blobToDataUrl(blob) {
            return new Promise((resolve, reject) => {

                reader.readAsDataURL(blob);

        function canvasToBlob(canvas, type, quality) {
            const mime = type || 'image/jpeg';
            const q = typeof quality === 'number' ? quality : 0.84;
            return new Promise((resolve) => {
                if (canvas.toBlob) {
                    canvas.toBlob((b) => resolve(b), mime, q);
                    return;
                }
                resolve(null);
            });
        }

        async function compressImageFile(file, opts) {
            const maxEdge = (opts && opts.maxEdge) ? Number(opts.maxEdge) : 900;
            const quality = (opts && typeof opts.quality === 'number') ? opts.quality : 0.84;
            const blobUrlService = getBlobUrlService();
            if (!blobUrlService) throw new Error('BlobUrlService不可用');
            const url = blobUrlService.createObjectUrl(file, { groupId: GROUP_ID + '-compress' });
            try {
                const img = new Image();
                img.decoding = 'async';
                img.src = url;
                await new Promise((resolve, reject) => {
                    img.onload = () => resolve(true);
                    img.onerror = () => reject(new Error('Image load failed'));
                });

                const iw = img.naturalWidth || img.width || 0;
                const ih = img.naturalHeight || img.height || 0;
                if (!iw || !ih) throw new Error('Invalid image size');

                const scale = Math.min(1, maxEdge / Math.max(iw, ih));
                const w = Math.max(1, Math.round(iw * scale));
                const h = Math.max(1, Math.round(ih * scale));

                const canvas = document.createElement('canvas');
                canvas.width = w;
                canvas.height = h;
                const ctx = canvas.getContext('2d', { alpha: false });
                if (!ctx) throw new Error('Canvas not supported');
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';
                ctx.drawImage(img, 0, 0, w, h);

                const blob = await canvasToBlob(canvas, 'image/jpeg', quality);
                if (blob) return blob;

                const dataUrl = canvas.toDataURL('image/jpeg', quality);
                const res = await fetch(dataUrl);
                return await res.blob();
            } finally {
                blobUrlService.revokeObjectUrl(url);
            }
        }

        function initIcons(root) {

                const svg = ICON_SVGS[name];
                if (!svg) return;
                if (el.__icoReady) return;
                el.innerHTML = svg;
                el.__icoReady = true;
            });
        }

        function toggleMenu() {
            if (!menuOverlay || !menuPop) return;

        function openToolSection(kind) {
            if (!toolbar) return;
            toolbar.classList.remove('hidden');

            const sections = [searchSection, categorySection, styleSection, backupSection];
            sections.forEach(s => {
                if (s) s.classList.remove('active');
            });

            if (kind === 'search' && searchSection) {
                searchSection.classList.add('active');
                if (searchInput) {
                    searchInput.focus();
                    try { searchInput.setSelectionRange(searchInput.value.length, searchInput.value.length); } catch (e) {}
                }

            if (kind === 'category' && categorySection) {
                categorySection.classList.add('active');
                renderCategoryChips();
            }

            if (kind === 'style' && styleSection) {
                styleSection.classList.add('active');
            }

            if (kind === 'backup' && backupSection) {
                backupSection.classList.add('active');
                renderDiaries();
            }

            updateNotebookBackText();
        }

        function normalizeMoodKey(value) {
            const v = String(value || '').trim();
            if (!v) return '';
            const map = {
                '😀': 'happy',
                '🙂': 'calm',
                '😐': 'okay',
                '😔': 'sad',
                '😡': 'angry',
                '😴': 'tired'
            };
            if (map[v]) return map[v];
            const allow = new Set(['happy', 'calm', 'okay', 'sad', 'angry', 'tired']);
            return allow.has(v) ? v : '';
        }

        function getWechatData() {
            const raw = localStorage.getItem('wechatAppData');
            if (!raw) return null;
            try {
                const parsed = JSON.parse(raw);
                return parsed && typeof parsed === 'object' ? parsed : null;
            } catch (e) {
                return null;
            }
        }

        function mapAvatarColor(name) {
            const map = {
                'bg-sage': '#a3b1c6',
                'bg-rose': '#c9b1be',
                'bg-sand': '#d6cebe',
                'bg-slate': '#8fa1b3',
                'bg-olive': '#9da391',
                'bg-terracotta': '#c6a3a3'
            };
            return map[name] || '';
        }

        function toAvatarModelFromUser(user) {
            if (!user || typeof user !== 'object') return null;
            const hasCustom = !!user.hasCustomAvatar;
            const text = (user.name ? String(user.name).trim().slice(0, 1) : '我') || '我';
            const color = mapAvatarColor(user.avatarColor) || '';
            const src = hasCustom ? (localStorage.getItem('user_avatar') || '') : '';
            return { src, text, color };
        }

        function toAvatarModelFromContact(contact) {
            if (!contact || typeof contact !== 'object') return null;
            const id = contact.id != null ? String(contact.id) : (contact.wechatId != null ? String(contact.wechatId) : '');
            const hasCustom = !!contact.hasCustomAvatar;
            const src = hasCustom && id ? (localStorage.getItem(`avatar_${id}`) || '') : '';
            const avatarText = contact.avatarText || (contact.name ? String(contact.name).trim().slice(0, 1) : '友');
            const color = mapAvatarColor(contact.avatarColor) || '';
            return { src, text: String(avatarText || '友').slice(0, 1), color };
        }

        // 使用BlobUrlService统一管理Blob URL
        const GROUP_ID = 'diary'; // 日记页面的分组ID

        // 获取BlobUrlService实例（支持iframe嵌套）
        function getBlobUrlService() {
            if (window.parent && window.parent.Core && window.parent.Core.BlobUrlService) {
                return window.parent.Core.BlobUrlService;
            }
            if (window.Core && window.Core.BlobUrlService) {
                return window.Core.BlobUrlService;
            }
            return null;
        }

        // 清理日记页面的Blob URL
        window.addEventListener('beforeunload', () => {
            const blobUrlService = getBlobUrlService();
            if (blobUrlService && typeof blobUrlService.clearGroup === 'function') {
                blobUrlService.clearGroup(GROUP_ID);
            }
        });

        async function resolveIdbSrc(src) {
            if (!src || typeof src !== 'string' || !src.startsWith('idb:')) return src;
            const id = src.slice(4);
            if (!id) return '';

            try {
                const stored = await window.ImageStorageDB.get(id);
                if (!stored) return '';
                
                const blobUrlService = getBlobUrlService();
                if (!blobUrlService) throw new Error('BlobUrlService不可用');
                
                if (stored && typeof stored === 'object' && typeof stored.arrayBuffer === 'function') {
                    const url = await blobUrlService.toDisplayUrl(stored, { 
                        preferDataUrlInFileProtocol: true,
                        groupId: GROUP_ID 
                    });
                    return url;
                }
                return stored;
            } catch (e) {
                return '';
            }
        }

        function findContactById(appData, desiredId) {
            const id = String(desiredId || '').trim();
            if (!id || !appData) return null;
            const contacts = Array.isArray(appData.contacts) ? appData.contacts : [];
            return contacts.find(c => c && (String(c.id || '') === id || String(c.wechatId || '') === id)) || null;
        }

        function updateNotebookAvatars() {
            // 清空原有容器
            if (leftAvatarContainer) leftAvatarContainer.innerHTML = '';
            if (rightAvatarContainer) rightAvatarContainer.innerHTML = '';
            // 兼容旧代码，如果还存在 notebookAvatars
            if (notebookAvatars) notebookAvatars.innerHTML = '';

            const appData = getWechatData();
            const userModel = toAvatarModelFromUser(appData && appData.currentUser);
            const notebook = notebooks.find(n => n && n.id === currentNotebookId);
            const roleId = notebook && notebook.linkedRole ? notebook.linkedRole.id : '';
            const roleContact = roleId ? findContactById(appData, roleId) : null;
            const roleModel = toAvatarModelFromContact(roleContact);

            // 渲染用户头像到左侧
            if (userModel && leftAvatarContainer) {
                const el = document.createElement('div');
                el.className = 'avatar-item' + (userModel.src ? ' has-img' : '');
                if (userModel.src) {
                    if (userModel.src.startsWith('idb:')) {
                        resolveIdbSrc(userModel.src).then(resolved => {
                            if (resolved) el.style.backgroundImage = `url(${resolved})`;
                        }).catch(() => {});
                    } else {
                        el.style.backgroundImage = `url(${userModel.src})`;
                    }
                } else {
                    if (userModel.color) el.style.backgroundColor = userModel.color;
                    el.textContent = userModel.text || '';
                }
                leftAvatarContainer.appendChild(el);
            }

            // 渲染好友头像到右侧
            if (roleModel && rightAvatarContainer) {
                const el = document.createElement('div');

        function exportData() {
            try {
                const payload = {
                    version: 2,
                    exportedAt: new Date().toISOString(),
                    diaries: currentDiaries || [],
                    templates: currentTemplates || [],
                    notebooks: notebooks || [],
                    ui: {
                        markdownOn: markdownEnabled ? 1 : 0,
                        styleMode: localStorage.getItem('riji_style_mode') || 'relaxed'
                    }
                };
                const json = JSON.stringify(payload, null, 2);
                const blob = new Blob([json], { type: 'application/json;charset=utf-8' });
                const blobUrlService = getBlobUrlService();
                if (!blobUrlService) throw new Error('BlobUrlService不可用');
                const url = blobUrlService.createObjectUrl(blob, { groupId: GROUP_ID + '-export' });
                const a = document.createElement('a');
                const now = new Date();
                const pad = (v) => String(v).padStart(2, '0');
                const name = `riji-data-${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}-${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}.json`;
                a.href = url;
                a.download = name;
                document.body.appendChild(a);
                a.click();
                a.remove();
                setTimeout(() => {
                    blobUrlService.revokeObjectUrl(url);
                }, 10000);
                showToast('已生成备份文件');
            } catch (e) {
                showToast('备份失败');
            }
        }

        function normalizeImportedDiaries(diaries, notebookIdSet) {
            const out = [];
            const max = Math.min(Array.isArray(diaries) ? diaries.length : 0, 5000);
            for (let i = 0; i < max; i++) {
                const d = diaries[i];
                if (!d || typeof d !== 'object') continue;

                const timestamp = Number(d.timestamp);
                let id = Number(d.id);
                if (!Number.isFinite(id) || id <= 0) id = Date.now() + i;
                const safeTimestamp = Number.isFinite(timestamp) ? timestamp : id;

                const safeDate = typeof d.date === 'string' ? d.date : '';
                const safeContent = typeof d.content === 'string' ? d.content : '';
                const safeMood = typeof d.mood === 'string' ? d.mood : '';
                const safeTemplateUsed = typeof d.templateUsed === 'string' ? d.templateUsed : '';
                const rawNotebookId = typeof d.notebookId === 'string' ? d.notebookId.trim() : '';
                const notebookId = rawNotebookId && (!notebookIdSet || notebookIdSet.has(rawNotebookId)) ? rawNotebookId : DEFAULT_NOTEBOOK_ID;
                const labels = Array.isArray(d.labels)
                    ? d.labels
                        .filter(v => typeof v === 'string')
                        .map(v => v.trim())
                        .filter(Boolean)
                        .slice(0, 30)
                    : [];

                out.push({
                    id,
                    date: safeDate,
                    content: safeContent,
                    mood: safeMood,
                    timestamp: safeTimestamp,
                    templateUsed: safeTemplateUsed,
                    notebookId,
                    labels
                });
            }
            return out;
        }

        function normalizeImportedTemplates(templates) {
            const out = [];
            const max = Math.min(Array.isArray(templates) ? templates.length : 0, 200);
            for (let i = 0; i < max; i++) {
                const t = templates[i];
                if (!t || typeof t !== 'object') continue;

                const idRaw = t.id;
                const id = typeof idRaw === 'string' && idRaw ? idRaw : (typeof idRaw === 'number' ? String(idRaw) : (String(Date.now()) + Math.random().toString(36).slice(2)));
                const name = typeof t.name === 'string' && t.name.trim() ? t.name.trim().slice(0, 30) : '未命名模板';

                const questionsRaw = Array.isArray(t.questions) ? t.questions : [];
                const titlesRaw = Array.isArray(t.titles) ? t.titles : [];
                const len = Math.min(questionsRaw.length, titlesRaw.length, 60);
                if (len <= 0) continue;

                const questions = [];
                const titles = [];
                for (let j = 0; j < len; j++) {
                    const q = typeof questionsRaw[j] === 'string' ? questionsRaw[j] : '';
                    const tt = typeof titlesRaw[j] === 'string' ? titlesRaw[j] : '';
                    questions.push(q);
                    titles.push(tt);
                }

                const description = typeof t.description === 'string' && t.description.trim()
                    ? t.description.trim().slice(0, 80)
                    : `${questions.length}个引导问题`;

                out.push({ id, name, questions, titles, description });
            }

            if (!out.some(t => t.id === defaultTemplate.id)) {
                out.unshift(defaultTemplate);
            }

            return out;
        }

        function normalizeImportedNotebooks(list) {
            const out = [];
            const max = Math.min(Array.isArray(list) ? list.length : 0, 60);
            const seen = new Set();
            const isValidColor = (v) => typeof v === 'string' && /^#[0-9a-fA-F]{6}$/.test(v.trim());

            for (let i = 0; i < max; i++) {
                const n = list[i];
                if (!n || typeof n !== 'object') continue;

                const idRaw = n.id;
                let id = typeof idRaw === 'string' && idRaw.trim()
                    ? idRaw.trim()
                    : (typeof idRaw === 'number' ? String(idRaw) : makeQuickId('nb'));
                id = id.slice(0, 48);
                if (seen.has(id)) id = `${id}_${i}`;
                seen.add(id);

                const name = typeof n.name === 'string' && n.name.trim()
                    ? n.name.trim().slice(0, 12)
                    : '未命名日记本';

                const color = isValidColor(n.color) ? n.color.trim() : '#3498db';

                const coverImage = typeof n.coverImage === 'string' && n.coverImage.trim()
                    ? n.coverImage.trim().slice(0, 2200000)
                    : '';

                const createdAtRaw = Number(n.createdAt);
                const updatedAtRaw = Number(n.updatedAt);
                const createdAt = Number.isFinite(createdAtRaw) ? createdAtRaw : Date.now();
                const updatedAt = Number.isFinite(updatedAtRaw) ? updatedAtRaw : createdAt;

                let linkedRole = null;
                if (n.linkedRole && typeof n.linkedRole === 'object') {
                    const rid = n.linkedRole.id ? String(n.linkedRole.id).trim() : '';
                    const rname = n.linkedRole.name ? String(n.linkedRole.name).trim() : '';
                    if (rid && rname) linkedRole = { id: rid, name: rname.slice(0, 24) };
                }

                out.push({
                    id,
                    name,
                    color,
                    coverImage,
                    linkedRole,
                    createdAt,
                    updatedAt
                });
            }

            const hasDefault = out.some(n => n && n.id === DEFAULT_NOTEBOOK_ID);
            if (!hasDefault) {
                out.unshift({
                    id: DEFAULT_NOTEBOOK_ID,
                    name: '我的日记',
                    color: '#3498db',
                    createdAt: Date.now(),
                    updatedAt: Date.now()
                });
            } else {
                const def = out.find(n => n && n.id === DEFAULT_NOTEBOOK_ID);
                if (def) def.linkedRole = null;
            }

            return out;
        }

        function handleImportFile() {
            if (!importFile || !importFile.files || importFile.files.length === 0) return;
            const file = importFile.files[0];
            const reader = new FileReader();
            reader.onload = function() {
                try {
                    const text = String(reader.result || "");
                    const data = JSON.parse(text);
                    if (!data || typeof data !== 'object') throw new Error('invalid');

                    const diaries = Array.isArray(data.diaries) ? data.diaries : null;
                    if (!diaries) throw new Error('invalid');
                    const templates = Array.isArray(data.templates) ? data.templates : [];
                    const importedNotebooks = Array.isArray(data.notebooks) ? data.notebooks : null;

                    if (importedNotebooks) {
                        notebooks = normalizeImportedNotebooks(importedNotebooks);
                    }
                    const notebookIdSet = new Set((Array.isArray(notebooks) ? notebooks : []).map(n => (n && n.id) ? String(n.id) : '').filter(Boolean));

                    currentDiaries = normalizeImportedDiaries(diaries, notebookIdSet);
                    currentTemplates = normalizeImportedTemplates(templates);

                    if (data.ui && typeof data.ui === 'object') {
                        const styleMode = typeof data.ui.styleMode === 'string' ? data.ui.styleMode.trim() : '';
                        if (styleMode) setStyleMode(styleMode);
                        const markdownOn = data.ui.markdownOn;
                        if (markdownOn === 1 || markdownOn === '1' || markdownOn === true) setMarkdownEnabled(true);
                        if (markdownOn === 0 || markdownOn === '0' || markdownOn === false) setMarkdownEnabled(false);
                    }

                    saveDiaries();
                    saveTemplates();
                    if (importedNotebooks) saveNotebooks();
                    renderTemplates();
                    try { closeNotebook(); } catch (e) {
                        renderNotebooks();
                        renderDiaries();
                    }
                    showToast('数据已恢复');
                } catch (e) {
                    showToast('恢复失败：文件格式不正确');
                }
            };
            reader.onerror = function() {
                showToast('读取文件失败');
            };
            reader.readAsText(file);
        }

        // 处理双击事件
        function handleDoubleTap(e, card) {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTapTime;
            
            // 更新点击计数和时间
            tapCount++;
            lastTapTime = currentTime;
            
            // 如果是第一次点击，设置定时器
            if (tapCount === 1) {
                doubleTapTimer = setTimeout(function() {
                    tapCount = 0;
                }, DOUBLE_TAP_DELAY);
            } else if (tapCount === 2 && tapLength < DOUBLE_TAP_DELAY) {
                // 双击事件
                clearTimeout(doubleTapTimer);
                tapCount = 0;
                
                // 显示编辑菜单
                showEditMenu(card);
                
                // 阻止事件冒泡，避免触发单击事件
                e.stopPropagation();
                e.preventDefault();
            }
        }

                currentDiaries = currentDiaries.filter(d => d.id !== diaryId);
                saveDiaries();
                renderDiaries();
                closeEditMenu();
            }
        }
        
        // 创建一对配对的行
        function createPairRow(pairId, questionValue = "", titleValue = "", isAutoAdded = false) {
            const questionRow = document.createElement('div');
            questionRow.className = 'item-row pair-row question-row';
            questionRow.dataset.pairId = pairId;
            questionRow.dataset.isAutoAdded = isAutoAdded;
            questionRow.innerHTML = `
                <div class="item-row-index">${pairRows.length + 1}</div>
                <input type="text" class="item-input question-input-field" placeholder="输入问题" value="${escapeHtml(questionValue)}">
                <button class="item-remove remove-question-btn" data-pair-id="${pairId}">
                    <span class="ui-ico" aria-hidden="true">×</span>
                </button>
            `;
            
            const titleRow = document.createElement('div');
            titleRow.className = 'item-row pair-row title-row';
            titleRow.dataset.pairId = pairId;
            titleRow.dataset.isAutoAdded = isAutoAdded;
            titleRow.innerHTML = `
                <div class="item-row-index">${pairRows.length + 1}</div>
                <input type="text" class="item-input title-input-field" placeholder="输入日记显示标题" value="${escapeHtml(titleValue)}">
                <button class="item-remove remove-title-btn" data-pair-id="${pairId}">
                    <span class="ui-ico" aria-hidden="true">×</span>
                </button>
            `;
            
            // 添加点击事件，支持选中/取消选中
            questionRow.addEventListener('click', function(e) {
                if (e.target.closest('button.item-remove')) return;
                if (e.target.closest('input')) return;
                
                // 切换选中状态
                this.classList.toggle('selected');
                const pairId = this.dataset.pairId;
                const titleRow = document.querySelector(`.item-row.title-row[data-pair-id="${pairId}"]`);
                if (titleRow) {
                    titleRow.classList.toggle('selected');
                }
            });
            
            titleRow.addEventListener('click', function(e) {
                if (e.target.closest('button.item-remove')) return;
                if (e.target.closest('input')) return;
                
                // 切换选中状态
                this.classList.toggle('selected');
                const pairId = this.dataset.pairId;
                const questionRow = document.querySelector(`.item-row.question-row[data-pair-id="${pairId}"]`);
                if (questionRow) {
                    questionRow.classList.toggle('selected');
                }
            });
            
            // 添加输入事件
            const questionInputField = questionRow.querySelector('.question-input-field');
            const titleInputField = titleRow.querySelector('.title-input-field');
            
            questionInputField.addEventListener('input', function() {
                updateAddButtonState();
                // 如果是手动添加的行且已填写内容，则允许再次添加
                if (!isAutoAdded && this.value.trim() !== "" && Date.now() - lastManualAddTime > 100) {
                    addQuestionBtn.disabled = false;
                }
            });
            
            titleInputField.addEventListener('input', function() {
                updateAddButtonState();
                // 如果是手动添加的行且已填写内容，则允许再次添加
                if (!isAutoAdded && this.value.trim() !== "" && Date.now() - lastManualAddTime > 100) {
                    addTitleBtn.disabled = false;
                }
            });
            
            // 添加删除事件
            const questionRemoveBtn = questionRow.querySelector('.remove-question-btn');
            const titleRemoveBtn = titleRow.querySelector('.remove-title-btn');
            
            questionRemoveBtn.addEventListener('click', function() {
                removePairRow(pairId);
            });
            
            titleRemoveBtn.addEventListener('click', function() {
                removePairRow(pairId);
            });
            
            return { questionRow, titleRow, questionInputField, titleInputField };
        }
        
        // 添加一对行
        function addPairRow(data = null, isAutoAdded = false) {
            const pairId = Date.now().toString() + Math.random().toString(36).substr(2, 9);
            
            const questionValue = data ? data.question : "";
            const titleValue = data ? data.title : "";
            
            const { questionRow, titleRow } = createPairRow(pairId, questionValue, titleValue, isAutoAdded);
            
            questionList.appendChild(questionRow);
            titleList.appendChild(titleRow);
            
            pairRows.push({
                id: pairId,
                questionRow,
                titleRow,
                isAutoAdded
            });
            
            // 更新索引显示
            updateRowIndices();
            
            // 更新添加按钮状态
            updateAddButtonState();
            
            // 如果是手动添加，记录时间
            if (!isAutoAdded) {
                lastManualAddTime = Date.now();
            }
            
            // 自动聚焦到新添加的问题输入框
            if (!isAutoAdded) {
                setTimeout(() => {
                    questionRow.querySelector('.question-input-field').focus();
                }, 100);
            }
        }
        
        // 手动添加问题行
        function addQuestionRowManual() {
            // 检查是否允许添加
            if (!canAddManualRow()) {
                alert("请先填写现有的空白行后再添加新行");
                return;
            }
            
            addQuestionBtn.disabled = true;
            addPairRow(null, false);
        }
        
        // 手动添加标题行
        function addTitleRowManual() {
            // 检查是否允许添加
            if (!canAddManualRow()) {
                alert("请先填写现有的空白行后再添加新行");
                return;
            }
            
            addTitleBtn.disabled = true;
            addPairRow(null, false);
        }
        
        // 检查是否可以手动添加新行
        function canAddManualRow() {
            // 检查是否存在未填写的非自动添加行
            for (const pair of pairRows) {
                if (!pair.isAutoAdded) {
                    const questionInput = pair.questionRow.querySelector('.question-input-field');
                    const titleInput = pair.titleRow.querySelector('.title-input-field');
                    
                    if (questionInput.value.trim() === "" || titleInput.value.trim() === "") {
                        return false;
                    }
                }
            }
            return true;
        }
        
        // 删除一对行
        function removePairRow(pairId) {
            if (pairRows.length <= 1) {
                alert("模板至少需要保留一对问题/标题");
                return;
            }
            
            const pairIndex = pairRows.findIndex(pair => pair.id === pairId);
            if (pairIndex === -1) return;
            
            const pair = pairRows[pairIndex];
            
            // 从DOM中移除
            pair.questionRow.remove();
            pair.titleRow.remove();
            
            // 从数组中移除
            pairRows.splice(pairIndex, 1);
            
            // 更新索引显示
            updateRowIndices();
            
            // 更新添加按钮状态
            updateAddButtonState();
        }
        
        // 更新行的索引显示
        function updateRowIndices() {
            pairRows.forEach((pair, index) => {
                const questionIndex = pair.questionRow.querySelector('.item-row-index');
                const titleIndex = pair.titleRow.querySelector('.item-row-index');
                
                if (questionIndex) questionIndex.textContent = index + 1;
                if (titleIndex) titleIndex.textContent = index + 1;
            });
        }
        
        // 更新添加按钮状态
        function updateAddButtonState() {
            const canAdd = canAddManualRow();
            addQuestionBtn.disabled = !canAdd;
            addTitleBtn.disabled = !canAdd;
        }
        
        // 检查并保存模板
        function checkAndSaveTemplate() {
            // 收集所有行数据
            const rowsData = [];
            let allFilled = true;
            
            for (const pair of pairRows) {
                const questionInput = pair.questionRow.querySelector('.question-input-field');
                const titleInput = pair.titleRow.querySelector('.title-input-field');
                
                const questionValue = questionInput.value.trim();
                const titleValue = titleInput.value.trim();
                
                if (questionValue === "" || titleValue === "") {
                    allFilled = false;
                }
                
                rowsData.push({
                    question: questionValue,
                    title: titleValue
                });
            }
            
            // 检查是否所有行都已填写
            if (!allFilled) {
                alert("请填写所有问题和对应的日记显示标题");
                
                // 切换到有空白行的选项卡
                for (const pair of pairRows) {
                    const questionInput = pair.questionRow.querySelector('.question-input-field');
                    const titleInput = pair.titleRow.querySelector('.title-input-field');
                    
                    if (questionInput.value.trim() === "") {
                        switchTab('questions');
                        questionInput.focus();
                        break;
                    } else if (titleInput.value.trim() === "") {
                        switchTab('titles');
                        titleInput.focus();
                        break;
                    }
                }
                
                return;
            }
            
            // 检查问题数量和标题数量是否一致
            const questionsCount = rowsData.length;
            const titlesCount = rowsData.length;
            
            if (questionsCount !== titlesCount) {
                alert("问题数量和日记显示标题数量不一致");
                return;
            }
            
            // 如果是新模板，显示命名浮窗
            if (isNewTemplate) {
                showNameModal();
                // 保存当前数据到临时变量
                window.tempTemplateData = rowsData;
            } else {
                // 编辑现有模板，直接保存
                saveTemplateToStorage(rowsData);
            }
        }
        
        // 确认模板名称并保存
        function confirmTemplateName() {
            const templateName = templateNameInput.value.trim();
            
            if (templateName === "") {
                alert("请输入模板名称");
                templateNameInput.focus();
                return;
            }
            
            // 检查模板名称是否已存在（排除当前正在编辑的模板）
            const existingTemplate = currentTemplates.find(t => 
                t.name.toLowerCase() === templateName.toLowerCase() && 
                t.id !== editingTemplateId
            );
            
            if (existingTemplate) {
                alert("模板名称已存在，请使用其他名称");
                templateNameInput.focus();
                return;
            }
            
            // 保存模板
            saveTemplateToStorage(window.tempTemplateData, templateName);
        }
        
        // 保存模板到本地存储
        function saveTemplateToStorage(rowsData, templateName = null) {
            // 收集问题和标题
            const questions = rowsData.map(row => row.question);
            const titles = rowsData.map(row => row.title);
            
            // 确定模板名称
            let finalTemplateName = templateName;
            if (!finalTemplateName && editingTemplateId) {
                // 编辑现有模板，保持原有名称
                const existingTemplate = currentTemplates.find(t => t.id === editingTemplateId);
                finalTemplateName = existingTemplate ? existingTemplate.name : "未命名模板";
            }
            
            // 创建模板对象
            const template = {
                id: editingTemplateId || Date.now().toString(),
                name: finalTemplateName,
                questions: questions,
                titles: titles,
                description: `${questions.length}个引导问题`
            };
            
            // 如果是编辑现有模板，则替换它；否则添加新模板
            if (editingTemplateId) {
                const index = currentTemplates.findIndex(t => t.id === editingTemplateId);
                if (index !== -1) {
                    currentTemplates[index] = template;
                }
            } else {
                currentTemplates.push(template);
            }
            
            // 保存到本地存储
            saveTemplates();
            
            // 清理临时数据
            if (window.tempTemplateData) {
                delete window.tempTemplateData;
            }
            
            // 隐藏命名浮窗
            hideNameModal();
            
            // 返回模板页面
            hideTemplateEditPage();
            showTemplatePage();
            renderTemplates();
        }
        
        // 编辑模板
        function editTemplate(templateId) {
            const template = currentTemplates.find(t => t.id === templateId);
            if (!template) return;
            
            editingTemplateId = templateId;
            isNewTemplate = false;
            templateEditPage.classList.add('active');
            editTemplateTitle.textContent = "编辑模板";
            
            // 重置到问题列表选项卡
            switchTab('questions');
            
            // 清空现有行
            questionList.innerHTML = "";
            titleList.innerHTML = "";
            pairRows = [];
            
            // 添加模板数据行
            for (let i = 0; i < template.questions.length; i++) {
                addPairRow({
                    question: template.questions[i],
                    title: template.titles[i]
                }, true); // 标记为自动添加（从模板加载）
            }
            
            // 更新添加按钮状态
            updateAddButtonState();
        }

        let toastTimer = null;

        function showToast(message) {
            const el = document.getElementById('toast');
            if (!el) return;
            el.textContent = message;
            el.classList.add('active');
            if (toastTimer) clearTimeout(toastTimer);

        function escapeHtml(value) {
            return String(value == null ? "" : value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function sanitizeDiaryHtml(inputHtml) {
            const html = String(inputHtml || "");

            const tpl = document.createElement('template');
            const canWalk = typeof document.createTreeWalker === 'function' && tpl && 'content' in tpl;
            if (!canWalk) {
                let s = html
                    .replace(/<br\s*\/?\s*>/gi, "%%BR%%")
                    .replace(/<strong>/gi, "%%STRONG_OPEN%%")
                    .replace(/<\/strong>/gi, "%%STRONG_CLOSE%%");
                s = s
                    .replace(/<del>/gi, "%%DEL_OPEN%%")
                    .replace(/<\/del>/gi, "%%DEL_CLOSE%%");

                s = escapeHtml(s);
                return s
                    .replace(/%%BR%%/g, "<br>")
                    .replace(/%%STRONG_OPEN%%/g, "<strong>")
                    .replace(/%%STRONG_CLOSE%%/g, "</strong>")
                    .replace(/%%DEL_OPEN%%/g, "<del>")
                    .replace(/%%DEL_CLOSE%%/g, "</del>");
            }

            tpl.innerHTML = html;

            const allow = new Set(['BR', 'STRONG', 'EM', 'DEL', 'CODE', 'PRE', 'P', 'UL', 'OL', 'LI', 'H1', 'H2', 'H3', 'BLOCKQUOTE', 'A', 'INPUT']);

            const walker = document.createTreeWalker(tpl.content, NodeFilter.SHOW_ELEMENT, null);
            const nodes = [];
            while (walker.nextNode()) {
                nodes.push(walker.currentNode);
            }

            for (const el of nodes) {
                if (!allow.has(el.tagName)) {
                    el.replaceWith(document.createTextNode(el.textContent || ""));
                    continue;
                }

                if (el.tagName === 'A') {
                    const href = el.getAttribute('href') || '';
                    const safeHref = sanitizeHref(href);
                    while (el.attributes && el.attributes.length) {
                        el.removeAttribute(el.attributes[0].name);
                    }
                    if (safeHref) {
                        el.setAttribute('href', safeHref);
                        el.setAttribute('target', '_blank');
                        el.setAttribute('rel', 'noopener');
                    } else {
                        el.replaceWith(document.createTextNode(el.textContent || ""));
                    }
                    continue;
                }

                if (el.tagName === 'INPUT') {
                    const type = String(el.getAttribute('type') || '').toLowerCase();
                    const isCheckbox = type === 'checkbox';
                    const checked = el.hasAttribute('checked');
                    const ti = el.getAttribute('data-ti') || '';
                    while (el.attributes && el.attributes.length) {
                        el.removeAttribute(el.attributes[0].name);
                    }
                    if (!isCheckbox) {
                        el.replaceWith(document.createTextNode(''));
                        continue;
                    }
                    el.setAttribute('type', 'checkbox');
                    if (checked) el.setAttribute('checked', '');
                    if (ti) el.setAttribute('data-ti', ti);
                    continue;
                }

                while (el.attributes && el.attributes.length) {
                    el.removeAttribute(el.attributes[0].name);
                }

                if (el.tagName === 'LI') {
                    const first = el.firstElementChild;
                    if (first && first.tagName === 'INPUT') {
                        const type = String(first.getAttribute('type') || '').toLowerCase();
                        if (type === 'checkbox') {
                            el.className = 'check-item';
                        }
                    }
                }
            }

            return tpl.innerHTML;
        }

        function sanitizeHref(href) {
            const raw = String(href || '').trim();
            if (!raw) return '';
            if (/^https?:\/\//i.test(raw)) return raw;
            if (/^mailto:/i.test(raw)) return raw;
            return '';
        }

        function normalizeLegacyContentToText(input) {
            const s = String(input || '');
            if (!s) return '';
            return s
                .replace(/<br\s*\/?>/gi, '\n')
                .replace(/<strong>([\s\S]*?)<\/strong>/gi, function(_, t) {
                    const inner = String(t || '').replace(/\n/g, ' ').trim();
                    return inner ? `**${inner}**` : '';
                })
                .replace(/<[^>]+>/g, '')
                .replace(/\n{3,}/g, '\n\n')
                .trim();
        }

        function markdownToHtml(markdown) {
            const src = String(markdown || '');
            if (!src) return '';

            const parts = src.split(/```/);
            let html = '';
            const state = { taskIndex: 0 };
            for (let i = 0; i < parts.length; i++) {
                const seg = parts[i];
                if (i % 2 === 1) {
                    const code = escapeHtml(seg.replace(/^\w*\n/, ''));
                    html += `<pre><code>${code}</code></pre>`;
                    continue;
                }
                html += markdownInlineAndBlocks(seg, state);
            }
            return html;
        }

        function markdownInlineAndBlocks(text, state) {
            const lines = String(text || '').split(/\r?\n/);
            let out = '';
            let inUl = false;
            let inOl = false;

            const closeLists = () => {
                if (inUl) { out += '</ul>'; inUl = false; }
                if (inOl) { out += '</ol>'; inOl = false; }
            };

            for (let i = 0; i < lines.length; i++) {
                const raw = lines[i];
                const line = raw.replace(/\s+$/g, '');
                if (!line.trim()) {
                    closeLists();
                    continue;
                }

                const h = line.match(/^(#{1,3})\s+(.*)$/);
                if (h) {
                    closeLists();
                    const level = h[1].length;
                    out += `<h${level}>${markdownInline(escapeHtml(h[2]))}</h${level}>`;
                    continue;
                }

                const bq = line.match(/^>\s?(.*)$/);
                if (bq) {
                    closeLists();
                    out += `<blockquote>${markdownInline(escapeHtml(bq[1]))}</blockquote>`;
                    continue;
                }

                const ol = line.match(/^\s*(\d+)\.\s+(.*)$/);
                if (ol) {
                    if (!inOl) { closeLists(); out += '<ol>'; inOl = true; }
                    const olTask = String(ol[2] || '').match(/^\[( |x|X)\]\s+(.*)$/);
                    if (olTask) {
                        const checked = String(olTask[1] || '').toLowerCase() === 'x';
                        const txt = olTask[2] || '';
                        const idx = (state && typeof state.taskIndex === 'number') ? (state.taskIndex += 1) : 0;
                        out += `<li><input type="checkbox" data-ti="${idx}"${checked ? ' checked' : ''}><span class="check-text">${markdownInline(escapeHtml(txt))}</span></li>`;
                    } else {
                        out += `<li>${markdownInline(escapeHtml(ol[2]))}</li>`;
                    }
                    continue;
                }

                const ul = line.match(/^\s*[-*+]\s+(.*)$/);
                if (ul) {
                    if (!inUl) { closeLists(); out += '<ul>'; inUl = true; }
                    const ulTask = String(ul[1] || '').match(/^\[( |x|X)\]\s+(.*)$/);
                    if (ulTask) {
                        const checked = String(ulTask[1] || '').toLowerCase() === 'x';
                        const txt = ulTask[2] || '';
                        const idx = (state && typeof state.taskIndex === 'number') ? (state.taskIndex += 1) : 0;
                        out += `<li><input type="checkbox" data-ti="${idx}"${checked ? ' checked' : ''}><span class="check-text">${markdownInline(escapeHtml(txt))}</span></li>`;
                    } else {
                        out += `<li>${markdownInline(escapeHtml(ul[1]))}</li>`;
                    }
                    continue;
                }

                closeLists();
                out += `<p>${markdownInline(escapeHtml(line))}</p>`;
            }

            closeLists();
            return out;
        }

        function markdownInline(htmlEscapedText) {
            let s = String(htmlEscapedText || '');

            s = s.replace(/~~([^~]+?)~~/g, '<del>$1</del>');

            s = s.replace(/(https?:\/\/[^\s<]+[^<.,;:!?)\]\s])/g, function(url) {
                const safe = sanitizeHref(url);
                if (!safe) return url;
                return `<a href="${safe}">${url}</a>`;
            });

            s = s.replace(/\[([^\]]+?)\]\((https?:\/\/[^\s)]+)\)/g, function(_, t, url) {
                const safe = sanitizeHref(url);
                if (!safe) return t;
                return `<a href="${safe}">${t}</a>`;
            });

            s = s.replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
            s = s.replace(/\*([^*]+?)\*/g, '<em>$1</em>');
            s = s.replace(/`([^`]+?)`/g, '<code>$1</code>');
            return s;
        }

        function applyHashPills(root) {
            if (!root || !root.ownerDocument) return;
            const doc = root.ownerDocument;
            const walker = doc.createTreeWalker(root, 4);
            const nodes = [];

            while (walker.nextNode()) {
                const node = walker.currentNode;
                const text = node && node.nodeValue ? node.nodeValue : '';
                if (!text || text.indexOf('#') === -1) continue;
                const p = node.parentElement;
                if (!p) continue;
                if (p.closest && p.closest('a,code,pre,script,style')) continue;
                nodes.push(node);
            }

            const re = /(^|[\s\u3000])#([^\s#]{1,24})/gu;
            for (let i = 0; i < nodes.length; i++) {
                const node = nodes[i];
                const text = node.nodeValue || '';
                re.lastIndex = 0;
                let m;
                let last = 0;
                const frag = doc.createDocumentFragment();

                while ((m = re.exec(text))) {
                    const beforeEnd = m.index + (m[1] ? m[1].length : 0);
                    const tagStart = beforeEnd;
                    if (tagStart > last) frag.appendChild(doc.createTextNode(text.slice(last, tagStart)));

                    const rawTag = m[2] || '';
                    const pill = doc.createElement('span');
                    pill.className = 'label-pill';
                    pill.textContent = '#' + rawTag;
                    frag.appendChild(pill);

                    last = tagStart + 1 + rawTag.length;
                }

                if (last === 0) continue;
                if (last < text.length) frag.appendChild(doc.createTextNode(text.slice(last)));
                if (node.parentNode) node.parentNode.replaceChild(frag, node);
            }
        }

        function renderDiaryContentHtml(stored) {
            const txt = /<\s*br\b|<\s*strong\b/i.test(String(stored || '')) ? normalizeLegacyContentToText(stored) : String(stored || '');
            const html = markdownEnabled
                ? markdownToHtml(txt)
                : escapeHtml(txt).replace(/\r?\n/g, '<br>');
            const safe = sanitizeDiaryHtml(html);
            if (!safe || safe.indexOf('#') === -1) return safe;
            const wrap = document.createElement('div');
            wrap.innerHTML = safe;
            applyHashPills(wrap);
            return wrap.innerHTML;
        }

        function setTaskCheckedInText(sourceText, taskIndex, checkedWanted) {
            const src = String(sourceText || '');
            const ti = Number(taskIndex) || 0;
            if (!ti) return { text: src, changed: false };

            const parts = src.split(/```/);
            let n = 0;

            for (let i = 0; i < parts.length; i++) {
                if (i % 2 === 1) continue;
                const lines = String(parts[i] || '').split(/\r?\n/);
                for (let j = 0; j < lines.length; j++) {
                    const line = lines[j];
                    let m = line.match(/^(\s*[-*+]\s+)\[( |x|X)\](\s+.*)$/);
                    if (!m) m = line.match(/^(\s*\d+\.\s+)\[( |x|X)\](\s+.*)$/);
                    if (!m) continue;
                    n += 1;
                    if (n !== ti) continue;
                    const mark = checkedWanted ? 'x' : ' ';
                    lines[j] = `${m[1]}[${mark}]${m[3]}`;
                    parts[i] = lines.join('\n');
                    return { text: parts.join('```'), changed: true };
                }
            }
            return { text: src, changed: false };
        }

        // 处理触摸移动

            if (!longPressTimer || longPressStartX === null) return;
            
            const moveX = e.touches[0].clientX;
            const moveY = e.touches[0].clientY;
            const deltaX = Math.abs(moveX - longPressStartX);
            const deltaY = Math.abs(moveY - longPressStartY);
            
            if (deltaX > 8 || deltaY > 8) {
                clearTimeout(longPressTimer);
                longPressTimer = null;
            }
        }

        function toCompactNumber(n) {
            const v = Number(n) || 0;
            if (v < 10000) return String(v);
            return (v / 10000).toFixed(v % 10000 === 0 ? 0 : 1) + "万";
        }

        function pad2(n) {
            const v = Number(n) || 0;
            return v < 10 ? `0${v}` : String(v);
        }

        function toValidDate(ts) {
            const raw = ts == null ? "" : ts;
            const asNum = Number(raw);
            const t = Number.isFinite(asNum) && asNum > 0 ? asNum : Date.parse(String(raw));
            if (!Number.isFinite(t) || t <= 0) return null;
            const d = new Date(t);
            return Number.isFinite(d.getTime()) ? d : null;
        }

        function formatDate(ts) {
            const d = toValidDate(ts);
            if (!d) return "未知日期";
            return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`;
        }

        function formatTime(ts) {
            const d = toValidDate(ts);
            if (!d) return "";
            return `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
        }

        function updateFreeStats() {
            const stats = document.getElementById('freeStats');
            if (!stats) return;

            const chars = text.replace(/\s/g, "").length;

        }

        function normalizeLabelText(raw) {
            let s = String(raw || '').trim();
            if (!s) return '';
            if (s.charAt(0) === '#') s = s.slice(1);
            s = s.replace(/\s+/g, '');
            s = s.replace(/[^\u4e00-\u9fa5\w-]/g, '');
            if (!s) return '';
            return s.slice(0, 12);
        }

        function extractLabelsFromText(text) {
            const s = String(text || '');
            const out = [];
            const seen = Object.create(null);
            const re = /(^|\s)#([^\s#]{1,24})/gu;
            let m;
            while ((m = re.exec(s))) {
                const normalized = normalizeLabelText(m[2]);
                if (!normalized) continue;
                const key = normalized.toLowerCase();
                if (seen[key]) continue;
                seen[key] = 1;
                out.push(normalized);
                if (out.length >= 24) break;
            }
            return out;
        }

        async function migrateNotebookCoversToIdb() {
            if (!window.ImageStorageDB || !window.indexedDB) return;
            const flagKey = 'riji_cover_migrated_v1';
            if (localStorage.getItem(flagKey) === '1') return;

            const list = Array.isArray(notebooks) ? notebooks : [];
            const targets = list.filter(n => n && typeof n.coverImage === 'string' && n.coverImage.indexOf('data:image') === 0 && n.coverImage.length > 12000);
            if (!targets.length) {
                localStorage.setItem(flagKey, '1');
                return;
            }

            try {
                await window.ImageStorageDB.init();
            } catch (e) {
                return;
            }

            let changed = false;
            const batch = Math.min(4, targets.length);
            for (let i = 0; i < batch; i++) {
                const nb = targets[i];
                const dataUrl = nb.coverImage;
                if (!dataUrl) continue;
                try {
                    const res = await fetch(dataUrl);
                    const blob = await res.blob();
                    const id = makeQuickId('nbcover');
                    await window.ImageStorageDB.set(id, blob, 'notebookCover');
                    nb.coverImage = `idb:${id}`;
                    nb.updatedAt = Date.now();
                    changed = true;
                } catch (e) {}
            }

            if (changed) {
                try {
                    saveNotebooks();
                    renderNotebooks();
                } catch (e) {}
            }

            setTimeout(() => {
                migrateNotebookCoversToIdb();
            }, 300);

            const scrollContainers = document.querySelectorAll('.scroll-y-hidebar');
            scrollContainers.forEach(container => {
                const originalScrollTop = container.scrollTop;
                container.scrollTop = originalScrollTop + 1;
                requestAnimationFrame(() => {
                    container.scrollTop = originalScrollTop;
                });
            });
        }

        // 长按日记本编辑
        let currentEditingNotebookId = null;
        function initLongPressForNotebook(element, notebookId) {
            let timer;
            let isLongPress = false;
            
            const start = (e) => {
                isLongPress = false;
                timer = setTimeout(() => {
                    isLongPress = true;
                    currentEditingNotebookId = notebookId;
                    if (element && element.dataset) element.dataset.suppressClick = '1';
                    openEditNotebookModal(notebookId);
                }, 600);
            };
            
            const end = (e) => {
                clearTimeout(timer);
                if (isLongPress) {
                    e.preventDefault();
                    e.stopPropagation();
                    setTimeout(() => {
                        if (element && element.dataset) element.dataset.suppressClick = '0';
                    }, 380);
                }
            };
            
            element.addEventListener('touchstart', start, __passiveTrue);
            element.addEventListener('touchend', end);
            element.addEventListener('touchmove', end);
            element.addEventListener('mousedown', start);
            element.addEventListener('mouseup', end);
            element.addEventListener('mouseleave', end);
            
            // 阻止右键菜单
            element.addEventListener('contextmenu', (e) => {
                if (isLongPress) {
                    e.preventDefault();
                }
            });
        }

        function showNotebookEditMenu() {
            notebookEditOverlay.classList.add('active');
            notebookEditMenu.classList.add('active');
            
            // 默认日记本不能删除
            if (currentEditingNotebookId === DEFAULT_NOTEBOOK_ID) {
                if (notebookDeleteBtn) notebookDeleteBtn.style.display = 'none';
            } else {
                if (notebookDeleteBtn) notebookDeleteBtn.style.display = 'flex';
            }
        }

        function hideNotebookEditMenu(clearState = true) {
            notebookEditOverlay.classList.remove('active');
            notebookEditMenu.classList.remove('active');
            if (clearState) currentEditingNotebookId = null;
        }

        // 绑定编辑菜单事件
        if (notebookEditCancelBtn) {
            notebookEditCancelBtn.addEventListener('click', () => hideNotebookEditMenu(true));
        }
        if (notebookEditOverlay) {
            notebookEditOverlay.addEventListener('click', () => hideNotebookEditMenu(true));
        }

        if (notebookRenameBtn) {
            notebookRenameBtn.addEventListener('click', () => {
                const notebook = notebooks.find(n => n.id === currentEditingNotebookId);
                if (notebook) {
                    notebookRenameInput.value = notebook.name;
                    hideNotebookEditMenu(false);
                    // 使用 ModalWrapper API（保持原有显示方式，添加基础行为）
                    if (notebookRenameModalWrapper) {
                        notebookRenameModalWrapper.open();
                    } else {
                        notebookRenameModal.classList.add('active');
                    }
                }
            });
        }

        if (cancelRenameBtn) {
            cancelRenameBtn.addEventListener('click', () => {
                // 使用 ModalWrapper API
                if (notebookRenameModalWrapper) {
                    notebookRenameModalWrapper.close();
                } else {
                    notebookRenameModal.classList.remove('active');
                }
                currentEditingNotebookId = null;
            });
        }

        if (confirmRenameBtn) {
            confirmRenameBtn.addEventListener('click', () => {
                const newName = notebookRenameInput.value.trim();
                if (!newName) {
                    showToast('请输入日记本名称');
                    return;
                }
                const notebook = notebooks.find(n => n.id === currentEditingNotebookId);
                if (notebook) {
                    notebook.name = newName;
                    notebook.updatedAt = Date.now();
                    saveNotebooks();
                    renderNotebooks();
                    // 使用 ModalWrapper API
                if (notebookRenameModalWrapper) {
                    notebookRenameModalWrapper.close();
                } else {
                    notebookRenameModal.classList.remove('active');
                }
                    currentEditingNotebookId = null;
                    showToast('已重命名');
                }
            });
        }

        if (notebookDeleteBtn) {
            notebookDeleteBtn.addEventListener('click', (e) => {
                if (e && e.preventDefault) e.preventDefault();
                if (e && e.stopPropagation) e.stopPropagation();
                const id = currentEditingNotebookId;
                if (!id || id === DEFAULT_NOTEBOOK_ID) return;
                const notebook = notebooks.find(n => n.id === id);
                if (!notebook) return;
                if (confirm(`确定要删除日记本"${notebook.name}"吗？其中的日记将移动到默认日记本。`)) {
                    deleteNotebook(id);
                    hideNotebookEditMenu(true);
                }
            });
        }

        if (notebookRoleBtn) {
            notebookRoleBtn.addEventListener('click', () => {
                const notebook = notebooks.find(n => n.id === currentEditingNotebookId);
                if (notebook) {
                    hideNotebookEditMenu(false);
                    notebookRoleMode = 'edit';
                    notebookRoleEditingId = notebook.id;
                    openNotebookRoleModal();
                }
            });
        }

        // 打开日记本
        function openNotebook(id) {
            currentNotebookId = id;
            const notebook = notebooks.find(n => n.id === id);
            if (notebook) {
                if (notebookTitle) notebookTitle.textContent = notebook.name;

                activeCategory = '';
                if (searchInput) searchInput.value = '';
                searchQuery = '';
                updateSearchUi();
                if (toolbar) toolbar.classList.add('hidden');
                closeMenu();
                updateNotebookAvatars();
                updateNotebookBackText();
                
                // 切换视图
                notebookListView.classList.remove('active');
                diaryListView.classList.add('active');
                updateAddButtonVisibility();
                
                renderDiaries();
            }
        }
        
        // 关闭日记本（返回书架）
        function closeNotebook() {
            currentNotebookId = null;
            diaryListView.classList.remove('active');
            notebookListView.classList.add('active');
            updateAddButtonVisibility();
            if (leftAvatarContainer) leftAvatarContainer.innerHTML = '';
            if (rightAvatarContainer) rightAvatarContainer.innerHTML = '';
            if (toolbar) toolbar.classList.add('hidden');
            closeMenu();
            updateNotebookBackText();
            renderNotebooks(); // 刷新计数
        }
        
        // 显示新建日记本浮窗
        async function openCreateNotebookModal() {
            currentEditingNotebookId = null;
            applyNotebookModalUiMode('create');
            if (removeNotebookBtn && removeNotebookBtn.dataset) removeNotebookBtn.dataset.notebookId = '';
            if (notebookNameInput) notebookNameInput.value = '';
            selectedNotebookColor = '#3498db';
            selectedNotebookCoverImage = null;
            selectedNotebookRole = null;
            updateNotebookRoleUi();
            syncNotebookColorPickerUi();
            if (notebookColorSection) notebookColorSection.style.display = 'block';
            if (notebookCoverPreviewSection) notebookCoverPreviewSection.style.display = 'none';
            if (coverPreview) coverPreview.style.backgroundImage = '';
            await clearNotebookCoverTemp();
            // 使用 ModalWrapper API（保持原有显示方式，添加基础行为）
            if (notebookModal) {
                if (notebookModalWrapper) {
                    notebookModalWrapper.open();
                } else {
                    notebookModal.classList.add('active');
                }
            }
        }

        async function openEditNotebookModal(notebookId) {
            const id = String(notebookId || '').trim();
            const notebook = notebooks.find(n => n.id === id);
            if (!notebook) return;

            currentEditingNotebookId = id;
            applyNotebookModalUiMode('edit');
            if (removeNotebookBtn && removeNotebookBtn.dataset) removeNotebookBtn.dataset.notebookId = id;

            if (notebookNameInput) notebookNameInput.value = String(notebook.name || '');
            selectedNotebookColor = notebook.color || '#3498db';
            selectedNotebookRole = notebook.linkedRole ? { id: notebook.linkedRole.id, name: notebook.linkedRole.name } : null;
            if (id === DEFAULT_NOTEBOOK_ID) selectedNotebookRole = null;
            updateNotebookRoleUi();
            syncNotebookColorPickerUi();

            selectedNotebookCoverImage = notebook.coverImage ? String(notebook.coverImage) : null;
            if (selectedNotebookCoverImage) {
                if (notebookColorSection) notebookColorSection.style.display = 'none';
                if (notebookCoverPreviewSection) notebookCoverPreviewSection.style.display = 'block';
                // 使用 ModalWrapper API（保持原有显示方式，添加基础行为）
            if (notebookModal) {
                if (notebookModalWrapper) {
                    notebookModalWrapper.open();
                } else {
                    notebookModal.classList.add('active');
                }
            }
                await applyNotebookModalCoverPreview(selectedNotebookCoverImage);
            } else {
                await clearNotebookCoverTemp();
                if (coverPreview) coverPreview.style.backgroundImage = '';
                if (notebookColorSection) notebookColorSection.style.display = 'block';
                if (notebookCoverPreviewSection) notebookCoverPreviewSection.style.display = 'none';
                // 使用 ModalWrapper API（保持原有显示方式，添加基础行为）
            if (notebookModal) {
                if (notebookModalWrapper) {
                    notebookModalWrapper.open();
                } else {
                    notebookModal.classList.add('active');
                }
            }
            }
        }
        
        // 隐藏新建日记本浮窗
        async function hideNotebookModal() {
            currentEditingNotebookId = null;
            applyNotebookModalUiMode('create');
            if (removeNotebookBtn && removeNotebookBtn.dataset) removeNotebookBtn.dataset.notebookId = '';
            // 使用 ModalWrapper API
            if (notebookModal) {
                if (notebookModalWrapper) {
                    notebookModalWrapper.close();
                } else {
                    notebookModal.classList.remove('active');
                }
            }
            await clearNotebookCoverTemp();
        }
        
        // 创建日记本
        let isCreatingNotebook = false;
        let lastCreateSig = '';
        let lastCreateAt = 0;

        function createNotebook() {
            if (isCreatingNotebook) return;
            const name = notebookNameInput.value.trim();
            if (!name) {
                showToast('请输入日记本名称');
                return;
            }

            const now = Date.now();
            const sig = `${name}|${selectedNotebookCoverImage || ''}|${selectedNotebookColor || ''}|${selectedNotebookRole ? selectedNotebookRole.id : ''}`;
            if (now - lastCreateAt < 2500 && sig === lastCreateSig) {
                hideNotebookModal();
                showToast('日记本已创建');
                return;
            }

            isCreatingNotebook = true;
            if (confirmNotebookBtn) {
                confirmNotebookBtn.disabled = true;
                confirmNotebookBtn.textContent = '创建中';
            }

            const newNotebook = {
                id: makeQuickId('nb'),
                name: name,
                color: selectedNotebookColor,
                coverImage: selectedNotebookCoverImage,
                linkedRole: selectedNotebookRole ? { id: selectedNotebookRole.id, name: selectedNotebookRole.name } : null,
                createdAt: Date.now(),
                updatedAt: Date.now()
            };

            try {
                notebooks.push(newNotebook);
                saveNotebooks();
                lastCreateSig = sig;
                lastCreateAt = now;
                selectedNotebookCoverTempId = null;
                renderNotebooks();
                hideNotebookModal();
                showToast('日记本已创建');
            } catch (e) {
                showToast('创建失败');
            } finally {
                isCreatingNotebook = false;
                if (confirmNotebookBtn) {
                    confirmNotebookBtn.disabled = false;
                    confirmNotebookBtn.textContent = '确认';
                }
            }
        }

        let isUpdatingNotebook = false;
        let lastUpdateSig = '';
        let lastUpdateAt = 0;

        function updateNotebook() {
            if (isUpdatingNotebook) return;
            const id = currentEditingNotebookId;
            if (!id) return;
            const notebook = notebooks.find(n => n.id === id);
            if (!notebook) return;

            const name = notebookNameInput.value.trim();
            if (!name) {
                showToast('请输入日记本名称');
                return;
            }

            const now = Date.now();
            const sig = `${id}|${name}|${selectedNotebookCoverImage || ''}|${selectedNotebookColor || ''}|${selectedNotebookRole ? selectedNotebookRole.id : ''}`;
            if (now - lastUpdateAt < 2500 && sig === lastUpdateSig) {
                hideNotebookModal();
                showToast('已保存');
                return;
            }

            isUpdatingNotebook = true;
            if (confirmNotebookBtn) {
                confirmNotebookBtn.disabled = true;
                confirmNotebookBtn.textContent = '保存中';
            }

            try {
                notebook.name = name;
                notebook.color = selectedNotebookColor;
                notebook.coverImage = selectedNotebookCoverImage;
                notebook.linkedRole = (id === DEFAULT_NOTEBOOK_ID)
                    ? null
                    : (selectedNotebookRole ? { id: selectedNotebookRole.id, name: selectedNotebookRole.name } : null);
                notebook.updatedAt = Date.now();

                saveNotebooks();
                lastUpdateSig = sig;
                lastUpdateAt = now;
                selectedNotebookCoverTempId = null;
                renderNotebooks();
                hideNotebookModal();
                showToast('已保存');
            } catch (e) {
                showToast('保存失败');
            } finally {
                isUpdatingNotebook = false;
                if (confirmNotebookBtn) {
                    confirmNotebookBtn.disabled = false;
                    confirmNotebookBtn.textContent = notebookModalMode === 'edit' ? '保存' : '确认';
                }
            }
        }
        
        // 删除日记本
        function deleteNotebook(id) {
            if (id === DEFAULT_NOTEBOOK_ID) return;
            
            const index = notebooks.findIndex(n => n.id === id);
            if (index !== -1) {
                // 移动日记到默认日记本
                let movedCount = 0;
                currentDiaries.forEach(d => {
                    if (d.notebookId === id) {
                        d.notebookId = DEFAULT_NOTEBOOK_ID;
                        movedCount++;
                    }
                });
                
                if (movedCount > 0) {
                    saveDiaries();
                }
                
                notebooks.splice(index, 1);
                saveNotebooks();
                renderNotebooks();
                showToast(`日记本已删除，${movedCount} 篇日记已移动到默认日记本`);
            }
        }

        function getFilteredDiaries() {
            const diaries = Array.isArray(currentDiaries) ? currentDiaries : [];
            const sorted = [...diaries].sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
            const q = (searchQuery || "").toLowerCase();
            
            // 过滤当前日记本的日记
            let filtered = sorted.filter(d => {
                // 如果没有 notebookId，归类为默认日记本
                const nId = d.notebookId || DEFAULT_NOTEBOOK_ID;
                return nId === (currentNotebookId || DEFAULT_NOTEBOOK_ID);
            });

            if (activeCategory) {
                if (activeCategory === '__free__') {
                    filtered = filtered.filter(d => !String(d.templateUsed || '').trim());
                } else if (String(activeCategory).indexOf('__lbl__') === 0) {
                    const labelKey = String(activeCategory).slice('__lbl__'.length);
                    filtered = filtered.filter(d => {
                        const labels = Array.isArray(d.labels) ? d.labels : [];
                        return labels.some(l => String(l || '').trim() === labelKey);
                    });
                } else {
                    filtered = filtered.filter(d => String(d.templateUsed || '').trim() === activeCategory);
                }
            }
            
            if (!q) return filtered;
            return filtered.filter(d => {
                const labels = Array.isArray(d.labels) ? d.labels.filter(Boolean).map(v => String(v || '')).join(' ') : '';
                const hay = [d.date, d.templateUsed, labels, d.content].map(v => String(v || "")).join("\n").toLowerCase();
                return hay.includes(q);
            });
        }

        function renderCategoryChips() {
            if (!categoryChips) return;
            const diaries = Array.isArray(currentDiaries) ? currentDiaries : [];
            const inBook = diaries.filter(d => (d.notebookId || DEFAULT_NOTEBOOK_ID) === (currentNotebookId || DEFAULT_NOTEBOOK_ID));
            const set = new Set();
            const labelSet = new Set();
            inBook.forEach(d => {
                const t = String(d.templateUsed || '').trim();
                if (t) set.add(t);

                const labels = Array.isArray(d.labels) ? d.labels : [];
                labels.forEach(l => {
                    const s = String(l || '').trim();
                    if (s) labelSet.add(s);
                });
            });
            const items = [{ key: '', label: '全部' }, { key: '__free__', label: '自由' }];
            Array.from(set).sort((a, b) => a.localeCompare(b, 'zh-CN')).forEach(t => items.push({ key: t, label: t }));
            Array.from(labelSet).sort((a, b) => a.localeCompare(b, 'zh-CN')).forEach(l => items.push({ key: `__lbl__${l}`, label: `#${l}` }));

            categoryChips.innerHTML = '';
            items.forEach(it => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'chip' + (it.key === activeCategory ? ' active' : '');
                btn.textContent = it.label;
                btn.addEventListener('click', () => {
                    activeCategory = it.key;
                    renderCategoryChips();
                    renderDiaries();
                });
                categoryChips.appendChild(btn);
            });
        }
        
        // 渲染模板列表
        function renderTemplates() {
            let html = "";
            
            currentTemplates.forEach(template => {
                html += `
                    <div class="template-card" data-id="${template.id}" data-type="template">
                        <div class="template-title">${escapeHtml(template.name)}</div>
                        <div class="template-desc">${escapeHtml(template.description)}</div>
                        <div class="template-questions">${template.questions.length}个引导问题</div>
                    </div>
                `;
            });
            
            templateList.innerHTML = html;
            
            // 为模板卡片添加点击事件
            document.querySelectorAll('.template-card').forEach(card => {
                const templateId = card.dataset.id;
                const template = currentTemplates.find(t => t.id === templateId);
                
                // 点击事件（短按）
                card.addEventListener('click', function(e) {
                    // 如果卡片处于长按激活状态，则忽略点击
                    if (card.classList.contains('long-press-active')) {
                        card.classList.remove('long-press-active');
                        return;
                    }
                    
                    // 如果卡片处于选中状态，则忽略点击（避免与双击冲突）
                    if (card.classList.contains('selected')) {
                        return;
                    }
                    
                    startGuidedDiary(template);
                });
            });
        }
    </script>
