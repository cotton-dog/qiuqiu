        async function saveEntry() {
            const yearEl = document.getElementById('yearPick');
            const monthEl = document.getElementById('monthPick');

            const year = String((yearEl && yearEl.value) || '').trim();
            const month = String((monthEl && monthEl.value) || '').trim();
            const day = String(document.getElementById('dayPick').value || '').trim();
            const hour = String(document.getElementById('hourPick').value || '').trim();
            const minute = String(document.getElementById('minutePick').value || '').trim();
            const place = String(document.getElementById('placePick').value || '').trim();
            const note = String(document.getElementById('notePick').value || '').trim();
            if (!year) {
                showTimeWarn('年份不能为空');
                if (yearEl) {
                    try {
                        yearEl.focus();
                        if (typeof yearEl.select === 'function') yearEl.select();
                    } catch (e) {}
                }
                return;
            }
            if (!month) {
                showTimeWarn('月份不能为空');
                if (monthEl) {
                    try {
                        monthEl.focus();
                        if (typeof monthEl.select === 'function') monthEl.select();
                    } catch (e) {}
                }
                return;
            }
            if (!place) return;

            const yv = Math.max(1, parseInt(year, 10) || 0);
            const mv = Math.max(1, Math.min(12, parseInt(month, 10) || 0));
            const hasDay = day !== '';
            const hasTime = hour !== '' && minute !== '';

            let dv = null;
            if (hasDay) dv = Math.max(1, Math.min(31, parseInt(day, 10) || 0));

            let dateKey = dv != null ? `${yv}-${pad2(mv)}-${pad2(dv)}` : `${yv}-${pad2(mv)}`;
            let timeKey = '';

            if (dv == null && hasTime) {
                document.getElementById('hourPick').value = '';
                document.getElementById('minutePick').value = '';
            }

            if (dv != null && hasTime) {
                let hv = Math.max(0, Math.min(23, parseInt(hour, 10) || 0));
                let minv = Math.max(0, Math.min(59, parseInt(minute, 10) || 0));

                const now = nowParts();
                const nowNum = Number(String(now.y).padStart(4, '0') + String(now.m).padStart(2, '0') + String(now.day).padStart(2, '0') + String(now.hh).padStart(2, '0') + String(now.mm).padStart(2, '0'));
                const curNum = Number(String(yv).padStart(4, '0') + pad2(mv) + pad2(dv) + pad2(hv) + pad2(minv));
                if (curNum > nowNum) {
                    dateKey = String(now.dateKey);
                    hv = Number(now.hh);
                    minv = Number(now.mm);
                }

                timeKey = `${pad2(hv)}:${pad2(minv)}`;
            }

            let origin = 'me';
            let roleIds = [];
            let jumpRole = '__me__';
            if (cfg.mode === 'role') {
                const rid = String(document.getElementById('rolePick').value || '').trim();
                if (!rid) return;
                origin = 'role';
                roleIds = [rid];
                jumpRole = rid;
            } else {
                origin = 'me';
                roleIds = Array.from(cfg.linkRoleIds);
                jumpRole = '__me__';
            }

            const next = {
                v: 1,
                entries: Array.isArray(appBox.entries) ? appBox.entries.slice() : []
            };

            if (editingEntryId) {
                const idx = next.entries.findIndex(e => e && String(e.id) === String(editingEntryId));
                if (idx >= 0) {
                    const old = next.entries[idx] || {};
                    next.entries[idx] = {
                        ...old,
                        dateKey,
                        timeKey,
                        place,
                        note,
                        origin,
                        roleIds
                    };
                } else {
                    const createdAt = Date.now();
                    next.entries.push({
                        id: String(editingEntryId),
                        createdAt,
                        dateKey,
                        timeKey,
                        place,
                        note,
                        origin,
                        roleIds
                    });
                }
                editingEntryId = null;
            } else {
                const createdAt = Date.now();
                const id = `${createdAt}_${Math.random().toString(16).slice(2)}`;
                next.entries.push({
                    id,
                    createdAt,
                    dateKey,
                    timeKey,
                    place,
                    note,
                    origin,
                    roleIds
                });
            }

            await putBox(next);
            cfg.viewRole = jumpRole;
            closeEditor();
            renderTimeline();
            renderWho();
            setSubLine();
        }

        function openWho() {
            const m = document.getElementById('whoMask');
            if (!m) return;
            m.style.display = 'flex';
        }

        function closeWho() {
            const m = document.getElementById('whoMask');
            if (!m) return;
            m.style.display = 'none';
        }

        function renderWho() {
            const wrap = document.getElementById('whoPills');
            if (!wrap) return;
            wrap.innerHTML = '';
            roleList.forEach(r => {
                if (!r) return;
                const p = document.createElement('div');
                p.className = 'pill';
                p.textContent = r.name;
                p.dataset.rid = String(r.id);
                p.classList.toggle('is-on', String(r.id) === String(cfg.viewRole));
                p.addEventListener('click', () => {
                    cfg.viewRole = String(r.id);
                    Array.from(wrap.querySelectorAll('.pill')).forEach(x => x.classList.toggle('is-on', x.dataset.rid === cfg.viewRole));
                    renderTimeline();
                });
                wrap.appendChild(p);
            });
        }

        function bindUi() {
            const todayLab = document.getElementById('todayLabel');
            if (todayLab) todayLab.textContent = `（${prettyDate(todayKey())}）`;

            const backBtn = document.getElementById('backBtn');
            if (backBtn) {
                backBtn.addEventListener('click', () => {
                    try {
                        if (window.parent && window.parent !== window) {
                            window.parent.postMessage({ type: 'closeApp' }, _getPostTargetOrigin());
                            return;
                        }
                    } catch (e) {}
                    window.location.href = 'index.html';
                });
            }

            const whoBtn = document.getElementById('whoBtn');
            if (whoBtn) whoBtn.addEventListener('click', openWho);

            const modeBtn = document.getElementById('modeBtn');
            if (modeBtn) {
                modeBtn.addEventListener('click', () => {
                    const next = (document.body.dataset.theme === 'light') ? 'dark' : 'light';
                    applyTheme(next);
                });
                modeBtn.addEventListener('pointerdown', () => modeBtn.classList.add('pressed'));
                modeBtn.addEventListener('pointerup', () => modeBtn.classList.remove('pressed'));
                modeBtn.addEventListener('pointercancel', () => modeBtn.classList.remove('pressed'));
            }
            const whoCloseBtn = document.getElementById('whoCloseBtn');
            if (whoCloseBtn) whoCloseBtn.addEventListener('click', closeWho);

            const whoMask = document.getElementById('whoMask');
            if (whoMask) {
                whoMask.addEventListener('click', (e) => {
                    if (e.target === whoMask) closeWho();
                });
            }
            const menuMask = document.getElementById('entryMenuMask');
            if (menuMask) {
                menuMask.addEventListener('click', (e) => {
                    if (e.target === menuMask) closeEntryMenu();
                });
            }

            const newBtn = document.getElementById('newEntryBtn');
            if (newBtn) newBtn.addEventListener('click', () => openEditor());

            const editorCancelBtn = document.getElementById('editorCancelBtn');
            if (editorCancelBtn) editorCancelBtn.addEventListener('click', closeEditor);
            const saveBtn = document.getElementById('saveBtn');
            if (saveBtn) saveBtn.addEventListener('click', saveEntry);

            const menuEditBtn = document.getElementById('entryMenuEdit');
            bindMenuAction(menuEditBtn, () => {
                const entry = menuEntry;
                closeEntryMenu();
                if (entry) openEditor(entry);
            });
            const menuDeleteBtn = document.getElementById('entryMenuDelete');
            bindMenuAction(menuDeleteBtn, async () => {
                const entry = menuEntry;
                if (!entry) {
                    closeEntryMenu();
                    return;
                }
                if (!confirm('确定要删除这个地点记录吗？')) return;
                closeEntryMenu();
                await deleteEntry(entry);
            });
            const menuCancelBtn = document.getElementById('entryMenuCancel');
            bindMenuAction(menuCancelBtn, closeEntryMenu);

            const editorMask = document.getElementById('editorMask');
            if (editorMask) {
                editorMask.addEventListener('click', (e) => {
                    if (e.target === editorMask) closeEditor();
                });
            }

            const todayOnlyBtn = document.getElementById('todayOnlyBtn');
            const allDaysBtn = document.getElementById('allDaysBtn');
            if (todayOnlyBtn) {
                todayOnlyBtn.addEventListener('click', () => {
                    cfg.showAllDays = false;
                    todayOnlyBtn.classList.add('is-on');
                    if (allDaysBtn) allDaysBtn.classList.remove('is-on');
                    renderTimeline();
                });
            }
            if (allDaysBtn) {
                allDaysBtn.addEventListener('click', () => {
                    cfg.showAllDays = true;
                    cfg.jumpToLatestDay = true;
                    allDaysBtn.classList.add('is-on');
                    if (todayOnlyBtn) todayOnlyBtn.classList.remove('is-on');
                    renderTimeline();
                });
            }

            const modeBox = document.getElementById('modePills');
            if (modeBox) {
                modeBox.addEventListener('click', (e) => {
                    const p = e.target && e.target.closest ? e.target.closest('.pill') : null;
                    if (!p) return;
                    const m = p.getAttribute('data-mode');
                    if (!m) return;
                    cfg.mode = m;
                    if (cfg.mode === 'role') cfg.linkRoleIds = new Set();
                    syncModePills();
                    syncModeRows();
                    fillRoleLinkPills();
                });
            }

            document.addEventListener('keydown', (e) => {
                if (e.key !== 'Escape') return;
                const wm = document.getElementById('whoMask');
                const mm = document.getElementById('entryMenuMask');
                const em = document.getElementById('editorMask');
                if (em && em.style.display === 'flex') {
                    closeEditor();
                    return;
                }
                if (mm && mm.style.display === 'flex') {
                    closeEntryMenu();
                    return;
                }
                if (wm && wm.style.display === 'flex') {
                    closeWho();
                }
            });
        }

        async function init() {
            const db = ensureImageStorageDB();
            if (db && typeof db.init === 'function') {
                try {
                    await db.init();
                } catch (e) {}
            }
            initTimeSelectors();
            applyTheme(loadTheme());
            bindUi();
            appBox = await getBox();
            await syncRoles();
            renderTimeline();

            try {
                const k = 'map_hint_v1';
                if (!localStorage.getItem(k)) {
                    localStorage.setItem(k, '1');
                    showTopHint('点条目可编辑，长按呼出菜单');
                }
            } catch (e) {}

            document.addEventListener('click', () => {
                try {
                    if (window.parent && window.parent !== window) {
                        window.parent.postMessage({ type: 'iframe_click' }, _getPostTargetOrigin());
                    }
                } catch (e) {}
            }, true);

            window.addEventListener('storage', (e) => {
                if (!e || !e.key) return;
                if (e.key === 'wechatAppData' || e.key === 'wechatAppData_rev' || (e.key && e.key.indexOf('avatar_') === 0)) {
                    syncRoles().then(() => renderTimeline());
                    return;
                }
                if (e.key === 'mapAppData') {
                    getBox().then(b => {
                        appBox = b;
                        renderTimeline();
                    });
                }
            });

            try {
                window.parent.postMessage({ type: 'app_ready', appId: 'ditu' }, _getPostTargetOrigin());
            } catch (e) {
                console.error('Failed to send app_ready message:', e);
            }
        }

        document.addEventListener('DOMContentLoaded', init);

        function loadTheme() {
            try {
                const v = String(localStorage.getItem('mapUiMode') || '').trim();
                if (v === 'light' || v === 'dark') return v;
            } catch (e) {}
            return 'light';
        }

        function applyTheme(next) {
            const t = (next === 'dark') ? 'dark' : 'light';
            document.body.dataset.theme = t;
            try {
                localStorage.setItem('mapUiMode', t);
            } catch (e) {}
            const meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.setAttribute('content', t === 'dark' ? '#0f1115' : '#f6f7fb');
        }

        function initTimeSelectors() {
            const y = document.getElementById('yearPick');
            const m = document.getElementById('monthPick');
            const d = document.getElementById('dayPick');
            const hh = document.getElementById('hourPick');
            const mm = document.getElementById('minutePick');
            if (!y || !m || !d || !hh || !mm) return;

            y.addEventListener('focus', () => { y.dataset.prevVal = String(y.value || '').trim(); });
            m.addEventListener('focus', () => { m.dataset.prevVal = String(m.value || '').trim(); });

            const allEmpty = !String(y.value || '').trim() && !String(m.value || '').trim() && !String(d.value || '').trim() && !String(hh.value || '').trim() && !String(mm.value || '').trim();
            if (allEmpty) {
                const now = nowParts();
                y.value = String(now.y);
                m.value = String(Number(now.m));
                d.value = String(Number(now.day));
                hh.value = String(Number(now.hh));
                mm.value = String(Number(now.mm));
            }

            const clampInt = (v, min, max) => {
                const n = parseInt(String(v || '').trim(), 10);
                if (isNaN(n)) return '';
                return String(Math.max(min, Math.min(max, n)));
            };

            const clampToNow = () => {
                const now = nowParts();

                let yy = parseInt(String(y.value || '').trim(), 10);
                let mo = parseInt(String(m.value || '').trim(), 10);
                const hasDay = String(d.value || '').trim() !== '';
                const hasTime = String(hh.value || '').trim() !== '' && String(mm.value || '').trim() !== '';
                let da = hasDay ? parseInt(String(d.value || '').trim(), 10) : NaN;
                let ho = hasTime ? parseInt(String(hh.value || '').trim(), 10) : NaN;
                let mi = hasTime ? parseInt(String(mm.value || '').trim(), 10) : NaN;

                if (isNaN(yy) || isNaN(mo)) return;

                yy = Math.max(1, Math.min(9999, yy));
                mo = Math.max(1, Math.min(12, mo));
                if (hasDay) da = Math.max(1, Math.min(31, da));
                if (hasTime) {
                    ho = Math.max(0, Math.min(23, ho));
                    mi = Math.max(0, Math.min(59, mi));
                }

                const nY = Number(now.y);
                const nM = Number(now.m);
                const nD = Number(now.day);
                const nH = Number(now.hh);
                const nMin = Number(now.mm);

                if (yy > nY) {
                    yy = nY;
                    mo = nM;
                    d.value = '';
                    hh.value = '';
                    mm.value = '';
                } else if (yy === nY) {
                    if (mo > nM) {
                        mo = nM;
                        d.value = '';
                        hh.value = '';
                        mm.value = '';
                    } else if (mo === nM) {
                        if (hasDay && da > nD) {
                            da = nD;
                            d.value = String(da);
                            hh.value = '';
                            mm.value = '';
                        } else if (hasDay && da === nD && hasTime) {
                            if (ho > nH) {
                                ho = nH;
                                mi = nMin;
                            } else if (ho === nH) {
                                if (mi > nMin) mi = nMin;
                            }
                        }
                    }
                }

                y.value = String(yy);
                m.value = String(mo);

                if (String(d.value || '').trim() !== '' && hasDay && !isNaN(da)) d.value = String(da);
                if (String(d.value || '').trim() === '') {
                    hh.value = '';
                    mm.value = '';
                } else if (hasTime && !isNaN(ho) && !isNaN(mi)) {
                    hh.value = String(ho);
                    mm.value = String(mi);
                }
            };

            y.addEventListener('blur', () => {
                const prev = String(y.dataset.prevVal || '').trim();
                y.value = clampInt(y.value, 1, 9999);
                const after = String(y.value || '').trim();
                if (prev && !after) {
                    showTimeWarn('年份不能为空');
                    requestAnimationFrame(() => {
                        try {
                            y.focus();
                            if (typeof y.select === 'function') y.select();
                        } catch (e) {}
                    });
                }
                clampToNow();
            });
            m.addEventListener('blur', () => {
                const prev = String(m.dataset.prevVal || '').trim();
                m.value = clampInt(m.value, 1, 12);
                const after = String(m.value || '').trim();
                if (prev && !after) {
                    showTimeWarn('月份不能为空');
                    requestAnimationFrame(() => {
                        try {
                            m.focus();
                            if (typeof m.select === 'function') m.select();
                        } catch (e) {}
                    });
                }
                clampToNow();
            });
            d.addEventListener('blur', () => { d.value = clampInt(d.value, 1, 31); clampToNow(); });
            hh.addEventListener('blur', () => { hh.value = clampInt(hh.value, 0, 23); clampToNow(); });
            mm.addEventListener('blur', () => { mm.value = clampInt(mm.value, 0, 59); clampToNow(); });

            hh.addEventListener('input', () => {
                if (!String(d.value || '').trim()) {
                    hh.value = '';
                    mm.value = '';
                }
            });

            mm.addEventListener('input', () => {
                if (!String(d.value || '').trim()) {
                    hh.value = '';
                    mm.value = '';
                }
            });
        }
    </script>
</body>
